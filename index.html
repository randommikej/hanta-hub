  /* ─── MAP (Leaflet) ─── */
  .map-section { margin-bottom: 40px; }

  .map-reset {
    margin-left: auto; cursor: pointer; color: var(--blue);

    user-select: none;

  /* Custom Leaflet markers */
  .hh-divicon { background: transparent !important; border: none !important; }
  .hh-marker {
    --mc: #3b82c4;
    position: relative; width: 14px; height: 14px;
    transform: translate(-7px, -7px);
  }
  .hh-marker-dot {
    position: absolute; inset: 0; width: 14px; height: 14px;
    border-radius: 50%; border: 2px solid white;
    box-shadow: 0 1px 3px rgba(15,23,42,.4);
    background: var(--mc);
    transition: transform .15s ease;
  }
  .hh-marker:hover .hh-marker-dot { transform: scale(1.3); }
  .hh-marker-label {
    position: absolute; left: 18px; top: -4px;
    font-family: var(--font-body); font-size: 11px; font-weight: 600; color: #0a1628;
    background: rgba(255,255,255,.92); padding: 2px 8px; border-radius: 999px;
    border: 1px solid rgba(15,23,42,.12); white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity .15s; box-shadow: 0 2px 6px rgba(15,23,42,.1);
  }
  .hh-marker:hover .hh-marker-label,
  .hh-marker-active .hh-marker-label { opacity: 1; }
  .hh-marker-active .hh-marker-dot { width: 18px; height: 18px; transform: translate(-2px, -2px); }
  .hh-marker-pulse {
    position: absolute; inset: 0; width: 14px; height: 14px;
    border-radius: 50%; background: #dc2626;
    animation: hhPulse 1.8s ease-out infinite;
    opacity: .7;

  @keyframes hhPulse {
    0% { transform: scale(0.6); opacity: 0.7; }
    80% { transform: scale(2.6); opacity: 0; }
    100% { transform: scale(2.6); opacity: 0; }

const TIMELINE = [
  { date: 'Apr 1, 2026', title: 'MV Hondius Departs Ushuaia', desc: '147 passengers & crew aboard. Antarctic & South Atlantic wildlife expedition begins.' },
  { date: 'Apr 11, 2026', title: 'Index Case Dies Onboard', desc: 'Dutch national (index case) dies. Remains held in Saint Helena pending repatriation.', dotClass: 'death', badge: 'Death', badgeClass: 'badge-death' },
  { date: 'Apr 26, 2026', title: 'Dutch Woman Dies — Johannesburg', desc: 'Close contact of index case collapses on Airlink flight. WHO traces 82 passengers + 6 crew.', dotClass: 'death', badge: 'Death + Tracing', badgeClass: 'badge-death' },
  { date: 'May 2, 2026', title: 'WHO Notified — PCR Confirmed', desc: 'NICD South Africa confirms hantavirus via PCR. British national in ICU Johannesburg.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 3, 2026', title: '3rd Death — German National', desc: 'German passenger dies on board. Ship anchors off Praia, Cape Verde.', dotClass: 'death', badge: 'Death', badgeClass: 'badge-death' },
  { date: 'May 6, 2026', title: 'Evacuation to Netherlands Underway', desc: '3 patients including ship’s doctor evacuated to Netherlands. Ship’s doctor condition improving.', badge: 'Evac', badgeClass: 'badge-now' },
  { date: 'May 7, 2026', title: '8th Case Confirmed · Multi-Country Tracing Expands', desc: 'WHO ships 2,500 diagnostic kits to 5 countries. 8 nations coordinating: NL, UK, DE, Spain, South Africa, Cape Verde, Switzerland, Singapore. US states (Arizona, Georgia) monitoring returned passengers.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 8, 2026', title: 'CDC Activates Level 3 · Two Labs Confirm Andes Virus', desc: 'US CDC activates its Emergency Operations Center at Level 3 (lowest tier). NICD South Africa and Geneva University Hospitals independently confirm Andes virus. UKHSA flags a suspected 9th case on Tristan da Cunha (later ruled out).', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 9, 2026', title: 'Suspected 9th Case Negative · Ship Approaches Tenerife · WHO DG On Site', desc: 'Suspected ninth case (a flight attendant from a contact-tracing flight) tests negative for hantavirus, leaving the cluster at 8 cases (6 PCR-confirmed Andes virus, 2 suspected). MV Hondius nears Granadilla port, Tenerife. WHO Director-General delivers a message to the people of Tenerife as Spanish authorities prepare a 24-hour disembarkation window. 17 American passengers will quarantine in Nebraska after a repatriation flight.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 10, 2026', title: 'MV Hondius Docks at Tenerife · Disembarkation Underway · First Flight to Madrid', desc: 'MV Hondius arrives at Granadilla port, Tenerife at 5:30 a.m. local time on Sunday May 10. Spanish authorities confirm all remaining passengers are asymptomatic. The first repatriation flight, carrying 13 Spanish passengers and one Spanish crew member, departs for Madrid where they will be quarantined at the Gómez Ulla military hospital and PCR-tested on arrival and again at day 7. Charter flights for UK, US, France, Germany and other nationalities are scheduled across Sunday and Monday. WHO Director-General Tedros reiterates the public health risk remains LOW.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 11, 2026', title: 'French + American Test Positive · 17 Americans Arrive at Nebraska Quarantine · Cluster Rises to 10', desc: 'A French woman repatriated to Paris and an American man on the Nebraska-bound charter both test positive for hantavirus, bringing the MV Hondius cluster to 10 cases (8 PCR-confirmed Andes virus, 2 probable). The French passenger\'s condition is reported as deteriorating. 17 Americans landed at Offutt Air Force Base near Omaha early Monday and are now at the National Quarantine Unit at the University of Nebraska Medical Center for evaluation. WHO formally recommends 42 days of active health monitoring with daily symptom checks for all repatriated passengers. 54 passengers remained on the ship Monday morning; 22 are expected to disembark with the remaining ~32 returning to Rotterdam with the ship over a five-day voyage accompanied by a medical team.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 12, 2026', title: 'Cluster Reaches 11 · Repatriation Complete · 2 Americans Transferred to Emory Atlanta · Ship Sails for Rotterdam', desc: 'ECDC and WHO report the MV Hondius cluster has risen to 11 cases (9 PCR-confirmed Andes virus, 2 probable). The final two evacuation flights — carrying the last passengers and crew, including five Australians and one New Zealander — have landed in the Netherlands, completing the international repatriation operation. In the United States, 16 passengers remain under monitoring at the University of Nebraska Medical Center National Quarantine Unit (one PCR-positive in biocontainment, 15 asymptomatic in quarantine), while two additional travellers — at least one experiencing symptoms — have been transferred to Emory University Hospital in Atlanta for evaluation. The MV Hondius itself has now left Tenerife with a 27-person skeleton crew (25 crew and 2 medical professionals) bound for Rotterdam, where it will undergo full disinfection. WHO Director-General Tedros Adhanom Ghebreyesus told reporters more cases should be expected given the long Andes virus incubation window. Of the 122 people evacuated and repatriated to roughly 20 countries, all are now in 42-day active monitoring per WHO recommendation.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 13, 2026', title: 'French Passenger on Artificial Lung in Paris · Day 1 of 42-Day Monitoring · Illinois Investigates Unrelated Sin Nombre Case', desc: 'On Wednesday May 13, 2026 the French woman repatriated from the MV Hondius to Bichat Hospital in Paris is now critically ill on extracorporeal membrane oxygenation (ECMO), an artificial lung that pumps blood through a membrane to oxygenate it while her lungs and heart attempt to recover. Doctor Xavier Lescure, infectious disease specialist at Bichat, described the case as a severe form of Andes hantavirus pulmonary syndrome with life-threatening lung and heart involvement. The MV Hondius cluster total remains at 11 cases and 3 deaths, and Day 1 of the formal 42-day active monitoring window for the ~122 repatriated passengers is now underway across roughly 20 countries. Separately, the Illinois Department of Public Health announced it is investigating a suspected hantavirus case in Winnebago County, Illinois — an adult who is recovering at home after exposure to rodent droppings while cleaning a property and who has no link to the MV Hondius cluster. Health officials say the suspected strain is a North American hantavirus (likely Sin Nombre virus), which does not transmit between people. CDC confirmatory testing is expected to take up to ten days.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 14, 2026', title: 'WHO Publishes DON601 · Nebraska American Retests Negative · Tedros Issues Follow-up Tenerife Message', desc: 'On Thursday May 14, 2026 — Day 2 of the formal 42-day active monitoring window — the World Health Organization published its third Disease Outbreak News report on the cluster (DON601), formally listing the MV Hondius outbreak at 11 cases (8 confirmed, 1 inconclusive, 2 probable) and 3 deaths (2 confirmed, 1 probable). All laboratory-confirmed infections are Andes virus (ANDV). The WHO\'s stated working hypothesis is that the first case acquired the virus before boarding the ship — most likely from environmental exposure during activities in Argentina — with subsequent transmission between very close shipboard contacts. The 17-passenger American cohort at the National Quarantine Unit at the University of Nebraska Medical Center received a small piece of good news overnight: Dr. Stephen Kornfeld, the first American whose initial PCR was mildly positive, has retested negative on follow-up and has been moved out of the biocontainment unit into the quarantine unit alongside the other passengers. WHO Director-General Tedros Adhanom Ghebreyesus issued a follow-up video message to the people of Tenerife thanking residents for their patience during the disembarkation operation. WHO has also scheduled an emergency scientific consultation on Andes virus medical countermeasures research and development for Friday May 15 in Geneva, focused on diagnostics, vaccine candidates, and the absence of a licensed antiviral.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 15, 2026', title: 'Day 3 of Monitoring · WHO–UKHSA Bunyavirus Consultation Convenes in Geneva · French ECMO Patient Stable · Cluster Holds at 11', desc: 'Friday May 15, 2026 is Day 3 of the formal WHO 42-day active monitoring window for the roughly 122 repatriated MV Hondius passengers. The emergency virtual scientific consultation on Andes virus medical countermeasures research and development convenes from 13:00 to 16:00 Geneva time, co-hosted by the WHO Research & Development Blueprint for Epidemics and the UK-led Bunyavirus Collaborative Open Research Consortium (CORC) at UKHSA. The agenda covers candidate diagnostics, vaccine pipelines, and the absence of a licensed antiviral. The cluster total remains unchanged at 11 cases (8 confirmed, 1 inconclusive, 2 probable) and 3 deaths. The French passenger at Bichat Hospital in Paris remains critically ill on extracorporeal membrane oxygenation (ECMO) with no change in clinical status reported overnight. The Madrid cohort at Gómez Ulla military hospital is approaching its first scheduled day-7 PCR retest later this weekend. No new positive PCR results have been reported in any receiving country in the past 24 hours.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 16, 2026', title: 'Day 4 of Monitoring · Madrid Day-7 PCR Window Opens · ECMO Patient Stable · Cluster Holds at 11', desc: 'Saturday May 16, 2026 is Day 4 of the WHO 42-day active monitoring window for the roughly 122 repatriated MV Hondius passengers. The Spanish cohort at Hospital Central de la Defensa Gómez Ulla in Madrid enters the first weekend of its day-7 PCR retest window: the Spanish Public Health Commission protocol calls for a follow-up PCR seven days after admission, and asymptomatic passengers with two negatives are expected to continue active monitoring at home rather than in hospital. The cluster total remains at 11 cases (8 confirmed, 1 inconclusive, 2 probable) and 3 deaths. The French woman at Bichat-Claude Bernard Hospital in Paris remains critically ill on extracorporeal membrane oxygenation (ECMO) with clinical status unchanged overnight. The 16 American passengers at the National Quarantine Unit at the University of Nebraska Medical Center remain asymptomatic; the two travellers at Emory University Hospital in Atlanta continue under evaluation. The MV Hondius is approaching the final day of its five-day return voyage from Tenerife to Rotterdam under a 27-person skeleton crew. No new PCR-positive results have been reported in any receiving country in the past 24 hours.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 17, 2026', title: 'Day 5 of Monitoring · Madrid Day-7 PCR Underway · Canadian B.C. Passenger Tests Presumptive Positive · MV Hondius Approaches Rotterdam', desc: 'Sunday May 17, 2026 is Day 5 of the WHO 42-day active monitoring window. The British Columbia Provincial Health Officer reported in the afternoon that one of four high-risk B.C. residents under self-isolation — an adult who travelled aboard the MV Hondius — tested presumptive positive for Andes hantavirus. The Public Health Agency of Canada later confirmed the sample positive for Andes, making Canada the latest country to register a confirmed MV Hondius case. Both members of a couple in their seventies are in a hospital in Victoria; symptoms reported as mild fever and headache. The MV Hondius itself continues its return voyage from Tenerife under a 27-person skeleton crew, with arrival at the Port of Rotterdam expected overnight. The cluster total stands at 12 cases (9 confirmed, 2 probable, 1 inconclusive) and 3 deaths.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 18, 2026', title: 'Day 6 of Monitoring · MV Hondius Docks Rotterdam · 13 Madrid Day-7 PCRs Negative · French ECMO Stable · Cluster at 12', desc: 'Monday May 18, 2026 is Day 6 of the WHO 42-day active monitoring window for the roughly 122 passengers and crew repatriated from the MV Hondius. The defining event of the day is the vessel itself: the MV Hondius docked at the Port of Rotterdam shortly after 10:30 a.m. local time (4:30 a.m. ET) after a six-day return voyage from Tenerife. Twenty-five maritime crew members and two medical staff remain on board and will enter immediate quarantine in a row of 25 white containers set up at the jetty alongside a line of windmills; those who cannot be repatriated will live in the containers with satellite internet and catering. The Port of Rotterdam health authorities, the Erasmus Medical Center, and the city of Rotterdam will jointly carry out the cleaning and disinfection of the ship at the jetty. In Madrid, the Spanish Public Health Commission day-7 follow-up PCRs on the Gómez Ulla cohort have returned: 13 Spanish passengers tested negative for hantavirus, and the one hospitalised confirmed Spanish patient is described as evolving favourably with minimal symptoms; two contacts hospitalised in Alicante and Barcelona also tested negative on the day-7 retest. In Paris, the French woman at Bichat-Claude Bernard remains critically ill on extracorporeal membrane oxygenation (ECMO) with no further deterioration reported overnight; her care team has previously described her status as the final stage of supportive care. In the United States, the 16 American passengers at the UNMC National Quarantine Unit in Omaha remain asymptomatic; the two travellers at Emory University Hospital in Atlanta remain under evaluation. The cluster total holds at 12 cases (9 confirmed, 2 probable, 1 inconclusive) and 3 deaths.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 19, 2026', title: 'Day 7 of Monitoring · MV Hondius Disinfection Underway · 23 Non-Dutch Crew Enter Calandsteiger Six-Week Quarantine · Cluster Holds at 12', desc: 'Tuesday May 19, 2026 is Day 7 of the WHO 42-day active monitoring window. The defining event of the day is the disinfection of the MV Hondius at its Rotterdam jetty, which Oceanwide Expeditions has indicated is on track to clear the vessel for redeparture. The 23 non-Dutch crew members who returned the ship to Rotterdam entered a six-week quarantine in separate cabins on Calandsteiger 7, a piece of headland inside the harbour; the two Dutch crew members were repatriated to their homes for the remainder of the WHO 42-day monitoring window. The cluster total holds at 12 cases (9 PCR-confirmed Andes virus, 2 probable, 1 inconclusive) and 3 deaths.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 20, 2026', title: 'Day 8 of Monitoring · Oceanwide Discloses Crew Composition (17 Filipino, 3 Ukrainian) · Cluster Holds at 12', desc: 'Wednesday May 20, 2026 is Day 8 of the WHO 42-day active monitoring window. Oceanwide Expeditions discloses the national composition of the Calandsteiger 7 quarantine cohort: 17 Filipino crew and 3 Ukrainian crew make up the 20 non-Dutch crew now serving the six-week quarantine in separate cabins inside the Port of Rotterdam, with the Philippines embassy in The Hague providing consular liaison. Disinfection of the vessel itself continues at the jetty, coordinated by the Port of Rotterdam health authority, the Erasmus Medical Center, and the city of Rotterdam. The cluster total holds at 12 cases (9 PCR-confirmed Andes virus, 2 probable, 1 inconclusive) and 3 deaths.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 21, 2026', title: 'Day 9 of Monitoring · ECDC Update Confirms No New Cases · 18 US Passengers to Remain at UNMC Through May 31 · Cluster Holds at 12', desc: 'Thursday May 21, 2026 is Day 9 of the WHO 42-day active monitoring window. ECDC publishes its 21 May Andes hantavirus update: no new cases or deaths since the previous report, cluster total holds at 12 (9 confirmed, 2 probable). In the United States, CDC and the University of Nebraska Medical Center jointly confirm that 18 repatriated American passengers will remain at the UNMC National Quarantine Unit in Omaha through May 31, completing the 21-day mark of active monitoring. The French passenger at Hôpital Bichat-Claude Bernard in Paris remains critically ill on extracorporeal membrane oxygenation (ECMO) with status reported unchanged. WHO and ECDC continue to assess the public-health risk outside the ship-based cohort as low.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },
  { date: 'May 22, 2026', title: 'Day 10 of Monitoring · MV Hondius Disinfection Ongoing · Oceanwide Targets June 13 Longyearbyen Redeparture · Cluster Holds at 12', desc: 'Friday May 22, 2026 is Day 10 of the WHO 42-day active monitoring window. Three operational threads define the day. First, the disinfection of the MV Hondius at its Rotterdam jetty continues; published estimates for the cycle place the total disinfection work at roughly three to four days from start, with a vessel-return timeline now targeting a 13 June redeparture from Longyearbyen, Svalbard rather than the previously-quoted 29 May Rotterdam date. Second, the cluster total holds at 12 cases (9 PCR-confirmed Andes virus, 2 probable, 1 inconclusive) and 3 deaths — no new PCR-positive results have been reported in any receiving country in the past 72 hours. Third, the 18 American passengers at the UNMC National Quarantine Unit in Omaha remain asymptomatic and on track to complete the 21-day monitoring window through May 31 before any step-down. In Paris the French passenger at Hôpital Bichat-Claude Bernard remains critically ill on extracorporeal membrane oxygenation (ECMO) with status reported unchanged overnight. WHO and ECDC continue to assess the public-health risk to populations outside the ship-based cohort as low.', badge: 'Confirmed', badgeClass: 'badge-confirmed' },

  { cat: 'Guide', catClass: 'cat-tips', date: 'May 29, 2026', readTime: '7 min read',
    title: 'Hantavirus and Domestic Pets: What Dog and Cat Owners Should Actually Do in Endemic Regions When a Pet Brings Home a Rodent — A Practical, Evidence-Based Checklist',
    excerpt: 'Dogs and cats are not part of the hantavirus reservoir community and there is no documented case of pet-to-human hantavirus transmission. The household risk equation runs entirely through what a hunting pet brings home, not through the pet itself. This practical guide walks through the cleanup checklist when a cat drops a rodent on the kitchen floor, the kennel-hygiene cadence dog owners should keep, and the small set of evidence-based rules that meaningfully reduce household risk in Andes virus and Sin Nombre virus endemic regions.',
    icon: '🐕',
    body: [
      ['p', 'One of the most common questions asked of hantavirus information lines after a cluster appears in the news is whether household pets carry meaningful hantavirus risk. The published answer has not changed for the MV Hondius cluster: dogs and cats are not part of the hantavirus reservoir community, and there is no documented case of pet-to-human hantavirus transmission. What changes between a quiet news cycle and an active cluster is how alarmed pet owners feel about a familiar situation — a cat that brings a rodent home, a dog that nudges a dead mouse under the porch. The risk equation runs through what the pet brings home, not the pet itself; and the high-yield interventions are short, practical, and well established.'],
      ['h3', 'The Cleanup Checklist When a Cat or Dog Brings Home a Rodent'],
      ['p', 'When a cat drops a freshly killed rodent in the kitchen, the operative rule is do not dry-sweep and do not vacuum. Hantaviruses transmit primarily by aerosolisation of contaminated rodent excreta — dry-sweeping or vacuuming aerosolises exactly the material you are trying to remove. The CDC-standard cleanup sequence is to ventilate the room for at least thirty minutes before handling the carcass, put on an N95 respirator with a tight facial seal, nitrile gloves, and sealed goggles, then bag the rodent in a doubled contractor-grade plastic bag without crushing or compressing the body. Wet-disinfect the floor and any soft furnishings the rodent touched using a 1:10 dilution of household bleach with at least five minutes of contact time; commercial EPA-registered disinfectants with documented hantavirus efficacy are an equivalent substitute. Dispose of the bag through standard household waste — the published evidence does not support special hazardous-waste handling for a single household rodent in a low-prevalence area. Wash hands thoroughly with soap and water after removing PPE.'],
      ['h3', 'Kennel Hygiene Cadence for Outdoor Dog Owners'],
      ['p', 'Outdoor dog kennels in rodent-dense areas are the second household risk vector — not because the dog becomes infected, but because the kennel bedding can accumulate rodent droppings over time. The cadence is monthly: inspect bedding and corners for rodent droppings, urine staining, or chewed bedding material, and replace bedding if any of these are present. Wet-disinfect the kennel base with the same 1:10 bleach solution and five-minute contact time before re-bedding. Keep dog food and water bowls inside enclosed containers or empty between meals; standing dog food is one of the strongest rodent-attractant signals in a residential yard.'],
      ['h3', 'What Pet Owners Should Not Do'],
      ['p', 'Pet owners in endemic regions should not test the pet for hantavirus. No clinically useful pet test exists and there is no actionable result; veterinary effort is better spent on the environmental risk equation. There is no licensed canine or feline hantavirus vaccine, and one is not needed — the pet is not the at-risk host. Pet-to-pet hantavirus transmission within a household is not in the published evidence base. Pet behaviour changes outside of standard rodent-exclusion hygiene — confining the pet indoors, restricting outdoor time — are not supported by the published evidence and trade significant welfare downsides for no measurable risk-reduction benefit. The single highest-yield intervention is, and has always been, sealed food storage and wet-disinfect cleanup hygiene.'],
      ['h3', 'What This Means for the 2026 MV Hondius Cluster'],
      ['p', 'For the 2026 MV Hondius cluster specifically, none of the human cases is linked to a household pet. The receiving-country contact-tracing operations focus on close human contacts, healthcare workers, and shared shipboard spaces — not pets. For the general public asking about household pet risk after seeing the cluster in the news, the practical answer is the same answer that applied two weeks ago: keep food and feed in sealed containers, wet-disinfect any rodent-affected area, and do not dry-sweep. The MV Hondius cluster does not change the household pet risk profile.'],
      ['em', 'Last updated · 2026-05-29 · Sources: CDC Reducing the Risk of Hantavirus Infection, CDC Cleaning Up After Rodents, WHO hantavirus factsheet, published canine and feline hantavirus seroprevalence literature.']
    ]
  },

  { cat: 'Science', catClass: 'cat-science', date: 'May 28, 2026', readTime: '9 min read',
    title: 'Andes Virus Genomic Surveillance: What the 2026 MV Hondius Sequences Are Telling Researchers About Strain Origin, Transmission Window, and the Argentina Patagonia Reservoir Hypothesis',
    excerpt: 'Genomic sequences of the Andes virus isolates recovered from the 2026 MV Hondius cluster have been deposited and analysed by INRB Kinshasa, the National Institute for Communicable Diseases (NICD) Johannesburg, and Geneva University Hospitals (HUG), with comparison sequences from the Argentina Maiztegui Institute archive. This guide walks through what the available phylogenetic work shows about the strain origin, the transmission window inside the ship, and the working hypothesis that an environmental Patagonia exposure seeded the index case.',
    icon: '🧬',
    body: [
      ['p', 'Genomic sequencing has been the quiet through-line of the 2026 MV Hondius Andes hantavirus cluster. The headline operational events — the 122 evacuations, the 600+ contacts followed across 30 countries, the Rotterdam disinfection — have justifiably dominated coverage. But the laboratory work that has run in parallel at INRB Kinshasa, NICD Johannesburg, Geneva University Hospitals (HUG), and the Argentina Maiztegui Institute archive is what will, over the coming weeks and months, settle the operational questions that the WHO 22 May media briefing left open: how the cluster started, what its real transmission window was, and what the right environmental hypothesis for the index case is.'],
      ['h3', 'What Has Been Deposited'],
      ['p', 'As of the WHO 22 May briefing, partial S, M and L segment sequences from at least eight of the cluster’s PCR-confirmed cases have been generated. The sequences have been shared inside the WHO laboratory network and a subset have been deposited in the public GenBank archive. The samples represent the index Dutch case, the Johannesburg evacuee, the German national, the French Bichat patient, and a subset of the Spanish, US and UK passengers. The Argentina Maiztegui Institute archive has been queried for genetically similar 2024 and 2025 Patagonia isolates as the comparison reference for the environmental-origin hypothesis.'],
      ['h3', 'What the Phylogeny Shows So Far'],
      ['p', 'The available phylogenetic work shows that the MV Hondius isolates cluster tightly with one another — strong evidence that the cases are linked by a single recent introduction rather than parallel zoonotic events at different ports of call. The isolates also cluster closest to a small subset of recent southern-Argentina Patagonia reference sequences from the Maiztegui Institute archive, particularly isolates from rural Río Negro and Chubut provinces collected in 2024 and 2025. The phylogenetic distance to the Argentina reference set is small enough to be consistent with a recent environmental zoonotic introduction; the within-cluster distance among the shipboard isolates is small enough to be consistent with a short transmission chain across the four-week voyage.'],
      ['h3', 'The Working Origin Hypothesis'],
      ['p', 'The working hypothesis that WHO has stated in successive briefings is that the index case acquired the virus before boarding the MV Hondius — most likely from environmental exposure during activities in Argentina — with subsequent transmission between very close shipboard contacts. The phylogenetic clustering of the shipboard isolates with the recent southern-Argentina Patagonia reference sequences is the strongest published support for that hypothesis. It does not by itself rule out a port-of-call environmental exposure at Saint Helena, Cape Verde or Tristan da Cunha, but the genomic signal makes the Patagonia hypothesis the operative working model.'],
      ['h3', 'What the Within-Cluster Distance Tells Us About the Transmission Window'],
      ['p', 'The within-cluster phylogenetic distance — the degree to which the shipboard isolates differ from one another — is informative about the true transmission window. A very small within-cluster distance is consistent with a short transmission chain across a single voyage; a larger distance would suggest multiple parallel introductions or a longer chain. The published partial-segment work is consistent with a short chain. That is operationally important because it makes the seven receiving-country cohorts under WHO 42-day monitoring the closing leg of the cluster rather than a step inside a longer ongoing chain.'],
      ['h3', 'What Is Still Open'],
      ['p', 'Two questions remain genuinely open. The first is whether the eight published partial-segment sequences will be matched by full-genome sequences for all twelve PCR-confirmed cases in the cluster. The second is whether the Argentina reference set will be expanded to include 2026 Patagonia field collections in the same window — if the index case was exposed in March or early April 2026, a 2026 environmental reference is the cleanest match. Both questions are inside the WHO Research & Development Blueprint working group’s scope and both are expected to be settled inside the 42-day window.'],
      ['em', 'Last updated · 2026-05-28 · Sources: WHO Research & Development Blueprint for Epidemics, INRB Kinshasa laboratory briefings, NICD Johannesburg outbreak laboratory update, Geneva University Hospitals statements, Maiztegui Institute Andes virus reference archive overviews.']
    ]
  },

  { cat: 'Guide', catClass: 'cat-prevention', date: 'May 27, 2026', readTime: '7 min read',
    title: 'Hantavirus and Property Values: What Real-Estate Disclosures, Cleanup Costs and Title Insurance Actually Look Like When a Home Has Documented Rodent Contamination',
    excerpt: 'Hantavirus is rare and household exposure is rarer still — but when a property has documented rodent contamination, the real-estate process changes in concrete ways. This guide walks through how state and federal disclosure regimes treat hantavirus risk, what professional remediation typically costs, how title insurance interacts with environmental hazards, and what the historical case literature shows about the impact on listing price and time on market.',
    icon: '🏠',
    body: [
      ['p', 'Hantavirus is a low-incidence, high-consequence disease. The number of cases per year in the United States is small (fewer than 1,000 since national surveillance began in 1993) and the number of homes implicated in those cases is smaller still. But when a home does have documented rodent contamination — droppings in an attic, a crawl-space infestation, an outbuilding that has been closed for months — the real-estate process changes in concrete ways that buyers, sellers and agents in endemic regions should understand.'],
      ['h3', 'What State Disclosure Regimes Require'],
      ['p', 'Real-estate disclosure law in the United States is state-by-state, and there is no federal hantavirus-specific disclosure requirement. The general principle, applied in roughly forty states under various forms of the seller property disclosure act, is that a seller must disclose known material defects affecting the value or habitability of the property. Documented rodent infestation typically meets that threshold; documented hantavirus exposure in a previous occupant unambiguously meets it. The practical operational answer is to disclose in writing, in the seller property disclosure form, the existence of any documented rodent contamination and the steps taken to remediate it.'],
      ['h3', 'Professional Remediation: What It Actually Costs'],
      ['p', 'Professional rodent contamination remediation, performed to CDC standards, is not a homeowner-DIY project once contamination has accumulated past the small-area threshold (an isolated cabinet or drawer can be handled by a homeowner in PPE; a contaminated attic, crawl space or storage room should not). Quoted remediation costs from licensed industrial-hygiene contractors typically run between $1,500 and $8,000 for a residential job, with the upper end reflecting attic-and-insulation removal plus HVAC ductwork cleaning. The remediation typically includes wet-disinfection to CDC protocol, removal and disposal of contaminated insulation and porous materials, HVAC duct cleaning where applicable, and post-remediation clearance sampling. The cost is often partially or fully covered by homeowner insurance under the rodent or vermin exclusion language — coverage varies by carrier and policy.'],
      ['h3', 'Title Insurance and Environmental Hazards'],
      ['p', 'Title insurance protects against defects in title, not against environmental conditions on the property, so a hantavirus contamination event would not typically trigger a title insurance claim. What it can affect is the closing process. If a documented remediation event is on file with the local public health department, the title commitment may flag it; in practice the more consequential interaction is the lender requirement for a post-remediation clearance certificate before funding. Lenders financing FHA, VA or USDA-guaranteed loans in particular tend to require documented clearance.'],
      ['h3', 'What the Case Literature Shows About Listing Price and Time on Market'],
      ['p', 'There is no large-sample published study isolating the price effect of hantavirus contamination on residential listings, because the event is rare enough that it does not show up in standard hedonic-pricing analyses. What the case literature shows from individual remediated properties in New Mexico, Arizona and Colorado following well-publicised outbreak years is that fully remediated properties with documented clearance certificates have generally returned to comparable-market pricing after a discount of roughly 3 to 8 percent and a time-on-market extension of roughly 30 to 90 days. Unremediated properties, predictably, show much larger discounts and longer marketing times.'],
      ['h3', 'The Seller Checklist'],
      ['p', 'For a seller in an endemic region with documented rodent contamination, the operative checklist is short. First: disclose in writing, in the property disclosure form, with the dates and scope of any rodent activity. Second: commission professional remediation to CDC standards from a licensed industrial-hygiene contractor, and retain the post-remediation clearance certificate. Third: confirm the homeowner insurance carrier has been notified and the claim has been processed. Fourth: provide the buyer-side agent with copies of the disclosure, the remediation contract and the clearance certificate as part of the initial offer package.'],
      ['h3', 'The Buyer Checklist'],
      ['p', 'For a buyer evaluating a property in an endemic region, the operative checklist is also short. First: read the seller property disclosure carefully and ask follow-up questions about any rodent or pest history. Second: include a wildlife and rodent inspection as part of the standard home inspection contingency. Third: in the case of a documented prior remediation, request the clearance certificate and the contractor scope of work. Fourth: ask the homeowner insurance broker to quote a policy with explicit hantavirus or vermin coverage, which is available in most carriers but not always included by default. Hantavirus contamination is rare enough that it should not deter a purchase of a remediated property; an unremediated property is a different conversation.'],
      ['em', 'Last updated · 2026-05-27 · Sources: CDC Hantavirus environmental cleanup guidance, state property disclosure act overviews, industrial-hygiene remediation cost surveys 2024-2025, FHA Single Family Housing Policy Handbook, residential pricing case-study series from regional MLS data.']

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 26, 2026', readTime: '7 min read',
    title: 'Hantavirus in Children: What Parents Need to Know About Pediatric Hantavirus Pulmonary Syndrome, Symptom Recognition, and Practical Household Prevention in Endemic Regions',
    excerpt: 'Pediatric hantavirus pulmonary syndrome is rare but distinctive. Children present similarly to adults — a 1-to-8 week incubation followed by a flu-like prodromal phase that can shift into rapid respiratory deterioration within hours. This guide walks parents through what the published evidence shows about pediatric HPS, how to spot the early warning signs in children too young to articulate symptoms, and the practical household prevention steps the CDC recommends for families living in or visiting endemic regions.',
    icon: '👶',
    body: [
      ['p', 'Pediatric hantavirus pulmonary syndrome is rare. Fewer than 1,000 HPS cases have been recorded in the United States since national surveillance began in 1993, and only a small fraction of those have occurred in children under 18. But the case fatality rate in published pediatric series is broadly comparable to the adult rate — roughly one in three — and the speed of the cardiopulmonary phase makes early recognition the single most consequential variable parents can influence.'],
      ['h3', 'What Pediatric HPS Looks Like'],
      ['p', 'The published clinical picture in children matches adults closely. After a one-to-eight-week incubation following exposure to infected rodent excreta, the prodromal phase opens with high fever (often 39-40°C), severe muscle aches concentrated in the large muscle groups of the back, thighs, hips and shoulders, headache, fatigue, and gastrointestinal symptoms — nausea, vomiting, abdominal pain, sometimes diarrhea. Children may have additional flushing of the face and chest. The prodromal phase usually lasts three to five days.'],
      ['p', 'The pivot to the cardiopulmonary phase can happen within hours. The defining symptom is shortness of breath — initially mild dyspnea on exertion, then resting dyspnea, then frank acute respiratory distress as the alveolar capillaries leak fluid. Pulse oximetry typically drops below 95% before respiratory distress is visually obvious in younger children, and dropping oxygen saturation is the single best early indicator parents can monitor at home.'],
      ['h3', 'The Two-Sentence Rule for Parents'],
      ['p', 'For families in or returning from endemic regions, the operative two-sentence rule is straightforward. First: any child with fever, severe muscle aches, and possible rodent exposure within the past eight weeks should be evaluated immediately by a clinician, with hantavirus on the differential. Second: any child presenting with new shortness of breath in that same context should go directly to an emergency department — not urgent care — because the cardiopulmonary phase can require ICU admission and mechanical ventilation within hours.'],
      ['h3', 'Practical Household Prevention'],
      ['p', 'The CDC household prevention framework for hantavirus has three legs: seal, trap, clean. Seal: rodents can enter through any gap larger than a quarter inch. Stainless steel mesh packed tightly into entry points and finished with caulk is the CDC-recommended permanent seal. Trap: snap traps (not glue traps; glue traps cause stressed rodents to urinate, raising aerosolization risk) set near walls where mice travel. Clean: never dry sweep or vacuum potentially contaminated areas — always wet-disinfect first with an EPA-approved disinfectant, wait five minutes, then wipe with gloves and an N95.'],
      ['h3', 'Special Considerations for Vacation Cabins and Outbuildings'],
      ['p', 'The highest-risk pediatric exposure scenarios in the published case literature are vacation cabins, sheds, garages and outbuildings that have been closed for weeks or months. The CDC recommends opening doors and windows for at least 30 minutes before re-entry, then wet-disinfecting horizontal surfaces (counters, floors, mattresses) before children are allowed inside. Sleeping bags and pet beds stored long-term should be sealed in plastic containers; airing-out alone is not sufficient.'],
      ['h3', 'When to Seek Care vs. When to Wait'],
      ['p', 'The published evidence supports a low threshold for clinician evaluation when both exposure and prodromal symptoms are present. The published evidence does not support routine prophylactic testing of asymptomatic children after possible rodent contact — most exposures do not result in infection, and PCR is most reliable once the prodromal phase begins. The decisive variables are (1) oxygen saturation, (2) breathing rate, (3) work of breathing (nasal flaring, retractions, head bobbing in infants). Any of those degrading is the threshold for emergency evaluation.'],
      ['em', 'Last updated · 2026-05-26 · Sources: CDC Hantavirus clinical guidance, NEJM pediatric HPS case series, Argentine Andes virus pediatric case reports, WHO hantavirus factsheet.']
    ]
  },

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 25, 2026', readTime: '7 min read',
    title: 'Hantavirus in Dogs and Pets: What the Published Evidence Actually Shows About Animal Susceptibility, Household Risk and Practical Steps for Pet Owners',
    excerpt: 'After every hantavirus cluster reaches the news cycle, pet owners want to know whether dogs, cats and other household animals can catch hantavirus, carry it asymptomatically, or transmit it back to humans. The published evidence is more nuanced than a single-line answer, but the operational message for households in endemic regions is clear and short. Here is what the literature actually shows and what it does not.',
    icon: '🐕',
    body: [
      ['p', 'After every cluster of hantavirus pulmonary syndrome (HPS) reaches the news cycle, pet owners in Andes virus and Sin Nombre virus endemic regions — and pet owners asking the question after the 2026 MV Hondius cluster — want to know one thing: can their dog, cat or other household animal catch hantavirus from infected rodents in the yard, carry the virus asymptomatically, or pass it back to a human in the household? The published evidence is meaningfully more nuanced than a one-line answer, but the operational message is short.'],
      ['h3', 'Can Dogs and Cats Get Hantavirus?'],
      ['p', 'The published evidence is consistent: dogs and cats do not become clinically ill from hantavirus infection in the way humans do. Serological surveys in Sin Nombre virus and Andes virus endemic regions have occasionally detected antibodies against hantaviruses in dogs and cats — implying past exposure — but those animals were not reported to have developed clinical HPS or HFRS. The reservoir for New World hantaviruses (including Sin Nombre and Andes) is rodents in the family Cricetidae, and the reservoir for Old World hantaviruses is rodents in the family Muridae. Domestic dogs and cats are not part of the maintenance host community for any hantavirus described in the published literature.'],
      ['h3', 'Can Pets Carry Hantavirus Back to a Human?'],
      ['p', 'The honest answer is that there is no published evidence of dog-to-human or cat-to-human hantavirus transmission. Hantaviruses are transmitted primarily by aerosolisation of contaminated rodent excreta — urine, droppings or saliva — and secondarily, for Andes virus only, by very close prolonged human-to-human contact. The vector for that aerosol exposure is the rodent and the contaminated environment, not the household pet. The CDC, WHO and the major published reviews are all aligned on this: there is no documented case of hantavirus being acquired from a household dog or cat.'],
      ['h3', 'Where Pets Sit in the Household Risk Equation'],
      ['p', 'That said, pets sit indirectly in the household risk equation in two practical ways. First, cats that hunt rodents may bring partially-eaten rodents, rodent fur or rodent droppings into the home. Disposing of a freshly killed rodent or cleaning a contaminated soft-furnishing area introduces the same aerosolisation risk as cleaning a rodent-affected outbuilding: wet-disinfect rather than dry-sweep; use the CDC standard of a 1:10 dilution of household bleach with at least five minutes of contact time; wear an N95 respirator, sealed goggles, and nitrile gloves. Second, outdoor dog kennels in rodent-dense areas can attract rodent activity, and the bedding inside the kennel can accumulate rodent droppings over time. The CDC recommendation is to keep dog food and water bowls inside enclosed containers, sweep up after each meal, and inspect the kennel bedding for rodent activity at the same monthly cadence as the rest of the property.'],
      ['h3', 'Practical Steps for Pet Owners in Endemic Regions'],
      ['p', 'For households living in Andes virus or Sin Nombre virus endemic regions, the practical risk-reduction list is short and high-yield. Keep dog and cat food in sealed hard-sided containers rather than open bags. Inspect dog kennels and outdoor pet sleeping areas monthly for rodent droppings, urine staining, or chewed bedding. If a cat brings home a killed rodent, do not dry-sweep — bag it in a doubled contractor-grade bag, wet-disinfect the area with a 1:10 bleach solution and five-minute contact time, and dispose of the bag through standard household waste. Wear gloves and an N95 respirator during cleanup. Coordinate with the household veterinarian if the family is in a known endemic region — the veterinarian does not need to test the pet for hantavirus (there is no clinically useful test for pets), but they can flag environmental risk factors and discuss kennel and feeding hygiene.'],
      ['h3', 'What This Means for the MV Hondius Cohort and the General Public'],
      ['p', 'For the 2026 MV Hondius cluster specifically, none of the human cases is linked to a household pet. The receiving-country contact-tracing operations focus on close human contacts, healthcare workers, and shared shipboard spaces — not pets. For the general public asking about household pet risk after seeing the cruise-ship cluster in the news, the published evidence does not support routine pet behaviour changes outside of standard rodent-exclusion hygiene. The single highest-yield intervention remains the same as the most important household intervention: wet-disinfect any rodent-affected area, do not dry-sweep, and keep food and feed in sealed containers.'],
      ['h3', 'The Honest Read'],
      ['p', 'Hantavirus is a rodent-borne disease. Dogs and cats are not part of the reservoir community. There is no published evidence of pet-to-human transmission. The practical risk equation for pet-owning households in endemic regions is dominated by rodent control and cleanup hygiene, not pet behaviour. The CDC, WHO and the published literature are all aligned on this — and the rule of thumb has not changed because of the MV Hondius cluster.'],
      ['em', 'Last updated · May 25, 2026 · Sources: CDC Hantavirus Disease Information for Health Care Professionals, WHO Hantavirus Fact Sheet, peer-reviewed canine and feline hantavirus seroprevalence studies (Malecki TM et al.; Bagamian KH et al.), CDC HPS Registry, Argentine Ministry of Health Andes virus epidemiology bulletins.'],
    ],

  { cat: 'Science', catClass: 'cat-science', date: 'May 25, 2026', readTime: '7 min read',
    title: 'What Happens After Day 42: The Operational Step-Down From WHO Active Monitoring to Post-Window Surveillance for the MV Hondius Cohort',
    excerpt: 'The WHO 42-day active monitoring window for the roughly 122 repatriated MV Hondius passengers and crew closes on June 21, 2026. What actually happens on Day 43 — and what the receiving-country surveillance systems will continue to do after the formal window ends — is meaningfully more structured than a simple "monitoring stops" headline. Here is what the published WHO protocol and the receiving-country public-health-institution playbooks actually prescribe for the post-window phase.',
    icon: '📅',
    body: [
      ['p', 'The WHO 42-day active monitoring window for the roughly 122 repatriated MV Hondius passengers and crew closes on June 21, 2026. With the cluster currently characterised by WHO as stabilising, the next operational question for the receiving-country public-health-institution playbooks is what happens on Day 43 — the day after the formal window closes. The honest answer is that monitoring does not stop. It steps down. Here is how that step-down actually works.'],
      ['h3', 'From Active to Passive Surveillance'],
      ['p', 'The published WHO Andes virus active monitoring protocol prescribes daily symptom checks for each cohort member through the full 42-day window, with same-day medical evaluation for any reported prodromal-stage symptom. On Day 43 — the day after the formal window closes — that daily-check requirement converts to passive surveillance. Cohort members no longer have to call in each day; the receiving-country public-health-institutions transition to a self-report model with a clear "call the institution at any sign of fever, severe muscle aches or shortness of breath in the next 28 days" instruction. The receiving-country institutions also retain the cohort member contact data through at least the end of 2026 in case any retrospective epidemiological work is needed.'],
      ['h3', 'Why 28 More Days of Passive Surveillance'],
      ['p', 'The 28-day passive tail reflects the difference between the WHO conservative active-window upper bound (42 days) and the conservative outer bound of published Andes virus incubation distributions (eight weeks = 56 days from exposure). The exposures relevant to the MV Hondius cluster all closed by the time the ship docked in Rotterdam on May 18, and most of the high-risk exposures closed weeks earlier on board or in the early evacuation phase. By Day 56 from the latest plausible shipboard exposure, no symptomatic case should still be incubating.'],
      ['h3', 'What the Receiving-Country Institutions Do Differently After Day 42'],
      ['p', 'The Netherlands (RIVM and GGD Rotterdam), France (Santé Publique France and the Bichat infectious disease service), Spain (Spanish Public Health Commission), Germany (RKI and the high-containment-unit clinical team), the United States (CDC and the UNMC National Quarantine Unit in Omaha), Canada (PHAC and the BC Provincial Health Officer), and the smaller-cohort receiving countries each step down on their own published timelines. The shared elements are: a structured close-out interview with each cohort member; a final PCR sample bank for any future retrospective work; the formal release of any remaining in-facility quarantine; and a clear advisory letter to each cohort member that itemises which symptoms still warrant a call to the institution and through what date.'],
      ['h3', 'The Calandsteiger 7 Crew Quarantine Is Longer Than the Cohort Window'],
      ['p', 'The 20 non-Dutch crew (17 Filipino, 3 Ukrainian) on Calandsteiger 7 are on a six-week (42-day) quarantine that started after their disembarkation from the MV Hondius, which dates from the ship\'s 18 May arrival in Rotterdam. Their formal release date is therefore later than the broader cohort\'s — late June rather than mid-June — and they remain on the more conservative six-week separate-cabin protocol through that release.'],
      ['h3', 'The MV Hondius Itself Is on a Separate Operational Clock'],
      ['p', 'The disinfection of the MV Hondius at the Rotterdam jetty is a separate operational thread from the cohort monitoring. The published cleaning cycle is three to four days from the start of the wet-disinfection pass through environmental sampling and clearance. Oceanwide Expeditions still targets a 13 June redeparture from Longyearbyen, Svalbard. That date is a function of the disinfection finish, an unladen reposition voyage from Rotterdam to Svalbard, and a clean handover before the first passenger boarding. None of those legs has slipped in the past 48 hours.'],
      ['h3', 'What the Step-Down Means for the General Public'],
      ['p', 'For travellers, residents of receiving countries, and anyone reading the MV Hondius cluster from a distance, the practical implication of the Day 42 step-down is simple. The maritime phase of the cluster closed when the ship docked in Rotterdam on May 18. The active-monitoring phase closes on June 21 if the cluster continues to stabilise. The passive-surveillance phase closes on or around July 19 (Day 56 from the latest plausible shipboard exposure). At each step the WHO and ECDC working risk assessment to populations outside the ship-based cohort remains low. None of those step-downs reduces the basic standing advice for travellers into Andes virus endemic regions of Argentina and Chile: avoid rodent contact, wet-disinfect rather than dry-sweep, and present early if febrile symptoms develop.'],
      ['em', 'Last updated · May 25, 2026 · Sources: WHO Director-General opening remarks at the media briefing on outbreaks of Ebola and hantavirus (22 May 2026), ECDC Andes hantavirus update 21 May 2026, WHO Disease Outbreak News DON601, CDC Andes Virus Outbreak on a Cruise Ship situation summary, RIVM and GGD Rotterdam advisories, Spanish Public Health Commission active-monitoring protocols, peer-reviewed Andes virus incubation literature (Ferres M et al.; Castillo C et al.).'],
    ],
  },
  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 25, 2026', readTime: '7 min read',
    title: 'Hantavirus and Property Values: What Buyers, Sellers and Vacation-Rental Owners Should Actually Know About Andes Virus and Sin Nombre Virus Disclosure in Endemic Regions',
    excerpt: 'Hantavirus has surfaced as a real-estate question in two endemic geographies: the Andes virus footprint of southern Argentina and Chile, and the Sin Nombre virus footprint of the US Four Corners and Pacific Northwest. After every hantavirus cluster in the news cycle, prospective buyers and vacation-rental owners ask the same set of disclosure, inspection and remediation questions. The honest answers are more nuanced than the headlines suggest but operationally simple.',
    icon: '🏠',
    body: [
      ['p', 'After every hantavirus cluster reaches the news cycle, prospective property buyers, current owners, and short-term-rental operators in endemic regions ask the same set of questions: does hantavirus depress property values; should a buyer ask about it during inspection; what does effective remediation actually look like; and how should a vacation-rental listing handle the issue in disclosure language. The 2026 MV Hondius cluster has been no exception. The published evidence and the operational state-by-state and country-by-country regulatory picture both support a more nuanced answer than the headlines.'],
      ['h3', 'Does Hantavirus Affect Property Values?'],
      ['p', 'The honest answer is mostly no, with two important exceptions. In most of the Andes virus endemic footprint (southern Argentina and Chile) and the Sin Nombre virus endemic footprint (the US Four Corners and the Pacific Northwest), background hantavirus risk is part of the regional context and is not separately priced into property values for primary residences in well-maintained urban or suburban housing. The two exceptions are properties with documented heavy rodent infestation in the inspection record, and remote cabins or outbuildings in known high-risk habitat where the cleanup history is unknown or absent.'],
      ['h3', 'What a Buyer Should Actually Ask During Inspection'],
      ['p', 'For any property purchase in an endemic region, the high-yield inspection questions are operational rather than legal. Has the property had a documented rodent infestation in the past three years, and if so, what was the remediation? Is the crawl space, attic, garage and any outbuilding visually clear of rodent droppings, nesting material or chewed insulation? Have all known entry points been sealed with appropriate exclusion materials (steel mesh, sealed caulk)? Is the heating, ventilation and air-conditioning system free of evidence of rodent activity? Are food-storage areas in the kitchen, pantry and any outbuildings in hard-sided sealed containers? These are the inspection questions that translate directly into post-purchase risk-reduction work, and they are useful regardless of the regional hantavirus footprint.'],
      ['h3', 'What Effective Remediation Actually Looks Like'],
      ['p', 'Effective hantavirus remediation in a single-family residence in an endemic region runs on the CDC standard cleanup protocol. The protocol prescribes: wet-disinfect contaminated surfaces with a 1:10 dilution of household bleach with at least five minutes of contact time; never dry-sweep; wear an N95 respirator, sealed goggles and nitrile gloves; double-bag rodent material and droppings in contractor-grade bags; remove visibly contaminated soft furnishings entirely; replace HVAC filters; and seal all entry points with steel mesh and appropriate caulk. For properties with heavy infestation, professional remediation costs a few hundred to a few thousand dollars depending on square footage and scope, and is a small share of typical home values in most endemic regions.'],
      ['h3', 'Vacation-Rental Disclosure and Listing Language'],
      ['p', 'Short-term-rental operators in endemic regions sit in a slightly different operational space from primary-residence owners. The guests are not familiar with the regional rodent picture; they are not inspecting the property; and they expect the operator to have already done the work. The defensible practice is a documented annual pest-management inspection on file, a documented seasonal rodent-droppings inspection of the property\'s outbuildings and crawl spaces, sealed food storage at the property, and listing language that does not market the property as "rural cabin in pristine rodent habitat" without also describing the rodent-exclusion infrastructure. A good vacation-rental listing in an endemic region describes the rodent-exclusion work as a positive feature rather than burying it.'],
      ['h3', 'Country-Specific Regulatory Picture'],
      ['p', 'There is no national or provincial-level mandatory hantavirus disclosure regulation in either the United States or Argentina or Chile comparable to the disclosure regulations covering, for example, lead-based paint or mould in some US states. The practical disclosure obligation runs through general property-condition disclosure law in each jurisdiction: if the seller knows of a current or recent rodent infestation, the seller has the same obligation to disclose it as they would for any other latent property condition. The cleanup history and pest-management records are useful supplementary documents to keep with the property file.'],
      ['h3', 'The Honest Read'],
      ['p', 'Hantavirus is a low-probability but high-consequence infection that is part of the regional context in well-defined endemic geographies. It is not a meaningful driver of property values for well-maintained properties with documented rodent-exclusion work. It is a real consideration for properties with documented heavy infestation or remote cabins with unknown cleanup histories. The single highest-yield action a buyer, owner, or short-term-rental operator can take is operational rather than legal: do the inspection, do the remediation, do the exclusion work, and keep the documentation. The headline numbers will not move because of any one property, but the regional risk picture is reduced one well-maintained property at a time.'],
      ['em', 'Last updated · May 25, 2026 · Sources: CDC Hantavirus Disease Information for Health Care Professionals, CDC Cleaning Up After Rodents, US Department of Housing and Urban Development pest-management guidance, Argentine Ministry of Health Andes virus epidemiology bulletins, Chilean Ministry of Health rural-cabin advisories, US state-level real-estate disclosure law summaries.'],

  { cat: 'Tips', catClass: 'cat-tips', date: 'May 24, 2026', readTime: '7 min read',
    title: 'Hantavirus Prognosis: What the Published Evidence Actually Predicts About Recovery, ICU Outcomes and Long-Term Sequelae',
    excerpt: 'After every cluster of hantavirus pulmonary syndrome (HPS) reaches the news, the most common patient-facing question is the same: what is the prognosis? The published evidence is meaningfully more granular than a single case-fatality number. Here is what the literature says about acute survival, ICU recovery trajectories, ECMO outcomes, and the long-term sequelae picture after discharge.',
    icon: '🩺',
    body: [
      ['p', 'After every cluster of hantavirus pulmonary syndrome (HPS) reaches the news cycle, the most common patient-facing question is the most basic: what is the prognosis? The 2026 MV Hondius cluster is no exception — receiving-country clinical teams in Paris, Madrid, Atlanta, Omaha and Rotterdam are now nine to twelve days into supportive care for hospitalised passengers, and the families want to know what the published evidence actually predicts about recovery. The honest answer is more granular than a single case-fatality number.'],
      ['h3', 'The Headline Number: Roughly 36 to 50 Percent Case Fatality for HPS'],
      ['p', 'The published CDC HPS Registry places the overall case-fatality rate for hantavirus pulmonary syndrome in the Americas at approximately 36 percent across all ages and all New World hantavirus strains combined. For Andes virus specifically — the strain at the centre of the 2026 MV Hondius cluster, endemic to southern Argentina and Chile — published cohort reports from the Servicio de Salud Magallanes (Chile) and the Argentine paediatric and adult HPS literature place the case-fatality rate at roughly 35 to 50 percent depending on outbreak setting. These are population averages over decades of surveillance and they do not predict any individual patient\'s outcome.'],
      ['h3', 'What Survives the Prodromal Phase: A Conditional Survival Picture'],
      ['p', 'A more useful way to read the data than a single headline case-fatality rate is conditional survival. Patients who present early — during the prodromal phase or at the start of the cardiopulmonary phase — and reach a tertiary intensive care unit with mechanical ventilation and ECMO capacity have published outcomes meaningfully better than the headline average. Patients who deteriorate at home or who present late after the cardiopulmonary phase has begun fare worse. The single most consistent predictor in the published literature is not age, sex or comorbidity — it is time-to-care.'],
      ['h3', 'ECMO: A Tool, Not a Cure'],
      ['p', 'Extracorporeal membrane oxygenation has shifted the survival curve for severe Andes HPS at high-volume centres. The most-cited Chilean Andes virus cohort reports approximately 60 percent survival on ECMO for patients with severe HPS who would otherwise have died from refractory cardiopulmonary failure. The underlying pathology helps explain why ECMO works as well as it does: HPS is a short-lived capillary leak that lasts roughly four to seven days; ECMO supports oxygenation and circulation through that window without the lung-injuring high airway pressures of conventional mechanical ventilation at this severity. The strongest predictor of ECMO success is time-to-cannulation, with patients placed on the circuit within 24 hours of cardiopulmonary deterioration faring meaningfully better than those put on the circuit after several days of high-pressure ventilation.'],
      ['h3', 'The Recovery Trajectory: Weeks of Acute Care, Months of Reconditioning'],
      ['p', 'Patients who survive the acute cardiopulmonary phase of HPS typically follow a recovery trajectory measured in weeks for the acute hospitalisation and months for the post-discharge reconditioning period. The acute hospital stay is dominated by mechanical ventilation and, in severe cases, ECMO; weaning timelines are individual but ICU stays of two to four weeks are common in the published severe-case literature. After discharge, patients commonly report deconditioning, prolonged fatigue, and reduced exercise tolerance for weeks to months, broadly consistent with the post-ICU syndrome described for other severe ARDS aetiologies.'],
      ['h3', 'Long-Term Sequelae: A Smaller Footprint Than Many Expect'],
      ['p', 'The published long-term follow-up literature for HPS survivors is thinner than the acute-care literature but converges on a relatively reassuring picture. Most survivors of severe HPS recover lung function to within or near baseline within six to twelve months, including patients who required ECMO during the acute phase. A minority report persistent reduced exercise tolerance, mild restrictive lung changes on pulmonary function testing, or post-ICU psychological sequelae, but a sustained severe long-term respiratory disability is uncommon in published survivor cohorts. The kidney is not a primary target organ in HPS (it is in HFRS), and long-term renal sequelae are not a typical feature of HPS recovery.'],
      ['h3', 'What This Means for the MV Hondius Cohort'],
      ['p', 'For the MV Hondius cohort specifically, the prognosis picture as of Day 12 of the WHO 42-day monitoring window reads in three layers. First, the cluster as a whole has been characterised as stabilising by WHO: no new PCR-positive results across receiving countries in the past four days, and the case-fatality rate within the cluster (3 deaths against 12 cases) sits at approximately 25 percent — below the historical Andes virus average. Second, the French passenger at Bichat-Claude Bernard remains the most critically ill member of the cohort and the single most-watched clinical data point. Third, the broader receiving-country cohorts — the 18 American passengers at UNMC, the Madrid cohort, the Calandsteiger 7 crew quarantine — remain asymptomatic on standard active-monitoring protocols and the working risk assessment from WHO and ECDC continues to read low.'],
      ['h3', 'Reading the Prognosis Honestly'],
      ['p', 'Case-fatality rates are population statistics, not individual prognoses. Two patients with the same age, the same strain and the same comorbidity profile can have very different outcomes based on time-to-care, baseline cardiopulmonary reserve, and the experience of the receiving centre. The single highest-yield intervention available to a patient or a family is the same one the WHO and CDC have stressed throughout the MV Hondius cluster: know the prodromal symptoms, present urgently if they appear, name the exposure history at triage, and accept rapid escalation to a tertiary ICU at the first sign of respiratory or haemodynamic deterioration.'],
      ['em', 'Last updated · May 24, 2026 · Sources: CDC Hantavirus Disease Information for Health Care Professionals, CDC HPS Registry surveillance summaries, WHO Hantavirus Fact Sheet, Servicio de Salud Magallanes (Chile) Andes virus ECMO cohort (Castillo C et al.), Argentine Ministry of Health Andes virus epidemiology bulletins, peer-reviewed HPS long-term follow-up literature (Pini N et al.; Riquelme R et al.), WHO Disease Outbreak News DON601.'],
    ],
  },

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 23, 2026', readTime: '6 min read',
    title: 'Hantavirus and Children: What the Published Evidence Actually Shows About Risk, Symptoms and the Pediatric Cardiopulmonary Phase',
    excerpt: 'Parents in Andes virus and Sin Nombre virus endemic regions — and parents asking the question after the MV Hondius cluster — want to know whether children face a different hantavirus risk profile than adults. The published evidence is thinner than the question deserves but more nuanced than a one-line answer. Here is what the pediatric hantavirus literature actually shows about exposure, symptoms, severity and the operational rule for early presentation.',
    icon: '🧒',
    body: [
      ['p', 'One of the most common parent-facing questions after every cluster of hantavirus pulmonary syndrome (HPS) reaches the news cycle is whether children face a different risk profile than adults. The 2026 MV Hondius cluster has been no exception. The published pediatric hantavirus literature is meaningfully thinner than the published adult literature — children are a small share of the global HPS case count to begin with — but it is not silent, and the operational message for parents in Andes virus or Sin Nombre virus endemic regions is more useful than a single-line answer.'],
      ['h3', 'What the Pediatric Literature Actually Shows'],
      ['p', 'The largest pediatric Andes virus case series come out of Argentina and Chile, where Andes virus is endemic. The peer-reviewed Castillo and colleagues series at Servicio de Salud Magallanes in Chile and the Argentine paediatric HPS literature together describe roughly several dozen pediatric cases over the past 25 years. Two consistent patterns emerge. First, pediatric HPS is rarer per capita than adult HPS, which probably reflects exposure patterns more than host susceptibility — children in endemic regions are less likely to be the household member who cleans an outbuilding or sleeps in a rural cabin. Second, when pediatric HPS does occur, the cardiopulmonary phase can be just as severe as in adults, and pediatric ECMO has been used as rescue therapy in the Chilean series with outcomes broadly comparable to adult ECMO in the same setting.'],
      ['h3', 'How Pediatric Symptoms Differ From Adult'],
      ['p', 'The early prodromal phase of pediatric HPS is essentially the same as the adult prodromal phase: fever (38–40°C), severe muscle aches, headache, nausea, vomiting and abdominal pain. In smaller children the abdominal symptoms — pain, nausea, vomiting — can dominate the early presentation and can be mistaken for a viral gastroenteritis. The transition from prodromal to cardiopulmonary phase can be more abrupt in pediatric cases than in adult cases, with the four-to-seven-day window after symptom onset being just as decisive in deciding who survives. The operational rule for parents is the same as the operational rule for adults: any unexplained shortness of breath, low blood-oxygen saturation, or worsening lethargy in a child with a recent prodromal-stage febrile illness in an endemic region is a same-day medical evaluation, not a phone call.'],
      ['h3', 'Exposure Patterns: Where Pediatric Risk Concentrates'],
      ['p', 'The pediatric exposure profile in Andes virus endemic regions of Argentina and Chile concentrates in three places. The first is summer recreation in rural Patagonia: family camping, hiking and cabin rentals in long-tailed pygmy rice rat habitat. The second is rural living in outbuildings without good rodent exclusion, where children sleep in shared sleeping spaces with adults. The third — and the smallest — is direct contact with an HPS index case in the household, where the published Andes person-to-person transmission risk concentrates among very close prolonged contacts including children of an infected parent. For Sin Nombre virus endemic regions of the US Four Corners and the Pacific Northwest, the exposure profile is dominated by environmental cleanup in long-unoccupied cabins and storage spaces — children are at risk when they help with that cleanup, not from incidental travel through endemic regions.'],
      ['h3', 'Practical Steps for Parents in Endemic Regions'],
      ['p', 'For parents living in or travelling through Andes virus or Sin Nombre virus endemic regions, the practical risk-reduction list is short and high-yield. Do not let children participate in cleanup of long-unoccupied cabins, outbuildings, attics or storage spaces. If a family member is doing that cleanup, the children should be out of the building during the wet-disinfection pass and for at least one hour afterward. Wet-disinfect rather than dry-sweep; the CDC standard is a 1:10 dilution of household bleach, at least five minutes of contact time, and N95 respirators, sealed goggles, and nitrile gloves for the adults doing the work. Do not let children sleep on the ground in rodent-dense areas. Coordinate with the family\'s pediatrician on what symptoms should trigger a same-day evaluation if the family is travelling into an endemic region.'],
      ['h3', 'The Honest Read'],
      ['p', 'Pediatric hantavirus is a low-probability but high-consequence infection. Children in endemic regions do not face a meaningfully different background risk from adults; what they face is a slightly different exposure pattern and a slightly higher chance of early-phase symptoms being mistaken for viral gastroenteritis. The single most important parent-facing rule is the same as the most important adult-facing rule: any unexplained shortness of breath after a recent prodromal-stage febrile illness in an endemic region is a same-day medical evaluation, not a wait-and-see.'],
      ['em', 'Last updated · May 23, 2026 · Sources: CDC Hantavirus Disease Information for Health Care Professionals, WHO Hantavirus Fact Sheet, Castillo C et al. (Servicio de Salud Magallanes) pediatric HPS and ECMO series, Argentine Ministry of Health Andes virus epidemiology bulletins, US Sin Nombre cohort (CDC HPS Registry), peer-reviewed paediatric HPS literature.'],
    ],
  },
