  { cat: 'Science', catClass: 'cat-science', date: 'May 14, 2026', readTime: '8 min read',
    title: 'Why There Is Still No Andes Virus Vaccine — and What Tomorrow\'s Geneva R&D Consultation Could Change',
    excerpt: 'Three decades after the discovery of Sin Nombre virus and twenty years after the first reports of human-to-human Andes transmission in Argentina, there is still no licensed hantavirus vaccine for use in the Americas or Europe. The WHO emergency scientific consultation in Geneva on Friday is the most concrete signal yet that the post-cluster R&D agenda is finally being formalised.',
    icon: '💉',
    body: [
      ['p', 'On Friday May 15, 2026, the World Health Organization will convene what its own events page calls an emergency scientific consultation on Andes virus medical countermeasures research and development. The Geneva consultation is the cleanest external sign yet that the international response to the MV Hondius cluster is moving from acute crisis management to a longer-term scientific agenda. Three decades after Sin Nombre virus emerged in the Four Corners region of the United States and twenty years after Argentine investigators first described human-to-human transmission of Andes virus during the El Bolsón outbreak, there is still no licensed hantavirus vaccine, no licensed antiviral, and no rapid point-of-care diagnostic widely available in receiving countries. The MV Hondius cluster has put each of those gaps on the table at once.'],
      ['h3', 'The Vaccine Pipeline, Such As It Is'],
      ['p', 'There is a Korean inactivated whole-virus vaccine (Hantavax) licensed in South Korea against the Hantaan and Seoul strains that cause haemorrhagic fever with renal syndrome (HFRS) in Asia. Hantavax is not approved in Europe or the Americas and is not effective against Andes virus. In the United States, the Army\'s Medical Research Institute of Infectious Diseases has worked since the 1990s on a DNA-based vaccine against several hantavirus species, including Andes; it has completed early-phase clinical trials but has not entered a pivotal efficacy trial. A handful of academic candidates — virus-like particle approaches, recombinant glycoprotein subunits — exist in preclinical or early-phase form. None has a near-term path to licensure.'],
      ['h3', 'The Trial Design Problem'],
      ['p', 'The single biggest obstacle is not science but statistics. Andes virus causes roughly one hundred to two hundred cases per year in southern Argentina and Chile combined, distributed unpredictably across rural communities. Even a vaccine with very strong protective signal in animal models would require an enormous, multi-year, multi-site phase III trial to demonstrate efficacy with conventional methods. The expert consensus heading into Geneva is that any pivotal trial will need to lean on a combination of correlate-of-protection arguments, controlled human infection models for similar pathogens, and animal challenge data rather than a classical efficacy endpoint.'],
      ['h3', 'Antivirals: A Smaller, More Tractable Question'],
      ['p', 'No antiviral has been shown effective for hantavirus pulmonary syndrome in randomised controlled trials. Ribavirin reduces HFRS mortality if started early but has not shown the same benefit in the New World pulmonary syndrome. Favipiravir has shown some activity in cell culture and animal models. Monoclonal antibodies, the most promising near-term direction, are in early development at several academic centres in the United States and Argentina. The Geneva agenda specifically lists the absence of a licensed antiviral as a priority gap and is expected to discuss expedited pathways for the most advanced monoclonal candidates.'],
      ['h3', 'Diagnostics: The Bottleneck Most Visible in the MV Hondius Response'],
      ['p', 'The third leg of the consultation is diagnostics. The MV Hondius cluster has been investigated almost entirely by PCR at reference laboratories in South Africa, Geneva, Madrid, Paris, and Atlanta. There is no widely deployed rapid point-of-care test for hantavirus in the Americas or Europe, which means every suspected case has had to wait hours to days for a centralised result while clinicians made escalation decisions on clinical grounds alone. Rapid antigen and lateral-flow developers exist; the consultation is expected to discuss what regulatory and procurement levers would accelerate at least one such test through approval.'],
      ['h3', 'Why Now, and Why Geneva'],
      ['p', 'The unfair answer is that hantavirus has been chronically underfunded because its case counts have been chronically low. The fair answer is that the MV Hondius cluster has exposed an operational fragility in receiving-country health systems that does not depend on case counts: when a long-incubation pathogen with a 35 percent fatality rate arrives in twenty national health systems simultaneously, even a handful of cases stress-test diagnostic, clinical and quarantine infrastructure. The Geneva consultation will not produce a vaccine on Friday afternoon, but it is the first time in three decades that the relevant clinical, regulatory and funding actors will sit at one table specifically to discuss the gap.'],
      ['h3', 'What the Outcome Could Reasonably Look Like'],
      ['p', 'The realistic deliverable from a one-day consultation is a target product profile and an indicative roadmap: agreed minimum performance characteristics for a hantavirus rapid diagnostic, agreed correlates-of-protection criteria for a vaccine, and a published list of candidate antivirals that warrant accelerated trials. None of those is the same as a deployable product. But each is the precondition for the public and private funding that would follow, and the absence of that precondition is precisely why the pipeline has remained where it has for so long.'],

  { cat: 'Science', catClass: 'cat-science', date: 'May 13, 2026', readTime: '6 min read',
    title: 'ECMO and Hantavirus: What an Artificial Lung Actually Does in Severe Andes HPS',
    excerpt: 'The French MV Hondius passenger\'s placement on ECMO this week makes the artificial lung the most discussed therapy of the outbreak. Here is what extracorporeal membrane oxygenation is, why it is the bridge of last resort for hantavirus pulmonary syndrome, and what the published survival data say.',
    icon: '🔬',
    body: [
      ['p', 'When Dr Xavier Lescure described the French MV Hondius passenger in Paris as critically ill on an artificial lung on Wednesday, he was using the everyday term for extracorporeal membrane oxygenation, or ECMO. It is a piece of equipment most people first encountered during the COVID-19 pandemic, but ECMO has been a salvage therapy in hantavirus pulmonary syndrome (HPS) for two decades, and several of the best survival numbers in the medical literature for severe Andes virus pulmonary syndrome come from ECMO-equipped centres in Argentina and Chile. The decision to place a patient on ECMO is therefore neither routine nor a sign that the case is hopeless — it is a calculated bet that the lungs and heart can recover if given a week or two of mechanical rest.'],
      ['h3', 'What ECMO Is Actually Doing'],
      ['p', 'In an ECMO circuit, the patient\'s blood is drawn out through a large-bore venous catheter, pumped through a membrane oxygenator that adds oxygen and removes carbon dioxide, warmed, and then returned to the body. In veno-venous ECMO the blood goes back into the venous system and the patient\'s own heart continues to pump. In veno-arterial ECMO the blood is returned into the arterial system, bypassing the heart entirely. Severe hantavirus HPS frequently requires the veno-arterial mode because the capillary leak in the lungs is matched by myocardial depression and shock, so the heart cannot maintain output even when oxygenation is restored. The circuit is essentially a temporary lung and, in VA mode, a temporary heart.'],
      ['h3', 'Why Hantavirus Is Such a Good ECMO Indication'],
      ['p', 'HPS is unusual among severe respiratory illnesses in that the underlying pathology is short-lived. The pulmonary capillary leak that fills the lungs with fluid lasts roughly four to seven days. If the patient can be supported through that window — oxygenated, perfused, and kept off ventilator pressures high enough to cause further injury — the lungs typically clear and the heart recovers. Antibiotics, antivirals and steroids play almost no role; the entire treatment philosophy is mechanical support until the immune response clears the virus and the endothelium heals. That makes ECMO an unusually well-matched therapy: short course, well-defined end-point, high probability of recovery if survived.'],
      ['h3', 'What the Survival Data Show'],
      ['p', 'The largest published series of ECMO for hantavirus pulmonary syndrome come from the Andes virus regions of southern Argentina and Chile. In the most-cited Chilean cohort, survival on ECMO for severe HPS approached 60 percent, compared to a roughly 35 to 50 percent fatality rate for HPS overall. Smaller US series of Sin Nombre virus HPS report similar numbers when ECMO is started early. The strongest predictor of survival is time-to-cannulation: patients placed on ECMO within the first 24 hours of cardiopulmonary deterioration do markedly better than those put on the circuit after several days of escalating ventilator pressures. Bichat Hospital is one of a small number of French centres with the immediate ECMO capacity required to make that timing.'],
      ['h3', 'The Risks and the Trade-offs'],
      ['p', 'ECMO is not a benign intervention. The systemic anticoagulation required to keep the circuit from clotting puts patients at risk of haemorrhage, including intracranial haemorrhage. Cannulation complications, limb ischaemia, ventilator-associated pneumonia, and HIT (heparin-induced thrombocytopenia) are all well-documented. In any specific patient, the survival benefit of ECMO over maximum-pressure conventional ventilation depends on age, comorbid disease, time-to-cannulation, and the experience of the centre. None of this rules out a good outcome for the Paris patient; it simply explains why specialist infectious-disease physicians describe the next several days as the critical window.'],
      ['h3', 'What This Says About the Outbreak Response'],
      ['p', 'The willingness of receiving countries to triage MV Hondius passengers into ECMO-capable centres — the National Quarantine Unit in Omaha, Bichat in Paris, Gómez Ulla in Madrid, Emory in Atlanta, university hospitals in the Netherlands — was a deliberate part of the WHO and ECDC pre-disembarkation planning. The published Andes virus literature said clearly what would be needed if any of the asymptomatic passengers converted clinically: rapid recognition, rapid escalation, and rapid access to extracorporeal life support. Whatever the eventual outcome for the French patient, the system itself has so far performed exactly as it was designed to.'],
      ['em', 'Last updated · May 13, 2026 · Sources: ELSO (Extracorporeal Life Support Organization) registry, peer-reviewed Andes hantavirus literature from Argentina and Chile (Castillo C et al., 2011; Riquelme R et al., 2018), CDC HPS clinical overview, WHO Disease Outbreak News, NPR, Washington Post, AP reporting on the Paris case.'],
    ],
  },

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 12, 2026', readTime: '6 min read',
    title: 'N95 vs Dust Mask: Why the Difference Matters for Hantavirus Cleanups',
    excerpt: 'A standard dust mask will not stop hantavirus particles. Here is the practical, evidence-based difference between an N95 respirator and a dust mask, and how to make sure the protection you are buying actually works during rodent cleanup.',
    icon: '😷',
    body: [
      ['p', 'Every spring and summer, North American emergency departments see a small but predictable trickle of patients who developed hantavirus pulmonary syndrome after cleaning a cabin, garage, or storage shed. In most of those cases, the patient was wearing a mask of some kind — usually a cheap dust mask from a hardware store — and assumed they were protected. They were not. Hantavirus is one of the clearer real-world cases where the type of mask matters enormously, and where the difference between an N95 respirator and a single-strap dust mask can be the difference between a safe cleanup and a hospital admission.'],
      ['h3', 'What Hantavirus Cleanup Actually Exposes You To'],
      ['p', 'The mechanism of hantavirus exposure during cleanup is aerosolisation. When dried rodent urine, droppings, or saliva are disturbed by sweeping, vacuuming, or stirring up dust, microscopic virus-laden particles become airborne. These particles can hang in the air for many minutes and are easily inhaled deep into the lung. From there it only takes a small inoculum to seed an infection. The CDC has documented hantavirus pulmonary syndrome cases following exposures as brief as a few minutes in heavily contaminated spaces.'],
      ['h3', 'Why a Dust Mask Does Not Work'],
      ['p', 'A loose-fitting single-strap nuisance dust mask is designed to keep coarse particles — sawdust, drywall dust, lint — out of your nose. It does this with a relatively open filter media and, crucially, without forming a seal against the face. Air takes the path of least resistance, which means most of the air you inhale through a dust mask passes around the edges rather than through the filter. Even when the filter media itself is good, the seal failure makes it inadequate for biological aerosols. Surgical masks, while better than dust masks for some droplet-borne hazards, are also not designed for airborne aerosol filtration and similarly lack a seal.'],
      ['h3', 'What an N95 Actually Does'],
      ['p', 'An N95 respirator is engineered around two requirements: a filter media that captures at least 95% of 0.3-micron particles, and a fit that forms a seal against the face. Both matter. Dual head straps, an adjustable nose bridge, and a contoured cup design exist so that the air you breathe is forced through the filter, not around it. The CDC and OSHA recommend N95 or higher (P100, half-face elastomeric, or PAPR) for any hantavirus cleanup activity in a confirmed or suspected rodent-infested space.'],
      ['h3', 'Fit Testing and the User Seal Check'],
      ['p', 'A respirator is only as good as its fit. Before each use the CDC recommends a quick user seal check: inhale sharply with both hands cupped over the mask. The mask should pull in slightly against your face and you should feel no leak around the edges. Exhale gently with hands cupped over the mask — there should be no air whistling out around the nose bridge. Facial hair under the seal will break the fit; men cleaning rodent-affected spaces should shave the seal area or use a powered air-purifying respirator instead.'],
      ['h3', 'Pairing the Respirator With the Rest of the Protocol'],
      ['p', 'Even a perfectly fitted N95 is only one part of the CDC hantavirus cleanup protocol. The protocol begins with ventilation — opening doors and windows for at least 30 minutes before entry, ideally with the cleaner outside the space. Then wet-disinfection: spraying suspected contaminated areas with a 1:10 bleach solution or EPA-registered disinfectant and letting it sit for five minutes before any wiping or disposal. Only then is it safe to begin cleanup, with the cleaner wearing N95, nitrile gloves, eye protection, and ideally disposable coveralls. Waste goes into a double bag — kitchen bag inside contractor bag — and the outside of the inner bag is wiped down with disinfectant before being sealed inside the outer bag.'],
      ['h3', 'A Note on KN95s and Counterfeits'],
      ['p', 'The KN95 — the Chinese GB2626 standard — has a similar filtration performance to N95 but is not enforced by NIOSH and the marketplace is notoriously crowded with counterfeits. For hantavirus cleanup, the safer choice is a NIOSH-approved N95 from a reputable supplier, with the NIOSH approval label visible inside the mask. If you only have KN95s on hand, verify the manufacturer is on the CDC’s appendix list of acceptable international respirators, and treat any unverifiable batch as suspect.'],
      ['em', 'Last updated · May 12, 2026 · Sources: CDC Hantavirus Cleanup and Disinfection Guidance, NIOSH respirator user guide, OSHA respiratory protection standard 29 CFR 1910.134, WHO Hantavirus factsheet.'],
    ],
  },

  { cat: 'Science', catClass: 'cat-science', date: 'May 11, 2026', readTime: '7 min read',
    title: 'Why 42 Days? The Andes Virus Incubation Window Explained',
    excerpt: 'The WHO\'s newly formalised 42-day quarantine recommendation for MV Hondius passengers is a direct reflection of how Andes virus actually behaves inside the human body. Here is what virologists and public-health officials know about the upper bound of that incubation window — and why it isn\'t arbitrary.',
    icon: '🔬',
    body: [
      ['p', 'On Sunday May 10, in a packed Tenerife press conference, the WHO\'s Maria van Kerkhove gave the most concrete piece of operational guidance to come out of the MV Hondius response so far: 42 days of active monitoring, with daily symptom checks, for everyone who disembarked. To anyone who hasn\'t lived inside hantavirus literature for the past decade, that number can look strangely specific. Why 42, and not 30 or 60? The answer comes back to the unusual biology of Andes virus, the strain at the centre of this outbreak.'],
      ['h3', 'The Long Tail of Hantavirus Incubation'],
      ['p', 'Among notifiable respiratory viruses, hantaviruses have one of the longest incubation periods on the books. The WHO\'s own factsheet, updated in 2024 and unchanged through this outbreak, lists an incubation range of one to eight weeks from exposure to symptom onset, with the vast majority of cases declaring themselves between two and four weeks. The CDC\'s clinical overview echoes those numbers. The reason for the long tail is the virus\'s tropism: hantaviruses preferentially infect endothelial cells lining the small blood vessels of the lung, and that infection has to seed widely enough to produce the capillary leak that defines hantavirus pulmonary syndrome (HPS). It is a slow burn before it isn\'t.'],
      ['h3', 'Why Andes Is the Worst-Case Estimator'],
      ['p', 'Andes virus, found across southern Argentina and Chile, sits at the upper end of the genus in two important ways. First, it grows to higher concentrations in human tissue than most hantaviruses, which is part of why it is the only known hantavirus species with documented human-to-human transmission. Second, Argentine outbreak studies — particularly the well-documented Epuyén cluster of 2018-2019 — have documented incubation intervals stretching past 30 days in close-contact secondary cases. When WHO modelled the MV Hondius scenario, the conservative approach was to track to the longest plausible exposure-to-symptom interval seen in the published literature, padded slightly. 42 days is essentially six weeks; six weeks captures more than 99 percent of historical cases.'],
      ['h3', 'What Active Monitoring Actually Looks Like'],
      ['p', 'The 42-day window is not a sealed quarantine for everyone. WHO\'s recommendation has two tiers: facility- or home-based quarantine for active cases and high-risk contacts (such as the Spanish, French and American cohorts currently inside dedicated hospital quarantine), and active health monitoring for everyone else — meaning daily structured check-ins with a public-health worker, twice-daily temperature checks, and immediate escalation to a hospital if fever, severe muscle pain, or shortness of breath appear. Passengers have also been asked to wear an N95-class respirator when in proximity to others, a precaution tuned specifically to the aerosol route by which secondary Andes virus transmission has been documented.'],
      ['h3', 'The Cost of Getting It Wrong'],
      ['p', 'A shorter window — say the 14-day post-flight monitoring used early in COVID-19 — would be operationally easier but biologically inadequate for Andes virus. A returnee whose exposure occurred in the last 10 days of the voyage could realistically convert four or five weeks after disembarkation, and a 14-day monitoring stop would have closed the surveillance net long before the diagnosis arrived. The 42-day choice trades operational burden for epidemiological completeness. Given that this strain has a fatality rate of 35-40 percent and no specific antiviral treatment, early hospital recognition is the single most important predictor of survival, and the monitoring window has to be designed around that.'],
      ['h3', 'What Returnees Should Watch For'],
      ['p', 'For passengers and their household contacts the practical checklist is straightforward: temperature taken twice daily, attention to any new severe muscle pain or unexplained shortness of breath, and a low threshold for calling the dedicated public-health hotlines that each receiving country has set up. Mild upper-respiratory or gastrointestinal symptoms alone are very rarely the first sign of HPS, but any new fever in this cohort warrants a same-day PCR test rather than wait-and-see. The Madrid cohort\'s day-7 results and the Paris and Nebraska cohorts\' ongoing testing through mid-June are the next two big surveillance milestones.'],
      ['em', 'Last updated · May 11, 2026 · Sources: WHO Disease Outbreak News DON600, WHO factsheet on hantavirus, CDC clinical overview, ECDC technical assessment, NICD South Africa, peer-reviewed Andes virus literature including Argentine outbreak investigations.'],
    ],
  },

  { cat: 'Health Tips', catClass: 'cat-tips', date: 'May 10, 2026', readTime: '6 min read',
    title: 'Inside Madrid Quarantine: What the Day-7 PCR Means For Returning MV Hondius Passengers',
    excerpt: 'Why the Spanish health ministry is using a two-PCR protocol — one on arrival and a second one a week later — for returning MV Hondius passengers, what an asymptomatic positive would actually mean, and what the rest of us can take from it.',
    icon: '🧪',
    body: [
      ['p', 'When the first 14 passengers from the MV Hondius land in Madrid this Sunday, they will not be spending the next week at home. Spain\'s health ministry has confirmed that everyone returning under the repatriation operation will be quarantined at the Gómez Ulla military hospital and tested twice with PCR: once on arrival and a second time at day seven. The two-test protocol is not unique to Spain — Switzerland, the United Kingdom, France and the United States are using broadly similar windows for their own returnees — and the choice of seven days is doing a lot of quiet, careful work.'],
      ['h3', 'Why Test Twice? It\'s About the Andes Virus Incubation Window'],
      ['p', 'Hantaviruses, including Andes virus, have unusually long incubation periods. WHO and the CDC routinely cite a range of one to eight weeks from exposure to symptom onset, with most cases falling between 14 and 21 days. A single PCR taken at the moment of disembarkation will reliably detect anyone who is already viraemic, but it will miss anyone whose viral load is still below the assay\'s detection threshold. The day-7 test catches some of those people — particularly anyone whose exposure was in the last 10–14 days of the voyage.'],
      ['p', 'It is not a perfect screen. A returnee who was exposed only at the very end of the cruise could still test negative twice and convert later, which is why the post-quarantine plan includes self-monitoring with a daily symptom check (temperature, breathing) for several more weeks. Health authorities have asked returnees to seek emergency care immediately, and disclose the recent travel history, if they develop fever, severe muscle aches, or shortness of breath at any point through mid-June.'],
      ['h3', 'What an Asymptomatic Positive Would Mean'],
      ['p', 'There is a non-zero chance that a returning passenger will produce an asymptomatic PCR positive in the next ten days. That would be epidemiologically interesting — it would tell investigators that secondary spread aboard the ship was wider than the eight clinical cases suggest — but it would not change the overall public-health risk picture much. Andes virus only transmits onward via close, sustained contact, and the quarantine setup at Gómez Ulla is designed precisely to make that impossible.'],
      ['p', 'Operationally, an asymptomatic positive would trigger contact tracing inside the cohort that flew together, immediate isolation of the case, and supportive monitoring for early signs of pulmonary involvement. Andes virus does not have a specific antiviral therapy, but early hospital-based supportive care — fluid management, oxygen, ventilation if needed — substantially improves survival.'],
      ['h3', 'What This Means For Everyone Else'],
      ['p', 'For people who were not on the MV Hondius and have not been in close contact with someone who was, the public-health risk is essentially zero. WHO and Spain\'s Health Ministry have not issued any travel restrictions for Tenerife or for the Canary Islands more broadly. The repatriation operation is an outsized response to a small, contained cluster — exactly because hantavirus is lethal enough that authorities prefer to overspend on caution at the outset rather than under-respond.'],
      ['p', 'The takeaway for the rest of us is the same as it was a week ago: avoid contact with rodent droppings and urine, never dry-sweep a rodent-infested space, and seek care promptly if you develop a flu-like illness with breathing difficulty after recent rural or backcountry exposure. The Madrid cohort\'s day-7 PCR results, expected the week of May 17, will be the next meaningful data point in this outbreak.'],
      ['em', 'Last updated · May 10, 2026 · Sources: WHO, CDC, ECDC, Spanish Ministry of Health, NPR, Live Science.'],
    ],
  },
  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 9, 2026', readTime: '7 min read',
    title: 'MV Hondius Approaches Tenerife as Suspected Ninth Hantavirus Case Tests Negative',

      ['h3', 'A Negative Test, A Smaller Cluster'],

      ['h3', 'A 24-Hour Evacuation Window'],

  { cat: 'Health Tips', catClass: 'cat-tips', date: 'May 9, 2026', readTime: '6 min read',
    title: 'For Tenerife Residents and Travellers: What the MV Hondius Arrival Actually Means for You',

    icon: '🧭',
    body: [
      ['p', 'The imminent arrival of the MV Hondius at Granadilla port has generated understandable attention in Tenerife and across the Canary Islands. Misinformation has spread quickly, and dock workers have publicly protested. This guide is intended as a calm, evidence-based explanation of what the arrival means in practical terms — and what it does not.'],
      ['h3', 'How the Operation Is Designed'],
      ['p', 'The ship is not docking in the cruise terminal in Santa Cruz where most tourists embark. Granadilla is a large industrial port on the south-east of the island used principally for cargo, and the area being used for the disembarkation has been cordoned off. Passengers will be ferried from the ship through a corridor that does not intersect with civilian areas and transferred directly into specialised transport. The 14 Spanish nationals will be taken to a military hospital. Other nationalities will be repatriated under WHO and ECDC coordination, including a planned US repatriation flight to Nebraska.'],
      ['h3', 'What the Risk Actually Looks Like'],
      ['p', 'The hantavirus involved in the cluster is the Andes strain. It is the only hantavirus species with documented person-to-person transmission, but that transmission has only ever been seen between very close contacts in prolonged contact — household members, sexual partners, direct caregivers. Casual contact in workplaces, shared transit, or public spaces has not been associated with onward transmission. The natural rodent reservoir for Andes virus is found in southern Argentina and Chile and is not present in Europe.'],
      ['h3', 'Why Port Workers Have Concerns'],
      ['p', 'Port workers\' worries are not unreasonable in principle: they are being asked to perform routine work in proximity to a vessel that has been at the centre of an international outbreak. The right response to those concerns is information and protective protocols, which is what Spanish authorities and the WHO Director-General have publicly committed to. Workers in the cordoned area will be issued PPE consistent with hantavirus handling guidance, and direct contact between port workers and passengers is not part of the planned operation.'],

      ['p', 'For ordinary residents of Tenerife — anyone not working in the cordoned zone of Granadilla port — your individual risk is essentially unchanged from any day before the ship arrived. Hantavirus does not spread through casual contact, contaminated air over distance, water systems, or food in a developed-country supply chain. There is no reason to alter daily routines, avoid public spaces, or cancel travel within the islands.'],
      ['h3', 'For Tourists Already Booked'],
      ['p', 'No travel restrictions have been issued by WHO, ECDC, or Spanish health authorities for travel to the Canary Islands. If you have a trip booked, the practical risk profile of your visit is unchanged. The same applies to flight crews and airline staff transiting through Canary Islands airports — none of whom will have any contact with MV Hondius passengers under the planned operation.'],
      ['h3', 'When to Pay Closer Attention'],
      ['p', 'The small group of people who should pay closer attention this week are those who had any direct contact with MV Hondius passengers or crew (a vanishingly small group on Tenerife outside the planned disembarkation operation), and anyone who recently returned from a remote South Atlantic or Patagonian itinerary. For everyone else, the right posture is informed calm — not anxiety. The arrival of the ship is a managed public-health operation, not a community outbreak event.'],

      ['p', 'US monitoring of returned MV Hondius passengers has expanded from two states (Arizona and Georgia) to five (adding California, Texas and Virginia), reflecting the dispersion of returning travellers across the country. Public health authorities are not asking returnees with no symptoms to seek testing — only to monitor for fever, deep muscle aches and any difficulty breathing within the eight-week incubation window.'],

  { cat: 'Science', catClass: 'cat-science', date: 'May 8, 2026', readTime: '6 min read',
    title: 'Two Labs, One Verdict: Why Independent Andes Virus Confirmation Matters',
    excerpt: 'South Africa\'s NICD and Switzerland\'s Geneva University Hospitals have independently confirmed Andes hantavirus in MV Hondius samples. Here is why two-laboratory confirmation is not just bureaucratic — it is scientifically meaningful.',
    icon: '🧬',
    body: [
      ['p', 'The May 6 announcement that the National Institute for Communicable Diseases (NICD) in Johannesburg and Geneva University Hospitals (HUG) in Switzerland had independently confirmed Andes hantavirus in samples from the MV Hondius cluster was, on its surface, simply another technical update in a fast-moving outbreak. But for virologists watching the cluster, two-lab confirmation of a rare strain is a moment of significant scientific reassurance — one worth understanding in detail.'],
      ['h3', 'Why a Single Result Is Never Enough'],
      ['p', 'In any acute outbreak investigation, a single positive PCR result on a rare pathogen is treated cautiously. A novel strain can produce ambiguous primer binding. Cross-reactivity between closely related orthohantaviruses is a known issue. Sample handling, contamination from prior amplicons in a busy reference laboratory, or even reagent batch artefacts can produce a positive signal that does not reflect a true infection. The first job of public health communication is to be confident that the pathogen identified is in fact the pathogen present.'],
      ['h3', 'Independence Is the Key Word'],
      ['p', 'The reassurance from the May 6 announcement comes from the word "independently" — the two laboratories used different sample aliquots, different primer sets, and different sequencing pipelines, separated by thousands of kilometres and entirely different supply chains. NICD has been the regional reference laboratory leading the cluster from the beginning, while HUG entered the picture when a Swiss patient who had disembarked the ship before the outbreak became symptomatic in Zurich. The convergence of two independent operational lines of evidence on the same conclusion — Andes virus, ANDV — is qualitatively different from a single lab repeating its own assay.'],
      ['h3', 'What Andes Virus Confirmation Implies'],
      ['p', 'Andes virus, found primarily in Argentina and Chile, is the only hantavirus species with credible, documented person-to-person transmission. Multiple family-cluster studies in Patagonia, beginning with the 1996 El Bolsón outbreak, have established that Andes virus can spread between very close, prolonged contacts — typically household members, sexual partners, and direct caregivers. It does not appear to spread through casual contact in shared public spaces.'],
      ['p', 'Confirming the Andes strain therefore both raises and constrains the level of concern. It raises concern because it leaves open the possibility — still under investigation — that some MV Hondius cases acquired the virus from other passengers rather than directly from rodent contact in Argentina or on remote islands. It constrains concern because the well-documented transmission profile of Andes virus does not include casual contact, allowing public health authorities to maintain that the broader public is not at risk.'],
      ['h3', 'What Comes Next in the Lab'],
      ['p', 'The next phase of laboratory work is genomic. Researchers will compare the full Andes virus genomes recovered from MV Hondius patients to characterised reference genomes from Argentina and Chile. If the MV Hondius genome closely matches a known Patagonian lineage, the most parsimonious explanation is that the index cases were exposed to rodents prior to boarding. If the genome is unusual or shows mutations consistent with adaptation, more questions will be raised about whether the closed shipboard environment selected for any new viral characteristics. Either result is informative; both are tractable with current sequencing technology.'],
      ['h3', 'A Reasonable Posture for Readers'],
      ['p', 'For non-specialist readers, the practical takeaway is straightforward. The pathogen is what scientists thought it was. The transmission profile is what historical data has long suggested it should be. The risk to anyone not in close, prolonged contact with a confirmed case is essentially what it was before this cluster surfaced — very low. Two-lab confirmation does not change the threat picture; it confirms the threat picture, which is itself a form of progress.'],
      ['em', 'Last updated: May 8, 2026. Sources: WHO Disease Outbreak News DON599, ECDC technical assessment (06 May 2026), NICD South Africa, Geneva University Hospitals (HUG), Nature, Science / AAAS, Live Science.'],
    ],
  },

  { cat: 'Health Tips', catClass: 'cat-tips', date: 'May 7, 2026', readTime: '6 min read',
    title: 'Returned from a South Atlantic Cruise? A Practical Self-Monitoring Guide for the Next Eight Weeks',
    excerpt: 'You probably weren’t on the MV Hondius. But if you were on any expedition cruise to South Georgia, Tristan da Cunha, or Patagonia in March or April, here is exactly how to monitor yourself — and when to act.',
    icon: '🩺',
    body: [
      ['p', 'The MV Hondius hantavirus cluster has prompted unusual public attention to a class of travel that, in normal years, generates very little: expedition cruises and remote-island wildlife tours. This guide is for travelers who have recently returned from any voyage in the South Atlantic, sub-Antarctic, or Patagonian region — not just the MV Hondius itself — and who want a clear, practical self-monitoring plan.'],
      ['h3', 'Know Your Window'],
      ['p', 'Hantavirus has an incubation period of one to eight weeks. If your trip ended within the last 56 days, the relevant monitoring window is still open. After eight weeks of being symptom-free following any potential exposure, the risk of HPS from that exposure is effectively gone. Mark eight weeks on your calendar from your arrival home.'],
      ['h3', 'What Symptoms Warrant a Phone Call'],
      ['p', 'The early symptoms of hantavirus pulmonary syndrome are indistinguishable from influenza. The triad to watch for is fever (above 38°C / 100.4°F), severe muscle aches — particularly deep aching in the thighs, hips, or lower back — and profound fatigue. Notably absent in early HPS are the upper-respiratory symptoms most people associate with flu: there is typically no runny nose, no sore throat, and no productive cough. If your "flu" feels off because it lacks those symptoms, that itself is a signal worth mentioning to a clinician.'],
      ['h3', 'What Symptoms Warrant the Emergency Room'],
      ['p', 'If you develop any of the following within eight weeks of your trip, go to an emergency department immediately and explicitly mention your travel history: shortness of breath, chest tightness, lightheadedness on standing, a sudden second wave of worsening symptoms after seeming to improve, or a pulse oximeter reading below 95% if you have one at home. The transition from prodrome to cardiopulmonary phase can occur in hours, and survival is closely tied to how quickly advanced supportive care begins.'],
      ['h3', 'What to Tell Your Doctor'],
      ['p', 'Most clinicians will not consider hantavirus on a differential diagnosis unless the patient or family raises it. State plainly: "I returned from an expedition cruise to the South Atlantic on [date]. I am within the eight-week hantavirus incubation window. The MV Hondius cluster has been linked to that region. Please consider HPS in your evaluation." This single sentence has, in past outbreaks, accelerated the path to correct diagnosis by hours — hours that matter.'],
      ['h3', 'When to Seek Testing Versus Just Monitor'],
      ['p', 'In the absence of symptoms, routine screening is not currently recommended for asymptomatic returnees, even from the MV Hondius itself. Public health authorities are conducting active follow-up of MV Hondius passengers and known close contacts directly. If you were on a different vessel or traveled independently in Patagonia or the South Atlantic and have no symptoms, your role is monitoring — not testing. Testing exists for symptomatic evaluation, not reassurance.'],
      ['h3', 'Reasonable Risk Calibration'],
      ['p', 'For travelers with no contact with the MV Hondius cluster, the actual probability of hantavirus exposure during a typical expedition cruise is very low. Risk is concentrated in specific environments — enclosed structures with rodent infestations, agricultural buildings, mountain refuges — not the open-air landscapes most ecotourists experience. The right posture is informed awareness, not anxiety.'],
      ['em', 'This guide is informational and does not replace medical advice. If you have any concerns, contact your physician or your country’s travel health service. Sources: WHO Disease Outbreak News, CDC hantavirus guidance, NICD South Africa.'],
    ],
  },
  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 7, 2026', readTime: '8 min read',
    title: 'MV Hondius Cluster: What We Know So Far About the 2026 Outbreak',
    excerpt: 'Three deaths, seven cases, and 80+ people under WHO surveillance — a comprehensive breakdown of the most alarming hantavirus cluster in years and why Andes virus makes it uniquely concerning.',
    icon: '🦠',
    body: [
      ['p', 'On April 1, 2026, the MV Hondius — an expedition cruise vessel carrying 147 passengers and crew — departed Ushuaia, Argentina, bound for a wildlife tour of the South Atlantic and Antarctic islands. Eleven days later, a Dutch national died on board. By May 7, three people were dead, seven were infected, and the World Health Organization was tracking more than 80 potential contacts across two continents.'],
      ['p', 'This is the story of the 2026 hantavirus cluster, what it means, and why it demands serious attention even as global health authorities maintain that the overall public risk remains low.'],
      ['h3', 'How It Started'],
      ['p', 'The index case — a Dutch couple who had traveled in Argentina before boarding — is believed to have had prior exposure to hantavirus in Patagonia, a known endemic zone for the Andes strain. The couple boarded the ship already infected, or were exposed in the ship’s early ports of call, which included some of the world’s most remote rodent-inhabited islands: South Georgia, Nightingale Island, Tristan da Cunha, and Saint Helena.'],
      ['p', 'The first death occurred April 11. The second, on April 26, involved a close contact of the index case who collapsed on an Airlink flight from Johannesburg, prompting WHO to begin tracing 82 passengers and 6 crew from that flight alone. A third death — a German national — followed on May 3 as the ship anchored off Praia, Cape Verde.'],
      ['h3', 'Why Andes Virus Is Different'],
      ['p', 'Of the more than 40 known hantavirus strains, only the Andes virus — endemic to Chile and Argentina — has documented person-to-person transmission. Every other known strain, including the North American Sin Nombre virus, spreads exclusively through contact with infected rodent excretions. Andes virus can be transmitted through prolonged close contact with an infected person, such as a household member or caregiver. This is what makes the MV Hondius cluster so unusual and so closely watched.'],
      ['p', 'WHO investigators are using genome sequencing, serology, and metagenomics to determine whether the infections aboard the ship represent true human-to-human transmission or multiple independent exposures from rodent contact on the islands visited.'],
      ['h3', 'The Response'],
      ['p', 'Three patients, including the ship’s doctor, were evacuated to the Netherlands for treatment. Cape Verde health authorities have isolated the vessel. WHO has issued a Disease Outbreak News bulletin. South Africa’s National Institute for Communicable Diseases (NICD) has confirmed the hantavirus diagnosis via PCR testing of the Johannesburg patient. Investigations are ongoing.'],
      ['h3', 'What This Means for You'],
      ['p', 'WHO Director-General has stated clearly: the overall public health risk remains low. If you were not aboard the MV Hondius or in close contact with a confirmed case, your personal risk is essentially zero. However, this outbreak is a reminder that hantavirus — long considered a rural, rodent-contact-only disease — can surprise us. Travelers to endemic regions, anyone working in environments where rodent contact is possible, and anyone experiencing flu-like illness after potential exposure should be aware and seek evaluation.'],
      ['em', 'Last updated: May 7, 2026. Sources: WHO Disease Outbreak News DON599, NICD South Africa, Africa CDC.'],
    ],
  },
  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 5, 2026', readTime: '6 min read',
    title: 'CDC-Approved Steps for Cleaning Rodent-Infested Spaces Safely',
    excerpt: 'Never dry sweep. Always wet disinfect first. The exact CDC protocol for safely cleaning cabins, garages, and storage areas where rodents may have nested.',
    icon: '🛡️',
    body: [
      ['p', 'Every year, people unknowingly expose themselves to hantavirus while doing something as ordinary as cleaning out a garage, cabin, or storage shed. The mistake is almost always the same: they sweep, vacuum, or disturb dust without taking precautions first. This guide walks through the CDC-recommended protocol that could save your life.'],
      ['h3', 'Rule #1: Never Dry Sweep or Vacuum'],
      ['p', 'Hantavirus survives in dried rodent urine, droppings, and nesting material. Sweeping or vacuuming sends virus particles airborne, where they can be inhaled instantly. This is the single most dangerous thing you can do in a rodent-contaminated space. Always wet-disinfect before disturbing any material.'],
      ['h3', 'Your PPE Before You Enter'],
      ['p', 'Before entering a potentially contaminated space, put on: an N95 respirator (not a surgical mask — it must form a seal), nitrile or rubber gloves, eye protection, and if the contamination is heavy, a full Tyvek coverall suit. Open windows and doors to ventilate the space for at least 30 minutes before you enter and begin cleaning.'],
      ['h3', 'The Wet Disinfection Method'],
      ['p', 'Mix a disinfectant solution of 1.5 cups of household bleach per gallon of water, or use an EPA-registered disinfectant spray. Thoroughly soak all droppings, nesting material, and contaminated surfaces. Wait 5 minutes for the disinfectant to work before touching anything. Use paper towels to pick up the now-wet material and place it in a sealed plastic bag. Do not compress or shake the bag.'],
      ['h3', 'Disposal and Cleanup'],
      ['p', 'Double-bag all contaminated material. Seal both bags tightly and place them in a covered trash can for regular garbage collection. Do not compost. After cleaning, disinfect all surfaces, gloves, and tools. Wash your hands thoroughly with soap and water even after removing gloves. Shower and change clothes before re-entering your living area.'],
      ['h3', 'Sealing Entry Points'],
      ['p', 'Cleaning alone is not enough if rodents can re-enter. Inspect the exterior of the structure for gaps larger than a dime — mice can fit through a hole the size of a pencil eraser. Seal gaps with steel wool packed tightly, then covered with caulk or expanding foam. Pay particular attention to where pipes and utilities enter the building.'],
      ['em', 'Source: CDC Hantavirus Prevention guidelines. Always wear appropriate PPE. If you suspect heavy contamination, consider hiring a professional remediation service.'],
    ],
  },
  { cat: 'Science', catClass: 'cat-science', date: 'May 3, 2026', readTime: '7 min read',
    title: 'Andes Virus vs. Sin Nombre: Why Some Hantaviruses Are More Dangerous',
    excerpt: 'Most hantaviruses cannot spread person-to-person. Andes virus is the exception. The science behind this rare transmission route explained.',
    icon: '🔬',
    body: [
      ['p', 'Not all hantaviruses are created equal. Of the 40+ known strains circulating in rodent populations around the world, they vary dramatically in their transmission routes, geographic range, and fatality rates. Understanding these differences is essential to understanding why the 2026 MV Hondius outbreak has alarmed scientists worldwide.'],
      ['h3', 'The Sin Nombre Virus (North America)'],
      ['p', 'Sin Nombre virus, first identified during the 1993 Four Corners outbreak in the American Southwest, is the most studied hantavirus in the western world. It is carried exclusively by the deer mouse (Peromyscus maniculatus), which is found across nearly all of North America. Transmission to humans occurs when people inhale aerosolized particles from infected mouse urine, droppings, or saliva — typically during cleaning or outdoor activities in endemic areas.'],
      ['p', 'Critically, Sin Nombre virus does not spread from person to person. Every documented US case has been traced to direct rodent environmental exposure. This property has kept the US case count below 1,000 since surveillance began in 1993, despite the deer mouse being one of the most abundant mammals in North America.'],
      ['h3', 'The Andes Virus (South America)'],
      ['p', 'Andes virus, endemic to Chile and Argentina, is biologically similar to Sin Nombre but with one critical, documented difference: it can spread from person to person. This was first suspected during a 1996 outbreak in southern Argentina and has since been documented in several family clusters, where household contacts and caregivers of infected patients developed HPS without any identified rodent exposure.'],
      ['p', 'The mechanism of person-to-person transmission is not fully understood, but is believed to involve respiratory secretions during the prodromal or early cardiopulmonary phase. The risk appears limited to very close, prolonged contact — casual contact in public settings has not been associated with transmission.'],
      ['h3', 'Fatality Rates and Clinical Differences'],
      ['p', 'Both strains cause Hantavirus Pulmonary Syndrome (HPS), with similar clinical progression: a flu-like prodrome followed by rapid cardiopulmonary deterioration. Fatality rates for Sin Nombre HPS are approximately 36% in the US. Andes virus HPS has a similar fatality rate, though some outbreaks have reported mortality approaching 50%.'],
      ['p', 'No licensed vaccine or antiviral treatment exists for either strain in Western countries. Treatment is entirely supportive — oxygen, fluid management, and mechanical ventilation in severe cases.'],
      ['h3', 'Other Notable Strains'],
      ['p', 'In Europe, Puumala virus (carried by the bank vole) causes a milder disease called Nephropathia Epidemica, a kidney-affecting illness with a fatality rate under 1%. In Asia, Hantaan virus causes Hemorrhagic Fever with Renal Syndrome (HFRS), affecting tens of thousands annually in China and Korea. China has a licensed vaccine against Hantaan/Seoul viruses, though it is not available in Western countries.'],
    ],
  },
  { cat: 'News', catClass: 'cat-news', date: 'Apr 30, 2026', readTime: '5 min read',
    title: 'Is It Safe to Travel to Argentina and Chile? Health Authorities Weigh In',
    excerpt: 'No travel restrictions have been issued. But Andes virus is endemic in rural Patagonia. What hikers and ecotourists need to know before they go.',
    icon: '🗺️',
    body: [
      ['p', 'With the 2026 MV Hondius cluster linked to travel through Argentina and South Atlantic islands, travelers have been asking: should I cancel my trip to Patagonia? The short answer from WHO and regional health authorities is no — but go informed.'],
      ['h3', 'No Travel Restrictions Have Been Issued'],
      ['p', 'As of May 2026, neither WHO, the CDC, nor the Argentine or Chilean health ministries have issued travel advisories or restrictions related to hantavirus. The disease is not new to these regions — Andes virus has been endemic in rural Patagonia for decades — and the absolute number of cases remains very small relative to the millions of visitors these countries receive annually.'],
      ['h3', 'Where the Real Risk Lies'],
      ['p', 'The risk is almost entirely concentrated in specific environments: rural areas, especially agricultural land, forests, and grasslands where the long-tailed pygmy rice rat (the primary Andes virus reservoir) lives. Urban tourists visiting Buenos Aires, Santiago, or Mendoza’s wine regions have essentially no meaningful exposure risk. The risk profile changes significantly for hikers, campers, researchers, and adventure travelers spending nights in remote areas, mountain refuges (refugios), or rustic cabins.'],
      ['h3', 'Practical Precautions for Travelers'],
      ['p', 'If you’re trekking in Patagonia, hiking in the Andes, or staying in rural accommodations, these steps reduce your risk meaningfully: avoid sleeping directly on the ground, use a tent with a sealed floor, do not disturb rodent nests or burrows, avoid handling any wild rodent, store food in sealed containers, and be cautious when opening or cleaning mountain refuges that have been closed for the season. Seek medical attention promptly if you develop fever and muscle aches within 8 weeks of your trip.'],
      ['h3', 'What the MV Hondius Investigation Tells Us'],
      ['p', 'The ship’s itinerary included stops at remote South Atlantic islands known to have significant rodent populations, including South Georgia and Tristan da Cunha. The index cases also traveled in Argentine Patagonia before boarding. Investigators are still determining whether exposure occurred on the islands, in Argentina, or aboard the vessel itself. Until this is resolved, travelers to the most remote wilderness areas of the region should exercise heightened awareness.'],

  { cat: 'Health Tips', catClass: 'cat-tips', date: 'Apr 25, 2026', readTime: '5 min read',
    title: 'Know the Symptoms: When Flu-Like Illness Could Be Something More Serious',
    excerpt: 'Fever, fatigue, muscle aches — early hantavirus mimics the flu. The red-flag signs that should prompt immediate medical attention after potential exposure.',
    icon: '💊',
    body: [
      ['p', 'Hantavirus Pulmonary Syndrome is notoriously difficult to diagnose in its early stages because it looks exactly like the flu. By the time patients develop the hallmark respiratory symptoms, the disease is already in its most dangerous phase. Knowing when to escalate — and escalate fast — can be the difference between survival and death.'],
      ['h3', 'Phase 1: The Prodrome (Days 1–5)'],
      ['p', 'Initial symptoms appear 1 to 8 weeks after exposure and are indistinguishable from influenza: fever (38–40°C / 100–104°F), severe fatigue, deep muscle aches particularly in the thighs and hips, headache, and chills. About half of patients also experience nausea, vomiting, diarrhea, and abdominal pain. There is no cough, runny nose, or sore throat in this phase — the absence of upper respiratory symptoms in an otherwise flu-like illness is actually a subtle warning sign.'],
      ['h3', 'Phase 2: Cardiopulmonary Deterioration (Days 5–10)'],
      ['p', 'The transition from prodrome to cardiopulmonary phase can happen suddenly, often within hours. Shortness of breath develops as the lungs begin filling with fluid (pulmonary edema). Heart rate accelerates and blood pressure drops. This phase requires immediate ICU admission and mechanical ventilation. Patients who reach this stage without medical support face mortality rates approaching 50%.'],
      ['h3', 'When to Seek Emergency Care Immediately'],
      ['p', 'Go to an emergency room immediately — do not wait — if you have flu-like symptoms AND any of the following: recent rodent exposure (cleaning, outdoor work in endemic areas), recent travel to endemic regions (SW United States, Patagonia, rural Europe), any difficulty breathing or chest tightness, or a sudden worsening of symptoms after seeming to improve. Tell medical staff about your potential hantavirus exposure explicitly. In many cases, physicians will not consider HPS unless it is raised directly.'],
      ['h3', 'Diagnosis and Treatment'],
      ['p', 'Diagnosis is confirmed by a blood test detecting hantavirus-specific antibodies (IgM/IgG) or by PCR. There is no approved antiviral treatment — all care is supportive. Early hospitalization, careful fluid management, and extracorporeal membrane oxygenation (ECMO) in severe cases have improved survival rates at specialized centers. Early recognition remains the most powerful tool available.'],
    ],
  },
  { cat: 'Prevention', catClass: 'cat-prevention', date: 'Apr 20, 2026', readTime: '6 min read',
    title: 'The Deer Mouse Problem: How Hantavirus Gets Into Your Home',
    excerpt: 'The North American deer mouse is the primary carrier of Sin Nombre virus. Learn how rodents enter homes undetected and how to seal entry points for good.',
    icon: '🐀',
    body: [
      ['p', 'The deer mouse (Peromyscus maniculatus) is one of the most common mammals in North America, found in virtually every habitat from forest to desert. It is also the primary reservoir for Sin Nombre hantavirus — and it is remarkably good at getting inside human structures without being noticed.'],
      ['h3', 'How Small Is Too Small?'],
      ['p', 'A deer mouse can compress its body to fit through a hole approximately 6mm in diameter — about the size of a pencil eraser or a dime. Standard construction gaps around pipes, utility lines, vents, and foundation cracks are typically much larger than this. Most homes have dozens of potential entry points that the average homeowner has never considered.'],
      ['h3', 'Where They Enter Most Often'],
      ['p', 'The most common entry points are: gaps where pipes and utility lines enter the building (electrical, plumbing, HVAC), foundation cracks and gaps where the sill plate meets the foundation, gaps beneath doors without door sweeps, damaged roof vents or soffit vents, and gaps around window air conditioning units. Attached garages are particularly common entry points because the gap at the bottom of garage doors is rarely sealed effectively.'],
      ['h3', 'How to Seal Your Home'],
      ['p', 'Walk the entire exterior perimeter of your home and probe every gap, crack, and penetration. For gaps smaller than ¼ inch, caulk is sufficient. For larger gaps, use steel wool packed tightly into the opening and then sealed with caulk over the top — rodents can chew through foam, wood, and plastic, but not steel wool. Hardware cloth (¼ inch mesh) is appropriate for larger openings like vents and crawl space access points.'],
      ['h3', 'Inside the Home'],
      ['p', 'Store food — including pet food — in sealed hard-sided containers, not bags or cardboard boxes. Keep firewood at least 20 feet from the house. Remove clutter that provides nesting habitat (piles of paper, fabric, insulation). Check regularly for signs of rodent activity: droppings, gnaw marks, greasy smear marks along walls, and unexplained holes in food packaging.'],
      ['h3', 'If You Find Evidence of Rodents'],
      ['p', 'Do not sweep or vacuum immediately. Follow the CDC wet disinfection protocol before disturbing any droppings or nesting material. Set snap traps rather than glue traps, which can cause the mouse to urinate when struggling, increasing virus exposure risk. If infestation is significant, consider a professional pest control service and inform them that hantavirus is a concern in your area.'],
    ],
  },

  { cat: 'Science', catClass: 'cat-science', date: 'Apr 10, 2026', readTime: '8 min read',
    title: 'Inside HPS: How Hantavirus Destroys the Lungs in 72 Hours',
    excerpt: 'Hantavirus Pulmonary Syndrome is one of the fastest-moving respiratory diseases known. A step-by-step look at how the virus overwhelms the immune system and floods the lungs with fluid.',
    icon: '🧬',
    body: [
      ['p', 'Hantavirus Pulmonary Syndrome is one of medicine’s most dramatic disease progressions. A person can go from feeling mildly unwell to requiring mechanical ventilation in less than 48 hours. Understanding the mechanism of this devastation helps explain why early recognition is so critical — and why there is currently no effective antiviral to interrupt it.'],
      ['h3', 'Entry and Initial Infection'],
      ['p', 'Hantavirus enters the body almost exclusively through inhalation of aerosolized virus particles in infected rodent excretions. The virus particles are incredibly small — approximately 80–120 nanometers — and can remain viable in dried material for several days under cool, shaded conditions. Once inhaled, the virus infects cells lining the respiratory tract and rapidly targets a specific surface molecule called integrin β3, which is found in high concentrations in the lungs, kidneys, and blood vessels.'],
      ['h3', 'The Immune System Paradox'],
      ['p', 'Here is where HPS becomes counterintuitive: the virus itself does not directly destroy tissue. The destruction is caused by your own immune system. Hantavirus triggers a massive, dysregulated immune response. CD8+ T-cells flood the lungs in enormous numbers, releasing inflammatory cytokines — particularly TNF-α and IFN-γ — that cause the tiny blood vessels in the lungs (capillaries) to become abnormally permeable. Fluid from the bloodstream leaks into the air sacs of the lungs (alveoli).'],
      ['h3', 'Pulmonary Edema and ARDS'],
      ['p', 'As fluid accumulates in the alveoli, the lungs’ ability to exchange oxygen for carbon dioxide collapses. Blood oxygen levels fall rapidly. The heart, now working against flooded lungs, begins to fail. This produces Acute Respiratory Distress Syndrome (ARDS) combined with cardiogenic shock — a combination that is exceptionally difficult to manage even in advanced ICU settings. The entire process from first respiratory symptoms to critical instability can unfold in 24–72 hours.'],
      ['h3', 'Why Fluid Management Is So Difficult'],
      ['p', 'In most forms of respiratory failure, giving intravenous fluids supports the circulatory system. In HPS, this backfires — additional fluid accelerates the accumulation in the lungs. Physicians managing HPS must walk a narrow line between maintaining cardiac output and not worsening pulmonary edema. This delicate balance has led to the use of extracorporeal membrane oxygenation (ECMO) at specialized centers, which bypasses the lungs entirely while the body either recovers or succumbs.'],
      ['h3', 'Survival and Recovery'],
      ['p', 'Patients who survive the cardiopulmonary phase — typically those who receive intensive support within the first hours of respiratory compromise — often recover fully, with lungs returning to normal function. The virus is cleared by the immune system within weeks. There are no known long-term pulmonary sequelae in survivors. Survival is almost entirely a function of how quickly the patient reaches advanced medical care after symptoms begin.'],
    ],
  },
  { cat: 'Science', catClass: 'cat-science', date: 'Apr 5, 2026', readTime: '7 min read',
    title: 'Is a Hantavirus Vaccine Coming? Here’s Where Research Stands in 2026',
    excerpt: 'China has a licensed vaccine, but it’s not available in the West. A look at current clinical trials, mRNA candidates, and why progress has been slow for a virus with a 36% fatality rate.',
    icon: '💉',
    body: [
      ['p', 'With a 36% fatality rate and no approved antiviral treatment available in Western countries, hantavirus remains one of the most dangerous diseases most people have never thought about. The question of why there is no vaccine — and whether one is coming — is more complicated than it might appear.'],
      ['h3', 'China’s Existing Vaccine'],
      ['p', 'China is the only country in the world with a licensed hantavirus vaccine, and in fact has two: a bivalent vaccine covering both Hantaan (HTNV) and Seoul (SEOV) strains, and a monovalent Hantaan vaccine. These have been in use since the 1990s and have contributed to a significant reduction in HFRS cases in China. However, they are not available outside China, and their efficacy data has not been evaluated by Western regulatory agencies. More critically, they target Asian strains and would not protect against Sin Nombre or Andes viruses.'],
      ['h3', 'Why No Western Vaccine Yet'],
      ['p', 'Several factors have slowed vaccine development in the US and Europe. The case count, while tragic in individual terms, is low enough that there has been limited commercial incentive for pharmaceutical investment. There is no animal model that perfectly replicates human HPS, making preclinical testing difficult. Each major hantavirus strain is antigenically distinct, meaning a vaccine would need to be either multi-valent or tailored by region. And the lack of an approved animal challenge model has complicated FDA regulatory pathways.'],
      ['h3', 'Current Candidates in Development'],
      ['p', 'As of 2026, there are several promising candidates in various stages of development. DNA vaccines expressing hantavirus nucleocapsid and glycoprotein antigens have shown strong immune responses in animal studies. Virus-Like Particle (VLP) vaccines, which mimic the outer structure of the virus without containing any genetic material, have advanced to early Phase I/II trials in the US with encouraging safety profiles. mRNA vaccine platforms, accelerated by COVID-19 research infrastructure, are now being adapted for hantavirus — preliminary data from several academic centers is expected later in 2026.'],
      ['h3', 'The 2026 Outbreak as a Catalyst'],
      ['p', 'The MV Hondius cluster, with its potential person-to-person transmission via Andes virus, has renewed urgency in the research community. Several virologists have publicly called for increased NIH and BARDA funding specifically for Andes virus vaccine development. Whether this translates into accelerated timelines remains to be seen — vaccine development cycles are typically measured in years, not months. But awareness is rising, and the political will that accompanies high-profile outbreaks can shift research priorities quickly.'],
    ],
  },
  { cat: 'Prevention', catClass: 'cat-prevention', date: 'Mar 28, 2026', readTime: '6 min read',
    title: 'Opening a Cabin After Winter? Follow This Hantavirus Safety Checklist First',
    excerpt: 'Closed-up cabins and vacation homes are high-risk environments for hantavirus exposure. A complete room-by-room safety protocol before you breathe the air inside.',
    icon: '🏠',
    body: [
      ['p', 'Every spring, millions of people open vacation cabins, hunting camps, and storage buildings that have been closed through the winter. Many of these structures have hosted rodents in their absence. The combination of enclosed spaces and disturbed dried droppings has historically been one of the highest-risk situations for hantavirus exposure. This checklist can prevent a tragedy.'],
      ['h3', 'Before You Arrive'],
      ['p', 'Pack your PPE before leaving home: N95 respirator mask, nitrile gloves, eye protection, and if possible a Tyvek coverall. Bring EPA-registered disinfectant spray, paper towels, and heavy-duty garbage bags. Do not assume the cabin is clean just because it looked fine last year.'],
      ['h3', 'Upon Arrival: Don’t Go In Yet'],
      ['p', 'Open all windows and doors from the outside if possible. If the structure is tight, crack the door, prop it open, and step back. Allow 30 minutes of ventilation before entering. Do not run inside to beat the cold — this step is not optional. Aerosolized virus particles from disturbed droppings can deliver a lethal dose within seconds of inhalation.'],
      ['h3', 'Initial Inspection (PPE On)'],

      ['h3', 'After Cleaning'],
      ['p', 'Seal all garbage bags, double-bag, and dispose in an outdoor covered trash receptacle. Remove and dispose of your PPE (except the respirator, which can be reused if undamaged). Wash your hands thoroughly. Shower and change clothes before re-entering the clean area. Inspect the exterior for entry points and seal before your next visit. Finally — and this is important — tell family members about the cleaning you’ve done and what signs to watch for in the following weeks.'],
      ['em', 'If anyone who helped with cleaning develops fever, deep muscle aches, or respiratory symptoms within 8 weeks, seek immediate medical evaluation and mention hantavirus exposure explicitly.'],

function statusToColor(s) {
  return s === 'active' ? '#dc2626' : s === 'watch' ? '#d97706' : s === 'endemic' ? '#3b82c4' : '#94a3b8';
}

function buildMarkerIcon(m) {
  if (!window.L) return null;
  const color = statusToColor(m.status);
  const isActive = !!m.priority;
  const ring = isActive ? '<span class="hh-marker-pulse" style="background:' + color + '"></span>' : '';
  const html = (
    '<div class="hh-marker' + (isActive ? ' hh-marker-active' : '') + '" style="--mc:' + color + '">' +
      ring +
      '<span class="hh-marker-dot" style="background:' + color + '"></span>' +
      '<span class="hh-marker-label">' + (m.flag || '') + ' ' + m.name + '</span>' +
    '</div>'
  );
  return window.L.divIcon({
    className: 'hh-divicon',
    html,
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });
}

function WorldMap() {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const [selectedId, setSelectedId] = useState('hondius');
  const [mapReady, setMapReady] = useState(false);

  useEffect(() => {
    if (!window.L || !containerRef.current || mapRef.current) return;
    const L = window.L;
    const map = L.map(containerRef.current, {
      center: [20, -10],
      zoom: 2,
      minZoom: 2,
      maxZoom: 7,
      worldCopyJump: true,
      scrollWheelZoom: true,
      zoomControl: true,
      attributionControl: true
    });
    mapRef.current = map;

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // MV Hondius voyage track
    const track = L.polyline(MAP_TRACK, {
      color: '#dc2626',
      weight: 2,
      opacity: 0.55,
      dashArray: '6 6',
      smoothFactor: 1
    }).addTo(map);

    // Markers
    MAP_MARKERS.forEach(m => {
      const icon = buildMarkerIcon(m);
      if (!icon) return;
      const marker = L.marker([m.lat, m.lng], { icon, riseOnHover: true, title: m.name });
      marker.on('click', () => {
        setSelectedId(m.id);
        map.flyTo([m.lat, m.lng], Math.max(map.getZoom(), 4), { duration: 0.7 });
      });
      marker.addTo(map);
      markersRef.current.push({ id: m.id, marker });
    });

    setMapReady(true);

    // Refresh on resize for responsive layouts
    setTimeout(() => map.invalidateSize(), 250);

    return () => {
      map.remove();
      mapRef.current = null;
      markersRef.current = [];
    };
  }, []);

  const selected = MAP_MARKERS.find(m => m.id === selectedId) || MAP_MARKERS[0];
  const statusLabel = STATUS_LABELS[selected.status] || selected.status;
  const accent = statusToColor(selected.status);

  const focusMarker = (m) => {
    setSelectedId(m.id);
    if (mapRef.current) {
      mapRef.current.flyTo([m.lat, m.lng], Math.max(mapRef.current.getZoom(), 4), { duration: 0.7 });
    }
  };
  const resetView = () => {
    setSelectedId('hondius');
    if (mapRef.current) mapRef.current.flyTo([20, -10], 2, { duration: 0.7 });
  };

  return (
    <div className="map-section">
      <div className="map-shell">
        <div className="map-canvas">
          <div ref={containerRef} className="leaflet-host" aria-label="Interactive global hantavirus map" />
          {!mapReady && (
            <div className="map-loading">Loading interactive map…</div>
          )}
          <div className="map-legend">
            <div className="legend-item"><div className="legend-dot l-active"></div> Active outbreak</div>
            <div className="legend-item"><div className="legend-dot l-watch"></div> Under watch</div>
            <div className="legend-item"><div className="legend-dot l-endemic"></div> Endemic region</div>
            <div className="legend-item map-reset" onClick={resetView}>↺ Reset view</div>
          </div>
        </div>
        <aside className="map-detail" style={{ '--accent': accent }}>
          <div className="map-detail-status">{statusLabel}</div>
          <h3 className="map-detail-title">{selected.flag} {selected.name}</h3>
          <div className="map-detail-region">{selected.region}</div>
          <div className="map-detail-stat">{selected.cases}</div>
          <div className="map-detail-sub">{selected.subtitle}</div>
          <p className="map-detail-notes">{selected.notes}</p>
          <div className="map-detail-pillrow">
            {MAP_MARKERS.filter(m => m.id !== selected.id).slice(0, 6).map(m => (
              <button key={m.id} className="map-pill" onClick={() => focusMarker(m)}>
                <span className="map-pill-dot" style={{ background: statusToColor(m.status) }}></span>
                {m.flag} {m.name}
              </button>
            ))}
          </div>
          <div className="map-detail-hint">Tip: scroll or pinch to zoom · click a marker for details</div>
        </aside>
      </div>
    </div>
  );
}

function ArticleModal({ post, postIndex, onClose }) {
  const [copied, setCopied] = useState(false);
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    // iOS-safe scroll lock — position: fixed actually prevents body scroll on iOS Safari
    const scrollY = window.scrollY;
    const body = document.body;
    const original = {
      position: body.style.position,
      top: body.style.top,
      left: body.style.left,
      right: body.style.right,
      width: body.style.width,
      overflow: body.style.overflow,
    };
    body.style.position = 'fixed';
    body.style.top = `-${scrollY}px`;
    body.style.left = '0';
    body.style.right = '0';
    body.style.width = '100%';
    body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      body.style.position = original.position;
      body.style.top = original.top;
      body.style.left = original.left;
      body.style.right = original.right;
      body.style.width = original.width;
      body.style.overflow = original.overflow;
      window.scrollTo(0, scrollY);
    };
  }, [onClose]);

  if (!post) return null;

  return (
    <div className="article-modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="article-modal-card">
        <div className="article-modal-header">
          <button className="article-modal-close" onClick={onClose}>✕</button>
          <span className={'blog-cat ' + post.catClass} style={{ fontSize: '.7rem', padding: '3px 12px', borderRadius: '10px', marginBottom: '14px', display: 'inline-block' }}>{post.cat}</span>
          <h2 className="article-modal-title">{post.title}</h2>
          <p className="article-modal-meta">By Hanta Hub Editorial · {post.date} · {post.readTime}</p>
        </div>
        <div className="article-modal-body">
          {post.body.map((node, i) => {
            const [tag, text] = node;
            if (tag === 'h3') return <h3 key={i}>{text}</h3>;
            if (tag === 'em') return <p key={i}><em>{text}</em></p>;
            return <p key={i}>{text}</p>;
          })}
          <div className="share-row">
            <span className="share-label">Share:</span>
            <a className="share-btn"
               href={`https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title + ' — Hanta Hub')}&url=${encodeURIComponent('https://hantavirussupplies.com/?post=' + (postIndex ?? 0))}`}
               target="_blank" rel="noopener noreferrer">𝕏 Twitter</a>

               href={`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://hantavirussupplies.com/?post=' + (postIndex ?? 0))}`}
               target="_blank" rel="noopener noreferrer">f Facebook</a>

               target="_blank" rel="noopener noreferrer">in LinkedIn</a>
            <a className="share-btn"
               href={`mailto:?subject=${encodeURIComponent(post.title + ' — Hanta Hub')}&body=${encodeURIComponent('Thought you might find this interesting: ' + post.title + '\n\nhttps://hantavirussupplies.com/?post=' + (postIndex ?? 0))}`}>
              ✉ Email
            </a>
            <button
              className={'share-btn' + (copied ? ' copied' : '')}
              onClick={async () => {
                const link = 'https://hantavirussupplies.com/?post=' + (postIndex ?? 0);
                try {

                  window.prompt('Copy this link:', link);
                }
              }}>
              {copied ? '✓ Copied!' : '🔗 Copy Link'}
            </button>
          </div>

function SourcesSection() {
  const [filter, setFilter] = useState('All');
  const filters = ['All', 'Authority', 'Wire', 'News', 'Science'];
  const filtered = filter === 'All' ? NEWS_SOURCES : NEWS_SOURCES.filter(s => s.tag === filter);
  // Pick the most recent date across NEWS_SOURCES rather than relying on index 0,
  // since the array is in source-display order (WHO first) and may not start with the freshest item.
  const lastUpdated = (() => {
    const parsed = NEWS_SOURCES
      .map(s => ({ date: s.date, t: Date.parse(s.date) }))
      .filter(x => !isNaN(x.t))
      .sort((a, b) => b.t - a.t);
    return parsed.length ? parsed[0].date : '';
  })();

  return (
    <section>
      <div className="hero" style={{ padding: '48px 40px 40px' }}>
        <div className="hero-inner">
          <div className="hero-badge">🌐 Global Coverage</div>
          <h1>Latest <em>From The World</em></h1>
          <p>Curated coverage of the 2026 hantavirus outbreak from health authorities, wire services, major news outlets, and the scientific press.</p>
        </div>
      </div>

      <div className="sources-body fade-in">
        <div className="sources-header">
          <div>
            <h2 className="section-title">Global News & Authority Updates</h2>
            <p className="section-sub">15 sources · headlines updated daily.</p>
          </div>
          <div className="sources-updated"><span></span> Last updated: {lastUpdated}</div>
        </div>

        <div className="sources-filters">
          {filters.map(f => (
            <button
              key={f}
              className={'sources-filter' + (filter === f ? ' active' : '')}
              onClick={() => setFilter(f)}
            >
              {f}
            </button>
          ))}
        </div>

        <div className="sources-grid">
          {filtered.map((s, i) => (
            <a
              key={i}
              className="source-card"
              href={s.url}
              target="_blank"
              rel="noopener noreferrer"
            >
              <div className="source-card-top">
                <div className="source-meta">
                  <img className="source-favicon" src={s.favicon} alt="" loading="lazy" />
                  <div className="source-name">{s.source}</div>
                </div>
                <div className="source-date">{s.date}</div>
              </div>
              <span className={'source-tag ' + s.tagClass}>{s.tag}</span>
              <h3 className="source-headline">{s.title}</h3>
              <p className="source-excerpt">{s.excerpt}</p>
              <div className="source-cta">Read at {s.source}</div>
            </a>
          ))}
        </div>
      </div>
    </section>
  );
}
