  { cat: 'Science', catClass: 'cat-science', date: 'May 22, 2026', readTime: '7 min read',
    title: 'Hantavirus and HIV: What the Published Evidence Says About a Long-Suspected Comorbidity Pairing',
    excerpt: 'Advanced HIV is widely assumed to be a major risk factor for severe hantavirus pulmonary syndrome. The published evidence is thinner and more nuanced than the assumption. For people living with HIV in Andes virus or Sin Nombre virus endemic regions — and for the global PLWH community asking the question after the MV Hondius cluster — here is what the literature actually shows and what it does not.',
    icon: '🧬',
    body: [
      ['p', 'The question of whether people living with HIV (PLWH) face a higher risk of severe hantavirus pulmonary syndrome (HPS) is one of the most frequently asked comorbidity questions after each cluster of HPS hits the news. The 2026 MV Hondius cluster has been no exception: the WHO and ECDC have both fielded questions about whether the working risk assessment shifts for the PLWH community living in Andes virus endemic regions of Argentina and Chile, or for travellers with controlled HIV considering trips into endemic geographies. The published evidence is meaningfully thinner and more nuanced than the public assumption, and the operational message is more useful than a simple binary.'],
      ['h3', 'What the Hantavirus Literature Actually Shows'],
      ['p', 'The largest published cohorts of HPS — the Argentine Patagonia cohort, the Chilean Servicio de Salud Magallanes ECMO series, and the US Sin Nombre cohort coordinated through the CDC HPS Registry — have together accumulated fewer than two thousand cases over the past three decades. Among those datasets, the predictors that have consistently emerged as independent risks for fatal outcome are older age, male sex, smoking history, and delayed clinical presentation. HIV status is not in the canonical predictor list. That null result is partly real and partly statistical: HPS is rare, HIV-positive HPS patients are rarer still, and the studies have not had the power to detect a moderate independent effect.'],
      ['h3', 'Why a Conservative Interpretation Is Still Reasonable'],
      ['p', 'A conservative interpretation that treats advanced HIV as a potential risk factor is reasonable on biological grounds. HPS pathology is driven in part by an exuberant cytokine response from infected pulmonary capillary endothelium; impaired cellular and humoral immunity in the early viraemic phase could plausibly produce higher peak viraemia and a steeper capillary leak. Supportive care during the acute cardiopulmonary phase is largely supportive — oxygen, intubation, ECMO in the highest-acuity cases — and patients entering that phase with diminished reserve from advanced HIV, opportunistic infections or untreated immune suppression are starting the most dangerous days of the illness from a worse baseline.'],
      ['h3', 'Where Controlled HIV Sits on the Risk Map'],
      ['p', 'For PLWH on stable antiretroviral therapy with a suppressed viral load and a CD4 count above 350 cells per microlitre, the published epidemiology does not support treating HIV as a meaningful independent risk factor for severe HPS. The practical risk equation for a PLWH traveller with well-controlled HIV is dominated by exposure profile, not host immune status: travel to a major European or North American city carries effectively no hantavirus risk, while rural travel into Andes virus or Sin Nombre virus endemic regions introduces the same low background risk as for the general population. For PLWH with low CD4 counts, detectable viraemia, or active opportunistic infection, the conservative interpretation supports a higher level of awareness, a lower threshold for medical evaluation, and a coordinated risk-reduction plan with the treating HIV clinician before any travel into endemic regions.'],
      ['h3', 'Practical Steps for PLWH in Endemic Regions'],
      ['p', 'For PLWH living in or travelling through Andes virus endemic regions of Argentina and Chile, or Sin Nombre virus endemic regions of the US Four Corners and the Pacific Northwest, the practical risk-reduction list is the same as for the general population, applied with a slightly lower threshold for caution. Avoid cabins, outbuildings or storage spaces that have been unoccupied for prolonged periods without ventilation. Never sweep dry in rodent-affected areas; wet-disinfect with a 1:10 dilution of household bleach, allow at least five minutes of contact time, and wear an N95 respirator, sealed goggles, and nitrile gloves. Avoid camping or sleeping directly on the ground in areas with high rodent density. Coordinate with the treating HIV clinician on what symptoms should trigger a same-day evaluation, and ensure that travel does not interrupt antiretroviral therapy continuity.'],
      ['h3', 'When to Seek Care'],
      ['p', 'For any PLWH who develops fever, severe muscle aches, and shortness of breath within eight weeks of potential rodent exposure, the right action is a same-day medical evaluation with explicit declaration of HIV status, current CD4 count and antiretroviral regimen, and the exposure history. The seven-day window after symptom onset is the critical decision point: HPS patients hospitalised with supportive care during the prodromal phase or at the start of the cardiopulmonary phase have meaningfully better outcomes than those who present late. For PLWH in particular, the early-presentation rule is the single highest-yield intervention.'],
      ['h3', 'The Honest Read'],
      ['p', 'Hantavirus is a low-probability but high-consequence infection. HIV status is one variable in a calculation that remains dominated by exposure profile and presentation timing. The published evidence does not support routine travel restrictions or behavioural exclusions for the PLWH community, but it does support a higher level of awareness, an explicit risk-reduction plan, and a low threshold for seeking care — particularly for PLWH with low CD4 counts or detectable viraemia.'],
      ['em', 'Last updated · May 22, 2026 · Sources: CDC Hantavirus Disease Information for Health Care Professionals, WHO Hantavirus Fact Sheet, Argentine Ministry of Health Andes virus epidemiology bulletins, Chilean Servicio de Salud Magallanes ECMO series (Castillo C et al.), US Sin Nombre cohort (CDC HPS Registry), peer-reviewed case-control studies on HPS comorbidities (Ferrer JF et al.; MacNeil A et al.).'],
    ],
  },
  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 19, 2026', readTime: '8 min read',
    title: 'Day 7 of Monitoring: MV Hondius Disinfection Underway in Rotterdam, 23 Non-Dutch Crew Enter Calandsteiger Six-Week Quarantine, Cluster Holds at 12',
    excerpt: 'Tuesday May 19, 2026 is Day 7 of the WHO 42-day active monitoring window for the MV Hondius cohort. The disinfection of the ship itself is now under way at the Rotterdam jetty, and Oceanwide Expeditions has indicated it is targeting a May 29 redeparture date. The 23 non-Dutch crew members who returned the vessel from Tenerife entered a six-week quarantine in separate cabins on Calandsteiger 7, a piece of headland inside the harbour; the two Dutch crew were repatriated to their homes. The cluster total holds at 12 cases and 3 deaths.',
    icon: '🧴',
    body: [
      ['p', 'Tuesday May 19, 2026 is Day 7 of the WHO 42-day active monitoring window for the roughly 122 passengers and crew repatriated from the MV Hondius. Three operational threads carry the day. First, the disinfection of the ship itself is now under way at the Rotterdam jetty. Second, the 23 non-Dutch crew members who returned the vessel from Tenerife have moved into a six-week quarantine in separate cabins on Calandsteiger 7, a small piece of headland inside the harbour, with the two Dutch crew repatriated to their homes for the remainder of the monitoring window. Third, the cluster total holds at 12 PCR-confirmed-or-probable cases and 3 deaths — no new PCR-positive results have been reported in any receiving country in the past 24 hours.'],
      ['h3', 'Rotterdam: A Disinfection Cycle With A May 29 Target'],
      ['p', 'Oceanwide Expeditions, the Dutch operator of the MV Hondius, has indicated that the disinfection cycle now under way is on a schedule that would allow a return to service on May 29. That timeline depends on the standard sequence of operations any high-containment shipboard cleanup runs through: a first walk-through to identify and seal cabins occupied by symptomatic passengers; a wet disinfection pass on hard surfaces; deep cleaning or removal of soft furnishings in higher-risk cabins; HVAC system inspection and filter replacement; and a final environmental sampling pass to confirm the absence of viable virus before the vessel is released. The work is being coordinated at the jetty by the Port of Rotterdam health authority working with the Erasmus Medical Center and the city of Rotterdam.'],
      ['h3', 'Calandsteiger 7: A Six-Week Crew Quarantine'],
      ['p', 'The 23 non-Dutch crew members entered a six-week quarantine on Calandsteiger 7, a piece of headland inside the Port of Rotterdam, in separate cabins with internet and catering. The six-week duration matches the outer bound of the WHO 42-day active monitoring window: even though the crew themselves remain asymptomatic and were inside the receiving end of the operational pipeline rather than the index-case pipeline, the cluster has documented Andes virus incubation periods ranging from one to eight weeks, and the conservative protocol is to hold each crew member through the upper end of that distribution. The two Dutch crew members were able to be repatriated to their homes — they will continue active home-based monitoring for the remainder of the window under the supervision of the Dutch National Institute for Public Health and the Environment (RIVM) and the GGD Rotterdam.'],
      ['h3', 'Paris and Madrid: The Clinical Picture'],
      ['p', 'The French woman at Hôpital Bichat-Claude Bernard in Paris remains critically ill on extracorporeal membrane oxygenation (ECMO). Her care team — led by Dr Xavier Lescure of the Bichat infectious disease service — reports her status unchanged overnight. Published Andes virus literature places the highest-risk window for acute capillary leak in the cardiopulmonary phase at roughly four to seven days after symptom onset, and by Day 7 of the monitoring window the French patient is past the centre of that distribution. The Madrid cohort at Hospital Central de la Defensa Gómez Ulla, by contrast, is now in step-down territory: the Spanish Public Health Commission confirms the day-7 PCRs returned uniformly negative across the Spanish cohort over the weekend, and asymptomatic passengers are being phased into home-based active monitoring for the remainder of the window.'],
      ['h3', 'Nebraska and Atlanta: A Quiet Day for the US Cohort'],
      ['p', 'At the National Quarantine Unit at the University of Nebraska Medical Center in Omaha, the 16 American passengers remain asymptomatic. UNMC infectious disease staff are continuing in-depth interviews to determine whether a step-down from facility-based quarantine to home-based active monitoring is appropriate. Dr Stephen Kornfeld, whose follow-up PCR returned negative last week after a mildly positive admission test, remains in the quarantine unit. At Emory University Hospital in Atlanta, the two travellers transferred earlier in the cluster remain under evaluation; the Centers for Disease Control and Prevention has not released further specifics.'],
      ['h3', 'What To Watch Over the Next 48 Hours'],
      ['p', 'Three things will define the next two days. First, whether any of the receiving countries report a new PCR-positive on the second wave of day-7 retests — the next batch is expected from a mix of European cohorts mid-week. Second, whether the Rotterdam disinfection cycle stays on the May 29 timeline, which would mark the operational close of the maritime phase of the cluster. Third, whether the French ECMO patient at Bichat shows any further clinical inflection, which would be the single most consequential individual data point.'],
      ['em', 'Last updated · May 19, 2026 · Sources: ECDC Andes hantavirus update 18 May, WHO Disease Outbreak News DON601, Oceanwide Expeditions press updates, Irish Times, NBC News, France 24, Wikipedia "MV Hondius hantavirus outbreak", RIVM and GGD Rotterdam advisories.'],

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 19, 2026', readTime: '6 min read',
    title: 'Hantavirus and Immunocompromised Travellers: What the Published Risk Actually Says',
    excerpt: 'Immunocompromise — including people on chemotherapy, recipients of solid-organ transplants, those on chronic high-dose corticosteroids, and people with advanced HIV — has long been suspected as a risk factor for severe hantavirus pulmonary syndrome. The published evidence is thinner than the assumption. Here is what the literature actually says, and what it means in practice for travellers heading into endemic regions.',
    icon: '🛡️',
    body: [
      ['p', 'A question that surfaces every time hantavirus is in the news is whether immunocompromised travellers should change plans. The 2026 MV Hondius cluster has been no exception: at least one of the confirmed European cases is known to have multiple comorbidities, and the question of whether immune status independently affects outcome is being asked at every WHO and ECDC briefing. The published evidence is meaningfully thinner than the assumption, and the operational message is more nuanced than "high-risk travellers should not go".'],
      ['h3', 'What the Literature Actually Shows'],
      ['p', 'The peer-reviewed hantavirus literature includes case series and case-control studies from Argentina, Chile, and the United States that have attempted to identify independent predictors of severe outcome from hantavirus pulmonary syndrome (HPS) and hantavirus cardiopulmonary syndrome (HCPS). The predictors that consistently emerge across studies are older age, male sex, smoking history, and delayed clinical presentation. Immunocompromise — defined variously as solid-organ transplant, active chemotherapy, chronic high-dose corticosteroid use, or advanced HIV — appears as a risk factor in some small case series but not as an independent predictor in pooled analyses. Part of that null result is real, and part is power: HPS is rare, the published cohorts include fewer than two thousand cases across the Americas over thirty years, and immunocompromised individuals are a small subset of any such cohort.'],
      ['h3', 'Why a Conservative Read Is Still Defensible'],
      ['p', 'Even with the evidence being thinner than the public assumption, a conservative interpretation is defensible on two grounds. First, the mechanism is biologically plausible: hantavirus pulmonary syndrome is driven in part by an exuberant cytokine response, and impaired antibody and cellular responses in the early viraemic phase could plausibly lead to higher peak viraemia and a steeper capillary leak. Second, supportive care during the acute cardiopulmonary phase is largely supportive: oxygen, intubation if needed, ECMO in the highest-acuity cases. Patients who enter that phase with diminished reserve — from cancer treatment, transplant immunosuppression, or HIV-related comorbidity — are starting the most dangerous days of the disease from a worse baseline regardless of whether their underlying condition is itself an independent infection risk.'],
      ['h3', 'What the Risk Equation Looks Like for Travellers'],
      ['p', 'The practical risk for a traveller — immunocompromised or not — depends overwhelmingly on the exposure profile, not the host. Travelling to a major European or North American city carries effectively no hantavirus risk regardless of immune status. Rural travel in Andes virus endemic regions (Patagonia, southern Chile) or Sin Nombre virus endemic regions (the US Four Corners region, parts of California and the Pacific Northwest) introduces a low background risk that increases with rural cabin stays, exposure to rodent-infested outbuildings, and any activity that involves disturbing dust in confined indoor spaces. The 2026 MV Hondius cluster has demonstrated that an unusual exposure context — a confined shipboard environment with prolonged close contact — can produce a small cluster, but the underlying community-spread risk for the average traveller remains essentially the same as it was before the cluster.'],
      ['h3', 'Practical Steps for Higher-Risk Travellers'],
      ['p', 'For immunocompromised travellers planning trips that include rural lodging in endemic regions, the practical risk-reduction list is short and high-impact. Avoid cabins or outbuildings that have been unoccupied for prolonged periods without ventilation. Avoid sweeping or vacuuming dusty spaces; wet-disinfect with a 1:10 dilution of household bleach and allow at least five minutes of contact time before any wiping. Wear an N95 respirator and nitrile gloves if there is no alternative to cleaning a rodent-affected space. Avoid camping or sleeping directly on the ground in areas with high rodent density. Coordinate with your treating physician before the trip on what symptoms should trigger a same-day evaluation and on what continuity-of-care plan should travel with you.'],
      ['h3', 'When to Seek Care'],
      ['p', 'For any traveller — immunocompromised or not — who develops fever, severe muscle aches, and shortness of breath within eight weeks of potential exposure, the right action is a same-day medical evaluation with an explicit travel-history declaration. The seven-day window after symptom onset is the critical decision point: patients who are hospitalised with supportive care during the prodromal phase or at the start of the cardiopulmonary phase have meaningfully better outcomes than those who present late. For immunocompromised patients in particular, a low threshold for evaluation is the single highest-yield intervention.'],
      ['h3', 'The Honest Read'],
      ['p', 'Hantavirus is a low-probability but high-consequence infection. Immune status is one variable in a calculation that is dominated by exposure profile and presentation timing. The published evidence does not support routine travel restrictions for immunocompromised individuals, but it does support a high level of awareness, an explicit risk-reduction plan, and a low threshold for seeking care.'],
      ['em', 'Last updated · May 19, 2026 · Sources: CDC Hantavirus Disease Information for Health Care Professionals, WHO Hantavirus Fact Sheet (2024), Argentine Ministry of Health Andes virus epidemiology bulletins, peer-reviewed case-control studies (Ferrer JF et al.; MacNeil A et al.).'],
    ],

  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 18, 2026', readTime: '9 min read',
    title: 'Day 6 of Monitoring: MV Hondius Docks Rotterdam, 13 Madrid Day-7 PCRs Negative, Canadian B.C. Case Confirmed, Cluster Now 12',
    excerpt: 'Monday May 18, 2026 is Day 6 of the WHO 42-day active monitoring window. The MV Hondius itself reached the Port of Rotterdam this morning under a 27-person skeleton crew, where the Erasmus Medical Center and the city of Rotterdam will jointly carry out the disinfection at the jetty. In Madrid, the Gómez Ulla cohort\'s day-7 follow-up PCRs returned negative for 13 Spanish passengers; the Public Health Agency of Canada formally confirmed the first Canadian case overnight, bringing the cluster total to 12.',
    icon: '🇳🇱',
    body: [
      ['p', 'Monday May 18, 2026 is Day 6 of the WHO 42-day active monitoring window for the roughly 122 passengers and crew repatriated from the MV Hondius. Three operational threads converged across a single news cycle: the ship itself reached its terminal port and entered the disinfection phase; the Spanish Public Health Commission day-7 follow-up PCRs returned a clean negative read across the Madrid cohort; and the Public Health Agency of Canada formally confirmed the first Canadian Andes virus case from the cluster. The headline number — the cluster total — now sits at 12 cases (9 PCR-confirmed Andes virus, 2 probable, 1 inconclusive) and 3 deaths.'],
      ['h3', 'Rotterdam: The Ship Reaches Its Terminal Port'],
      ['p', 'The MV Hondius docked at the Port of Rotterdam shortly after 10:30 a.m. local time (4:30 a.m. Eastern Time) on Monday after a six-day return voyage from Tenerife. The vessel carried 25 maritime crew and two RIVM medical staff — the 27-person skeleton crew that returned the ship after all passengers had been disembarked and repatriated from the Canary Islands. Twenty-five white quarantine containers were set up along the jetty in advance of arrival, in a row alongside the line of windmills that defines the Rotterdam waterfront. Crew who cannot be repatriated immediately will live in those containers under active monitoring, with satellite internet and catering. The cleaning and disinfection of the vessel will be carried out at the jetty by the Port of Rotterdam health authority working with the Erasmus Medical Center and the city of Rotterdam. Oceanwide Expeditions, the Dutch operator, has previously said it would announce by the end of the week whether the ship returns to its scheduled itinerary or remains offline for the rest of the season.'],
      ['h3', 'Madrid: Thirteen Day-7 PCRs Negative'],
      ['p', 'The Spanish Public Health Commission protocol for the MV Hondius cohort at Hospital Central de la Defensa Gómez Ulla in Madrid calls for two PCR tests separated by seven days: one on admission and a second exactly a week later. The first Spanish cohort was admitted on May 10. The day-7 retests — reported by the Spanish Health Ministry over the weekend — have now returned: 13 Spanish passengers tested negative for hantavirus on the day-7 follow-up, and the two Spanish contacts hospitalised in Alicante and Barcelona for separate evaluation also tested negative. The single hospitalised confirmed Spanish patient at Gómez Ulla is described by the ministry as evolving favourably with minimal symptoms. Asymptomatic passengers with two consecutive negative PCRs are expected to step down from hospital-based monitoring to home-based active monitoring for the remainder of the WHO 42-day window, with access to common areas and supervised family visits in the interim.'],
      ['h3', 'Canada: First Confirmed Case Linked to the Cluster'],
      ['p', 'On Sunday, the British Columbia Provincial Health Officer reported that one of four high-risk B.C. residents under self-isolation — an MV Hondius passenger — had tested presumptive positive for Andes hantavirus. Late Sunday, the Public Health Agency of Canada confirmed the sample positive for Andes, making Canada the latest country to register a confirmed case from the cluster. The patient is one member of a couple in their seventies; both are now hospitalised in Victoria, B.C. Initial symptoms were described as mild — fever and headache — and PHAC stated that the overall risk to Canadians from the Andes hantavirus outbreak remains low, with all confirmed Canadian cases linked to the MV Hondius. The confirmation lifts the cluster total to 12 cases.'],
      ['h3', 'Paris: French ECMO Patient Stable, No Further Deterioration'],
      ['p', 'The French woman at Hôpital Bichat-Claude Bernard in Paris remains critically ill on extracorporeal membrane oxygenation (ECMO). Her care team — led by Dr. Xavier Lescure of Bichat\'s infectious disease service — reported no further deterioration overnight. Lescure has previously described her status as the final stage of supportive care; published Andes virus literature places the highest-risk window for acute capillary leak in the cardiopulmonary phase at roughly four to seven days after symptom onset, and by Day 6 of the monitoring window she is past the centre of that window. The French Health Ministry has separately confirmed that all 26 close contacts of the two confirmed French cases tested negative for Andes hantavirus.'],
      ['h3', 'Nebraska and Atlanta: A Quiet Day for the US Cohort'],
      ['p', 'At the National Quarantine Unit at the University of Nebraska Medical Center in Omaha, the 16 American passengers remain asymptomatic. UNMC infectious disease staff are continuing in-depth interviews to determine whether a step-down from facility-based quarantine to home-based active monitoring is appropriate. Dr. Stephen Kornfeld, whose follow-up PCR returned negative last week after a mildly positive admission test, remains in the quarantine unit. At Emory University Hospital in Atlanta, the two travellers transferred earlier in the cluster remain under evaluation; the Centers for Disease Control and Prevention has not released further specifics.'],
      ['h3', 'The Public-Health Read'],
      ['p', 'For the general population, the WHO and ECDC assessment continues to hold: the risk to the public outside the ship-based cohort and their close contacts is low to very low. No country has changed travel advisories for the Canary Islands, Cape Verde, Argentina, or Chile in response to today\'s events. The single operational milestone that closes the maritime phase of the cluster is the disinfection of the MV Hondius now beginning in Rotterdam; the single most important laboratory signal of the next 48 hours is the second wave of day-7 PCRs in the remaining receiving countries.'],
      ['em', 'Last updated · May 18, 2026 · Sources: ECDC Andes hantavirus update 17 May, WHO Disease Outbreak News DON601, CDC Health Alert Network HAN00528, Public Health Agency of Canada media update, B.C. Provincial Health Officer briefing, Spanish Health Ministry, France 24, NBC News, CBS News, CNN, NPR, Reuters, US News, Inquirer, Oceanwide Expeditions press updates.'],
    ],

  { cat: 'Science', catClass: 'cat-science', date: 'May 18, 2026', readTime: '7 min read',
    title: 'How a Cruise Ship Gets Disinfected After Hantavirus: What the Rotterdam Protocol Actually Looks Like',
    excerpt: 'With the MV Hondius now docked at Rotterdam, the cleaning and disinfection of the vessel begins at the jetty, coordinated by the Port of Rotterdam health authority, the Erasmus Medical Center, and the city. A look at what that protocol actually involves — environmental sampling, surface disinfection, ventilation system decontamination, and the small but real evidence base for how long Andes virus remains viable in indoor environments.',
    icon: '🧴',
    body: [
      ['p', 'With the MV Hondius docked at the Port of Rotterdam as of Monday morning, the cluster has reached the phase that gets the least amount of public airtime and arguably the most amount of operational planning: the cleaning and disinfection of the ship itself. The work will be carried out at the jetty by the Port of Rotterdam health authority working with the Erasmus Medical Center and the city of Rotterdam. Oceanwide Expeditions, the Dutch operator of the vessel, has separately said it will announce by the end of the week whether the ship returns to its scheduled itinerary or stays offline for the rest of the season. The decision will depend in part on what the disinfection cycle and post-disinfection environmental sampling find.'],
      ['h3', 'What the Pathogen Actually Is'],
      ['p', 'Andes virus is an enveloped, negative-sense single-stranded RNA virus in the family Hantaviridae, genus Orthohantavirus. The envelope matters operationally: enveloped viruses are, as a class, relatively easy to inactivate with standard hospital-grade disinfectants. The published environmental persistence data for hantaviruses are limited but consistent: in dried rodent excreta in shaded indoor conditions, infectious virus has been recovered at low levels for periods measured in days rather than weeks, and the recoverable viral load declines substantially with sunlight, heat, and exposure to common disinfectants. The practical implication for shipboard cleaning is that the principal targets are dust, dried excreta in concealed spaces, and porous materials in cabins where a symptomatic passenger spent extended time.'],
      ['h3', 'What the Disinfection Cycle Looks Like in Practice'],
      ['p', 'Hospital-grade quaternary ammonium compounds, sodium hypochlorite (bleach) at a 1:10 dilution from a 5% to 6% household-bleach concentration, and 70% ethanol or isopropanol are all effective against hantaviruses on hard non-porous surfaces. The CDC protocol for hantavirus cleanup, written for cabins and outbuildings, emphasises three principles that translate directly to a ship: never sweep dry; wet the surface with disinfectant and let it sit at least five minutes before wiping or removing debris; and use the right PPE (N95 respirator, sealed goggles, nitrile gloves, full-body coverall) for any cleanup of dried excreta. On a vessel like the MV Hondius, the cycle is typically multi-pass: a first walk-through to identify and seal the rooms occupied by symptomatic passengers; a wet disinfection pass on high-touch hard surfaces (handrails, door frames, bathroom fixtures, galley work surfaces); deep cleaning or removal of soft furnishings in higher-risk cabins; HVAC system inspection with filter replacement; and a final pass with environmental sampling — typically swabs of surfaces and HVAC components — to confirm the absence of viable virus before the ship is released for service.'],
      ['h3', 'Why the HVAC System Matters'],
      ['p', 'Most of what makes the MV Hondius cluster scientifically unusual is the question of how Andes virus moved between very close shipboard contacts. The leading hypothesis is short-range, close-contact respiratory or contact transmission rather than long-range airborne spread, but the question of how much aerosol generation happens in confined cabin air remains genuinely open. That uncertainty is part of why HVAC inspection is non-optional in any shipboard protocol: filters in cabins occupied by symptomatic passengers are typically removed and incinerated as biohazardous waste, ducts are flushed and disinfected, and high-efficiency replacement filters are fitted before the system is restarted. The same logic applies to wet systems — galleys, plumbing traps, laundry. None of these are likely reservoirs of Andes virus, but environmental sampling is cheap relative to the cost of missing a viable focus.'],
      ['h3', 'The Container Quarantine on Shore'],
      ['p', 'Twenty-five white quarantine containers have been set up along the jetty in advance of the ship\'s arrival. Crew members who cannot be repatriated immediately will live in those containers under active monitoring, with satellite internet and catering. The containers are a pragmatic answer to a basic public-health constraint: the 25 crew and 2 medical staff who returned the vessel to Rotterdam are technically still inside the WHO 42-day monitoring window for the cluster, even though they themselves remain asymptomatic. Keeping them on shore in dedicated units rather than dispersing them into the general housing stock is a logistical decision that follows the same principle that placed 17 Americans into the National Quarantine Unit at UNMC in Omaha — concentrate the monitoring, simplify the laboratory follow-up, and minimise onward contact during the highest-risk window for symptom onset.'],
      ['h3', 'What Comes Next'],
      ['p', 'A first reasonable estimate for the full disinfection cycle on a vessel the size of the MV Hondius is in the order of a week, plus environmental sampling and clearance. The commercial decision Oceanwide Expeditions has indicated it will make by the end of the week will sit on top of that operational timeline. If the company elects to return the ship to its scheduled itinerary, regulators in the Netherlands and the European Union will publish their own clearance criteria. If the company elects to keep the ship offline, the protocol still finishes — the ship still has to be released as biologically clean before it goes anywhere, even into long-term storage.'],
      ['em', 'Last updated · May 18, 2026 · Sources: CDC Hantavirus cleanup guidance, ECDC threat assessment briefs, WHO Hantavirus Outbreak Toolbox, Oceanwide Expeditions press updates, France 24 and NBC News coverage of the Rotterdam arrival, RIVM and GGD Rotterdam advisory notes.'],
    ],
  },
  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 17, 2026', readTime: '8 min read',

      ['h3', 'Madrid: Day-7 PCRs Now Inside the Retest Window'],

      ['h3', 'Rotterdam: The Ship Closes the Operational Chapter'],

      ['h3', 'Bichat, Paris: French ECMO Patient Remains Critically Ill'],
      ['p', 'The French woman at Bichat-Claude Bernard Hospital in Paris remains critically ill on extracorporeal membrane oxygenation (ECMO). Her care team — led by Dr Xavier Lescure of Bichat\'s infectious disease service — has previously described her presentation as a severe form of Andes hantavirus pulmonary syndrome with significant lung and heart involvement. Background reporting confirms that the patient has a history of asthma and additional comorbidities, factors that infectious-disease clinicians have flagged as relevant to severe HPS outcomes. The published Andes virus literature places the highest-risk window for acute capillary leak in the cardiopulmonary phase at roughly four to seven days after symptom onset; by Sunday the French patient is past the centre of that window, which clinicians regard as cautiously meaningful but well short of a clinical inflection point.'],
      ['h3', 'Nebraska and Atlanta: A Quiet Day for the US Cohort'],

  { cat: 'Science', catClass: 'cat-science', date: 'May 17, 2026', readTime: '8 min read',
    title: 'Hantavirus and Asthma: Why the French Bichat Case Has Reopened a Comorbidity Question',
    excerpt: 'The French woman on extracorporeal membrane oxygenation at Bichat-Claude Bernard Hospital in Paris is, by background reporting, a woman in her sixties with a history of asthma and additional comorbidities. Asthma is not in itself a known risk factor for severe hantavirus pulmonary syndrome, but the case has reopened a longstanding question in HPS clinical literature: how do pre-existing lung conditions interact with the acute capillary leak of the cardiopulmonary phase?',
    icon: '🫁',
    body: [
      ['p', 'The most clinically scrutinised single patient in the MV Hondius cluster is the French woman receiving extracorporeal membrane oxygenation (ECMO) at Bichat-Claude Bernard Hospital in Paris. Background reporting from multiple outlets — NPR, the New York Times, the CBC — has noted that she is a woman in her sixties with a history of asthma and additional comorbidities. Her care team has described her presentation as a severe form of Andes hantavirus pulmonary syndrome with significant lung and heart involvement. The case has reopened a question that has sat just outside the centre of hantavirus clinical research for two decades: how, if at all, do pre-existing chronic respiratory conditions interact with the acute capillary leak of HPS?'],
      ['h3', 'What HPS Does to the Lung'],
      ['p', 'Hantavirus pulmonary syndrome is, mechanistically, a disease of the pulmonary capillary endothelium. Andes virus and Sin Nombre virus both preferentially infect the endothelial cells that line the small blood vessels of the lung. After an asymptomatic incubation of one to eight weeks, infected patients enter a flu-like prodromal phase of fever, severe myalgia and headache. The defining cardiopulmonary phase begins three to seven days later, when virus-driven endothelial dysfunction causes a rapid capillary leak: protein-rich fluid floods into the alveolar spaces, the lungs become heavy and stiff, gas exchange collapses, and cardiac output falls. The pathology is a low-pressure pulmonary oedema rather than the high-pressure oedema of acute heart failure, and that distinction matters for treatment.'],
      ['h3', 'Where Asthma Sits on the Risk Map'],
      ['p', 'Asthma is not on the canonical list of known risk factors for severe HPS. Published case-control studies from Argentina, Chile and the United States have repeatedly identified older age, male sex, smoking history, and delayed presentation as the strongest predictors of fatal outcome. Asthma has not emerged as an independent risk factor in those datasets. That said, the published HPS cohorts are small — fewer than two thousand Sin Nombre cases across thirty years in the United States, and a comparable number of Andes cases across the same period in Argentina and Chile combined — and the statistical power to detect a moderate effect from a common comorbidity like asthma is genuinely limited. Asthma is also a heterogeneous condition: a well-controlled mild allergic asthmatic is in a very different physiological state from a severe steroid-dependent asthmatic with chronic airway remodelling.'],
      ['h3', 'The Mechanistic Reasons Asthma Might Matter'],
      ['p', 'There are three mechanistic reasons asthma could plausibly worsen HPS outcomes, even in the absence of a strong epidemiological signal. First, asthma is associated with chronic low-grade airway inflammation; the acute inflammatory cascade of HPS may engage on top of a primed inflammatory baseline, with additive effects. Second, asthma is associated with airway smooth-muscle hyper-responsiveness; the bronchoconstriction that can be triggered by acute viral infection may impair mechanical ventilation during the cardiopulmonary phase. Third, asthma is associated with a slightly altered respiratory microbiome and a higher background rate of bacterial colonisation, which can increase the risk of secondary bacterial pneumonia during a critical illness. None of these is a hard mechanistic argument, but they are coherent enough to be biologically plausible.'],
      ['h3', 'How Comorbidities Have Played Out in Other HPS Cohorts'],
      ['p', 'The most rigorous cohort-level analysis of HPS comorbidities is the long-running Argentine Patagonia cohort, which has been published in multiple iterations since the late 1990s. In that cohort, the strongest demographic predictors of mortality are age over fifty and time-to-hospitalisation. Among comorbidities, hypertension and chronic kidney disease have shown weak associations with worse outcomes; obstructive lung disease (a category that includes COPD and severe asthma) has shown a small numerical trend toward worse outcomes that has not consistently reached statistical significance. The United States Sin Nombre cohort, much smaller, has shown a similar pattern: comorbidities are clinically relevant but not dominant determinants of outcome, with severity of acute presentation being the single most important predictor.'],
      ['h3', 'What ECMO Adds, and Where It Has Limits'],
      ['p', 'Extracorporeal membrane oxygenation is the most aggressive form of supportive care available to HPS patients. The Chilean Servicio de Salud Magallanes has published the largest single-centre experience of ECMO in Andes virus HPS — roughly thirty patients over fifteen years — with survival to discharge of approximately sixty percent in carefully selected cases. ECMO does not treat the underlying viral infection; it buys time for the lungs and heart to recover from the acute capillary leak phase. The published Chilean experience suggests that ECMO survival is best when the circuit is initiated early in the cardiopulmonary phase, before profound multi-organ failure develops, and when the patient is otherwise physiologically robust. The Bichat case sits at the harder end of that spectrum: severe presentation, comorbidities, and an age-and-physiology profile that is not ideal for prolonged ECMO support.'],
      ['h3', 'What This Means for People With Asthma Reading This'],
      ['p', 'For asthmatic readers worried about hantavirus, the practical assessment is unchanged from the assessment for the general public: the risk to anyone who was not on the MV Hondius and is not a close prolonged contact of a confirmed Andes virus case is essentially zero. For US asthmatic readers in particular, the relevant risk is Sin Nombre virus exposure during rodent cleanup in rural cabins, RVs and outbuildings in the western states — a risk that is reduced to near-zero by the standard CDC cleanup protocol (ventilation for thirty minutes before entry, wet disinfection with a 1:10 bleach solution, N95 respirator, gloves, eye protection, and double-bagged disposal). Asthma is not a reason to avoid these protocols; it is a reason to follow them carefully and to seek medical evaluation early if any febrile or respiratory illness develops in the eight weeks following a possible exposure.'],
      ['em', 'Last updated · May 17, 2026 · Sources: Chilean Servicio de Salud Magallanes published ECMO outcomes (Bugedo G et al., Castillo C et al.), Argentine Patagonia HPS cohort (Padula PJ et al.), US Sin Nombre cohort (Khan AS et al., CDC HPS Registry), WHO DON601, ECDC Andes hantavirus rapid scientific advice, CDC Andes virus interim public-health investigation guidance, NPR, Le Monde, CBC News.'],
    ],
  },

  { cat: 'Science', catClass: 'cat-science', date: 'May 16, 2026', readTime: '7 min read',
    title: 'How the Andes Virus PCR Window Works — and Why the Day-7 Retest Matters',
    excerpt: 'The day-7 PCR retest scheduled this weekend for the Spanish MV Hondius cohort at Gómez Ulla is not arbitrary. It is calibrated to the kinetics of Andes virus viraemia. Here is a plain-language explanation of what a day-7 PCR can and cannot tell clinicians, and why test schedules differ between receiving countries.',
    icon: '🧪',
    body: [
      ['p', 'The single most-quoted laboratory milestone in the MV Hondius cluster this weekend is the day-7 PCR retest scheduled for the Spanish cohort at Hospital Central de la Defensa Gómez Ulla in Madrid. To understand what a day-7 retest can and cannot tell us, it helps to look at the kinetics of Andes virus viraemia — where the virus lives in the body, when the polymerase chain reaction can detect it, and what a negative result at one timepoint does and does not rule out.'],
      ['h3', 'Where Andes Virus Lives in the Body'],
      ['p', 'Andes virus, like other New World hantaviruses, primarily infects endothelial cells lining small blood vessels in the lungs. Viraemia — circulating virus in the bloodstream — appears late in the incubation period and rises with symptom onset, typically peaking during the febrile prodrome and again during the cardiopulmonary phase. Published Argentine and Chilean cohort data place the median viraemic window at roughly four to twelve days after symptom onset, with significant individual variation.'],
      ['h3', 'What PCR Actually Measures'],
      ['p', 'Real-time reverse-transcription PCR (RT-PCR) amplifies viral RNA from a clinical sample — typically serum, plasma, or whole blood. Assay sensitivity is expressed in cycle-threshold (Ct) values: lower Ct values indicate higher viral RNA copy numbers and stronger positivity. A positive result above roughly Ct 35 is generally regarded as a low-level signal that warrants retesting in clinical context; below Ct 30 is robust positivity. The MV Hondius cluster has produced at least one well-publicised case — Dr Stephen Kornfeld in Nebraska — where the admission PCR was mildly positive at a high Ct, and the follow-up PCR was negative, with the working interpretation that the original signal was either a very early infection clearing the assay window or a low-level false positive.'],
      ['h3', 'Why Day 7 Is the Earliest Useful Retest'],
      ['p', 'For an asymptomatic exposed cohort, day 7 after the last potential exposure is the earliest point at which viraemia in any subclinical infection reliably exceeds the assay\'s detection threshold. Before day 7, the test is operationally a coin flip: a negative PCR does not meaningfully change the pretest probability of infection. After day 7, a negative PCR is more informative, but still does not rule out infection — it shifts the probability rather than eliminating it. That is why public-health authorities continue active symptom monitoring for the full 42-day window even after a negative day-7 result.'],
      ['h3', 'Why Receiving Countries Use Different Schedules'],
      ['p', 'Receiving countries have adopted slightly different testing schedules driven by their respective hospital protocols. Spain runs admission and day-7 PCRs. The United States, through the National Quarantine Unit at the University of Nebraska Medical Center, has run on-admission PCRs plus repeat testing on any symptom onset. France, which has had a single symptomatic case, has prioritised intensive serial PCR on the symptomatic patient at Bichat rather than a fixed schedule across the cohort. None of these schedules is wrong; they reflect different operational trade-offs between bed footprint, laboratory throughput, and the marginal information value of repeat testing in an asymptomatic cohort.'],
      ['h3', 'What Serology Adds Later'],
      ['p', 'PCR is a test of current viraemia; it goes negative once viral RNA in the blood drops below the detection threshold. To establish whether a subclinical or resolved infection occurred during the monitoring window, public-health authorities will run serology — IgM and IgG antibody testing — at several weeks and again at three to six months after the exposure. Serology will be the longer-tail dataset that ultimately quantifies how many of the roughly 122 repatriated passengers were exposed at a level that produced a measurable immune response, whether or not they ever developed symptoms.'],
      ['h3', 'What a Negative Day-7 PCR Cannot Tell You'],
      ['p', 'A negative day-7 PCR cannot rule out infection. It cannot shorten the WHO 42-day active monitoring window. It cannot, on its own, change a patient\'s case classification from probable to ruled-out. What it can do is reduce the pretest probability of incipient illness, justify a step-down in venue (hospital to home) for asymptomatic patients, and contribute to the overall epidemiological picture of who in the cohort was viraemic and when.'],
      ['h3', 'The Practical Headline'],
      ['p', 'For the wider public, the Gómez Ulla day-7 retest matters because it is the first scheduled, protocol-driven laboratory milestone of the receiving-country phase of the response. A clean run of negative results would not end the cluster but would push the working assessment further in the direction WHO and ECDC have already taken: that the shipboard transmission chain is contained and that the receiving-country monitoring window is the right place to be looking for any residual signal. A handful of low-level positives would be operationally meaningful and would prompt repeat testing and re-classification.'],
      ['em', 'Last updated · May 16, 2026 · Sources: peer-reviewed Andes virus literature from Argentina and Chile (Castillo C et al., Riquelme R et al.), WHO Disease Outbreak News DON601, ECDC Andes hantavirus rapid scientific advice, CDC interim guidance on Andes virus public-health investigation (May 14, 2026), Spanish Public Health Commission protocol.'],
    ],

      ['em', 'Last updated · May 15, 2026 · Sources: WHO Events Calendar (Emergency scientific consultation on Andes virus medical countermeasures R&D, 15 May 2026, Geneva), WHO Disease Outbreak News DON601, ECDC Andes hantavirus daily update (15 May 2026), CDC HPS situation summary, NPR, Le Monde, Reuters, AP, Live Science.'],

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 15, 2026', readTime: '6 min read',
    title: 'Hantavirus Exposure Timeline: What Happens in Days 1, 7, 14 and 42 After Possible Rodent Contact',
    excerpt: 'The WHO 42-day active monitoring window for MV Hondius repatriates is not arbitrary — it is built around the actual biology of hantavirus exposure. Here is an evidence-based, day-by-day map of what happens after a real or suspected exposure, when to test, and when to seek care.',
    icon: '⏱️',
    body: [
      ['p', 'The biggest source of avoidable anxiety after a possible hantavirus exposure is the uncertainty of the incubation window. Andes virus and Sin Nombre virus, the two strains most relevant to readers of this site in 2026, share an unusually long and unusually variable incubation period — anywhere from one to eight weeks from exposure to first symptoms. That variance makes day-by-day planning harder than it is for shorter-incubation pathogens like influenza or COVID-19. This guide lays out, in evidence-based terms, what is actually happening in the body and what the clinical recommendations are at days 1, 7, 14, 28 and 42 after a potential exposure.'],
      ['h3', 'Day 1: The Window Where Nothing Visible Is Happening'],
      ['p', 'In the first 24 hours after a possible hantavirus exposure — for example, an unprotected entry into a rodent-infested cabin, or close prolonged contact with a confirmed Andes virus case — the virus, if it has entered the body, is establishing infection in dendritic and endothelial cells in the lung. There is no fever, no detectable viraemia by PCR, no measurable antibody response, and no diagnostic test that will return a meaningful result. The right action on Day 1 is documentation: record the date, location, duration and nature of the exposure; identify any other people who shared the exposure; and notify your local public-health authority if the exposure is significant enough to merit contact tracing.'],
      ['h3', 'Day 1 to Day 7: Public-Health Risk Assessment'],
      ['p', 'Through the first week, most exposed individuals remain asymptomatic. Public-health authorities classify exposures by severity — high (confirmed close prolonged contact with a case, or heavy environmental exposure during cleanup of a rodent-contaminated space) versus low (brief environmental contact in a low-prevalence area). High-risk contacts are placed in active monitoring with twice-daily symptom checks and a PCR test if any febrile illness develops. Low-risk contacts are typically placed in passive monitoring and asked to self-report any new respiratory illness.'],
      ['h3', 'Day 7: The First Meaningful Retest Window'],
      ['p', 'Day 7 is the first point at which testing becomes operationally useful in high-risk exposed cohorts. The Spanish Public Health Commission protocol for the MV Hondius cohort at Gómez Ulla hospital, for example, scheduled the first day-7 PCR retest precisely because that is the earliest point at which viraemia in symptomatic cases reliably exceeds the assay\'s detection threshold. For most exposed individuals, day 7 will pass without symptoms; that is reassuring but not definitive, because the incubation window for Andes virus extends well beyond it.'],
      ['h3', 'Day 14 to Day 28: The Statistical Peak of Symptom Onset'],
      ['p', 'The published Andes virus literature places the modal incubation around 14 to 28 days post-exposure. This is the highest-yield period for surveillance: a febrile illness with severe muscle aches in an exposed individual during this window should trigger immediate clinical evaluation, PCR testing, and respiratory monitoring. The clinically important early symptoms are not respiratory at first — fever, severe deep muscle aches (especially in the back and thighs), headache, and gastrointestinal upset are the prodrome. Shortness of breath typically arrives one to five days later, after which deterioration can be rapid.'],
      ['h3', 'Day 42: The WHO Active Monitoring Closure Window'],
      ['p', 'The WHO 42-day window is set at the high end of the published incubation distribution to ensure that almost all infections — about 99 percent in the curve fitted to historical Andes virus exposures — would have manifested by closure. After 42 days without symptoms, the residual probability of progressing to clinical hantavirus pulmonary syndrome is very small. Cohorts are typically discharged from active monitoring at this point, with a follow-up serology several weeks later to document any subclinical infection.'],
      ['h3', 'When to Seek Care Inside the Window'],
      ['p', 'During the entire 42-day window, the threshold for seeking emergency evaluation should be low. The single most important symptom to act on is unexplained shortness of breath or chest tightness in the presence of fever. Hantavirus pulmonary syndrome deteriorates rapidly enough that the difference between presenting at the emergency department with mild dyspnoea and presenting on the morning of cardiogenic shock can be six to twelve hours. If you are inside an active monitoring cohort, follow the protocol your public-health authority has given you; if you are not, but suspect exposure, tell triage staff specifically that you may have had hantavirus exposure and when. The diagnostic and clinical pathway differs from generic respiratory illness in important ways, and naming the suspicion changes the workup.'],
      ['h3', 'What This Guide Is Not'],
      ['p', 'This is a public information guide, not medical advice. If you have had a documented or suspected hantavirus exposure, your local public-health authority is the authoritative source on the surveillance plan that applies to you. If you live in a high-risk endemic area — rural Patagonia, the Four Corners region of the US Southwest, or rural areas of Scandinavia, Germany or East Asia — the right step is to read your country\'s hantavirus guidance before any potential exposure rather than after.'],
      ['em', 'Last updated · May 15, 2026 · Sources: CDC HPS clinical overview, WHO Hantavirus factsheet, ECDC Andes hantavirus rapid scientific advice, Spanish Public Health Commission protocol (Gómez Ulla cohort), peer-reviewed Andes virus literature from Argentina and Chile (Castillo C et al., Riquelme R et al.), WHO DON601 (13 May 2026).'],
    ],

  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 14, 2026', readTime: '7 min read',
    title: 'Day 2 of Monitoring: WHO Publishes DON601, Nebraska American Retests Negative, Geneva R&D Consultation Tomorrow',
    excerpt: 'On Day 2 of the formal 42-day monitoring window, the cluster holds at 11 cases and 3 deaths but two pieces of news matter: the World Health Organization\'s third Disease Outbreak News report (DON601) formally lays out the working transmission hypothesis, and the American who initially tested positive in Nebraska has retested negative on follow-up.',
    icon: '🧾',
    body: [
      ['p', 'Thursday May 14, 2026 is Day 2 of the 42-day active monitoring window for the roughly 122 passengers and crew repatriated from the MV Hondius. There were no new positive PCR results overnight in any of the receiving countries, and the headline numbers from yesterday hold: 11 cases (8 confirmed, 1 inconclusive, 2 probable) and 3 deaths (2 confirmed, 1 probable). The day was instead defined by three pieces of formal communication from the international response: a new WHO Disease Outbreak News report; a reclassification in Nebraska; and a follow-up video message from Director-General Tedros Adhanom Ghebreyesus.'],
      ['h3', 'WHO DON601: The Third Formal Disease Outbreak News Report'],
      ['p', 'The World Health Organization published DON601 on its Disease Outbreak News page, the third such report on the MV Hondius cluster after DON599 and DON600. The new report repeats the case count, formally documents that all laboratory-confirmed infections are Andes virus (ANDV), and for the first time states an explicit working hypothesis on the source of the cluster: case 1 most probably acquired the infection on land in Argentina prior to boarding, with subsequent transmission to a small number of very close shipboard contacts. The report stresses that the public health risk to the wider population remains low and that Andes virus does not spread through casual contact in workplaces, transit, or hospitality settings.'],
      ['h3', 'Nebraska: Dr. Kornfeld Retests Negative, Moves to the Quarantine Unit'],
      ['p', 'Inside the National Quarantine Unit at the University of Nebraska Medical Center, the lone American who arrived with a mildly positive PCR result on Monday — Dr. Stephen Kornfeld, an Omaha-area ophthalmologist who had been a passenger on the MV Hondius — has retested negative for hantavirus on a follow-up PCR. He has been transferred from the Nebraska Biocontainment Unit into the larger quarantine unit alongside the other 15 American passengers. Health officials describe the initial result as either a very early infection that has since cleared the assay\'s detection window, or as a low-level false positive; further serology over the coming weeks will help distinguish those possibilities. The two passengers at Emory University Hospital in Atlanta remain under evaluation.'],
      ['h3', 'Tedros: A Follow-up Message to Tenerife'],

  { cat: 'Science', catClass: 'cat-science', date: 'May 14, 2026', readTime: '8 min read',
    title: 'Why There Is Still No Andes Virus Vaccine — and What Tomorrow\'s Geneva R&D Consultation Could Change',
    excerpt: 'Three decades after the discovery of Sin Nombre virus and twenty years after the first reports of human-to-human Andes transmission in Argentina, there is still no licensed hantavirus vaccine for use in the Americas or Europe. The WHO emergency scientific consultation in Geneva on Friday is the most concrete signal yet that the post-cluster R&D agenda is finally being formalised.',
    icon: '💉',
    body: [
      ['p', 'On Friday May 15, 2026, the World Health Organization will convene what its own events page calls an emergency scientific consultation on Andes virus medical countermeasures research and development. The Geneva consultation is the cleanest external sign yet that the international response to the MV Hondius cluster is moving from acute crisis management to a longer-term scientific agenda. Three decades after Sin Nombre virus emerged in the Four Corners region of the United States and twenty years after Argentine investigators first described human-to-human transmission of Andes virus during the El Bolsón outbreak, there is still no licensed hantavirus vaccine, no licensed antiviral, and no rapid point-of-care diagnostic widely available in receiving countries. The MV Hondius cluster has put each of those gaps on the table at once.'],
      ['h3', 'The Vaccine Pipeline, Such As It Is'],
      ['p', 'There is a Korean inactivated whole-virus vaccine (Hantavax) licensed in South Korea against the Hantaan and Seoul strains that cause haemorrhagic fever with renal syndrome (HFRS) in Asia. Hantavax is not approved in Europe or the Americas and is not effective against Andes virus. In the United States, the Army\'s Medical Research Institute of Infectious Diseases has worked since the 1990s on a DNA-based vaccine against several hantavirus species, including Andes; it has completed early-phase clinical trials but has not entered a pivotal efficacy trial. A handful of academic candidates — virus-like particle approaches, recombinant glycoprotein subunits — exist in preclinical or early-phase form. None has a near-term path to licensure.'],
      ['h3', 'The Trial Design Problem'],
      ['p', 'The single biggest obstacle is not science but statistics. Andes virus causes roughly one hundred to two hundred cases per year in southern Argentina and Chile combined, distributed unpredictably across rural communities. Even a vaccine with very strong protective signal in animal models would require an enormous, multi-year, multi-site phase III trial to demonstrate efficacy with conventional methods. The expert consensus heading into Geneva is that any pivotal trial will need to lean on a combination of correlate-of-protection arguments, controlled human infection models for similar pathogens, and animal challenge data rather than a classical efficacy endpoint.'],
      ['h3', 'Antivirals: A Smaller, More Tractable Question'],
      ['p', 'No antiviral has been shown effective for hantavirus pulmonary syndrome in randomised controlled trials. Ribavirin reduces HFRS mortality if started early but has not shown the same benefit in the New World pulmonary syndrome. Favipiravir has shown some activity in cell culture and animal models. Monoclonal antibodies, the most promising near-term direction, are in early development at several academic centres in the United States and Argentina. The Geneva agenda specifically lists the absence of a licensed antiviral as a priority gap and is expected to discuss expedited pathways for the most advanced monoclonal candidates.'],
      ['h3', 'Diagnostics: The Bottleneck Most Visible in the MV Hondius Response'],
      ['p', 'The third leg of the consultation is diagnostics. The MV Hondius cluster has been investigated almost entirely by PCR at reference laboratories in South Africa, Geneva, Madrid, Paris, and Atlanta. There is no widely deployed rapid point-of-care test for hantavirus in the Americas or Europe, which means every suspected case has had to wait hours to days for a centralised result while clinicians made escalation decisions on clinical grounds alone. Rapid antigen and lateral-flow developers exist; the consultation is expected to discuss what regulatory and procurement levers would accelerate at least one such test through approval.'],
      ['h3', 'Why Now, and Why Geneva'],
      ['p', 'The unfair answer is that hantavirus has been chronically underfunded because its case counts have been chronically low. The fair answer is that the MV Hondius cluster has exposed an operational fragility in receiving-country health systems that does not depend on case counts: when a long-incubation pathogen with a 35 percent fatality rate arrives in twenty national health systems simultaneously, even a handful of cases stress-test diagnostic, clinical and quarantine infrastructure. The Geneva consultation will not produce a vaccine on Friday afternoon, but it is the first time in three decades that the relevant clinical, regulatory and funding actors will sit at one table specifically to discuss the gap.'],
      ['h3', 'What the Outcome Could Reasonably Look Like'],
      ['p', 'The realistic deliverable from a one-day consultation is a target product profile and an indicative roadmap: agreed minimum performance characteristics for a hantavirus rapid diagnostic, agreed correlates-of-protection criteria for a vaccine, and a published list of candidate antivirals that warrant accelerated trials. None of those is the same as a deployable product. But each is the precondition for the public and private funding that would follow, and the absence of that precondition is precisely why the pipeline has remained where it has for so long.'],
      ['em', 'Last updated · May 14, 2026 · Sources: WHO events calendar (Emergency scientific consultation on Andes virus medical countermeasures R&D, 15 May 2026, Geneva), Nature ("There is no vaccine for deadly hantavirus", 13 May 2026), CDC HPS clinical overview, peer-reviewed Andes virus literature including USAMRIID DNA vaccine trials, ELSO registry data, ECDC Rapid Scientific Advice.'],
    ],

    body: [
      ['p', 'On Wednesday May 13, 2026 — exactly 42 days after the MV Hondius left Ushuaia — the international response moved into its sustained monitoring phase. The European Centre for Disease Prevention and Control and the World Health Organization continue to list the cluster at 11 cases (9 PCR-confirmed Andes virus, 2 probable) and 3 confirmed deaths, with no new cases reported in the past 24 hours. The day was dominated instead by two clinical developments: the French passenger evacuated to Paris is now critically ill on an artificial lung, and the Illinois Department of Public Health opened a separate investigation into a suspected hantavirus case in Winnebago County that has no connection to the cruise ship.'],
      ['h3', 'Paris: A Severe Form of Andes HPS Now on ECMO'],
      ['p', 'Dr Xavier Lescure, infectious disease specialist at Bichat-Claude Bernard Hospital in Paris, told reporters that the French woman repatriated from Tenerife on Sunday is now critically ill with a severe form of Andes hantavirus pulmonary syndrome, with life-threatening involvement of the lungs and the heart. She has been placed on extracorporeal membrane oxygenation — a circuit that pumps blood out of the body through a membrane oxygenator and returns it warm and oxygen-rich, taking pressure off the failing lungs and heart in the hope that they recover. ECMO is the bridge of last resort in hantavirus pulmonary syndrome, where pulmonary capillaries leak so badly that conventional ventilation cannot keep arterial oxygen high enough to sustain organs. The French case is consistent with the published Andes virus trajectory, which runs through five-to-ten days of flu-like prodrome before rapid cardiopulmonary deterioration over the course of hours.'],

  { cat: 'Science', catClass: 'cat-science', date: 'May 13, 2026', readTime: '6 min read',
    title: 'ECMO and Hantavirus: What an Artificial Lung Actually Does in Severe Andes HPS',
    excerpt: 'The French MV Hondius passenger\'s placement on ECMO this week makes the artificial lung the most discussed therapy of the outbreak. Here is what extracorporeal membrane oxygenation is, why it is the bridge of last resort for hantavirus pulmonary syndrome, and what the published survival data say.',
    icon: '🔬',
    body: [
      ['p', 'When Dr Xavier Lescure described the French MV Hondius passenger in Paris as critically ill on an artificial lung on Wednesday, he was using the everyday term for extracorporeal membrane oxygenation, or ECMO. It is a piece of equipment most people first encountered during the COVID-19 pandemic, but ECMO has been a salvage therapy in hantavirus pulmonary syndrome (HPS) for two decades, and several of the best survival numbers in the medical literature for severe Andes virus pulmonary syndrome come from ECMO-equipped centres in Argentina and Chile. The decision to place a patient on ECMO is therefore neither routine nor a sign that the case is hopeless — it is a calculated bet that the lungs and heart can recover if given a week or two of mechanical rest.'],
      ['h3', 'What ECMO Is Actually Doing'],
      ['p', 'In an ECMO circuit, the patient\'s blood is drawn out through a large-bore venous catheter, pumped through a membrane oxygenator that adds oxygen and removes carbon dioxide, warmed, and then returned to the body. In veno-venous ECMO the blood goes back into the venous system and the patient\'s own heart continues to pump. In veno-arterial ECMO the blood is returned into the arterial system, bypassing the heart entirely. Severe hantavirus HPS frequently requires the veno-arterial mode because the capillary leak in the lungs is matched by myocardial depression and shock, so the heart cannot maintain output even when oxygenation is restored. The circuit is essentially a temporary lung and, in VA mode, a temporary heart.'],
      ['h3', 'Why Hantavirus Is Such a Good ECMO Indication'],
      ['p', 'HPS is unusual among severe respiratory illnesses in that the underlying pathology is short-lived. The pulmonary capillary leak that fills the lungs with fluid lasts roughly four to seven days. If the patient can be supported through that window — oxygenated, perfused, and kept off ventilator pressures high enough to cause further injury — the lungs typically clear and the heart recovers. Antibiotics, antivirals and steroids play almost no role; the entire treatment philosophy is mechanical support until the immune response clears the virus and the endothelium heals. That makes ECMO an unusually well-matched therapy: short course, well-defined end-point, high probability of recovery if survived.'],
      ['h3', 'What the Survival Data Show'],
      ['p', 'The largest published series of ECMO for hantavirus pulmonary syndrome come from the Andes virus regions of southern Argentina and Chile. In the most-cited Chilean cohort, survival on ECMO for severe HPS approached 60 percent, compared to a roughly 35 to 50 percent fatality rate for HPS overall. Smaller US series of Sin Nombre virus HPS report similar numbers when ECMO is started early. The strongest predictor of survival is time-to-cannulation: patients placed on ECMO within the first 24 hours of cardiopulmonary deterioration do markedly better than those put on the circuit after several days of escalating ventilator pressures. Bichat Hospital is one of a small number of French centres with the immediate ECMO capacity required to make that timing.'],
      ['h3', 'The Risks and the Trade-offs'],
      ['p', 'ECMO is not a benign intervention. The systemic anticoagulation required to keep the circuit from clotting puts patients at risk of haemorrhage, including intracranial haemorrhage. Cannulation complications, limb ischaemia, ventilator-associated pneumonia, and HIT (heparin-induced thrombocytopenia) are all well-documented. In any specific patient, the survival benefit of ECMO over maximum-pressure conventional ventilation depends on age, comorbid disease, time-to-cannulation, and the experience of the centre. None of this rules out a good outcome for the Paris patient; it simply explains why specialist infectious-disease physicians describe the next several days as the critical window.'],
      ['h3', 'What This Says About the Outbreak Response'],
      ['p', 'The willingness of receiving countries to triage MV Hondius passengers into ECMO-capable centres — the National Quarantine Unit in Omaha, Bichat in Paris, Gómez Ulla in Madrid, Emory in Atlanta, university hospitals in the Netherlands — was a deliberate part of the WHO and ECDC pre-disembarkation planning. The published Andes virus literature said clearly what would be needed if any of the asymptomatic passengers converted clinically: rapid recognition, rapid escalation, and rapid access to extracorporeal life support. Whatever the eventual outcome for the French patient, the system itself has so far performed exactly as it was designed to.'],
      ['em', 'Last updated · May 13, 2026 · Sources: ELSO (Extracorporeal Life Support Organization) registry, peer-reviewed Andes hantavirus literature from Argentina and Chile (Castillo C et al., 2011; Riquelme R et al., 2018), CDC HPS clinical overview, WHO Disease Outbreak News, NPR, Washington Post, AP reporting on the Paris case.'],
    ],
  },

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 12, 2026', readTime: '6 min read',
    title: 'N95 vs Dust Mask: Why the Difference Matters for Hantavirus Cleanups',
    excerpt: 'A standard dust mask will not stop hantavirus particles. Here is the practical, evidence-based difference between an N95 respirator and a dust mask, and how to make sure the protection you are buying actually works during rodent cleanup.',
    icon: '😷',
    body: [
      ['p', 'Every spring and summer, North American emergency departments see a small but predictable trickle of patients who developed hantavirus pulmonary syndrome after cleaning a cabin, garage, or storage shed. In most of those cases, the patient was wearing a mask of some kind — usually a cheap dust mask from a hardware store — and assumed they were protected. They were not. Hantavirus is one of the clearer real-world cases where the type of mask matters enormously, and where the difference between an N95 respirator and a single-strap dust mask can be the difference between a safe cleanup and a hospital admission.'],
      ['h3', 'What Hantavirus Cleanup Actually Exposes You To'],
      ['p', 'The mechanism of hantavirus exposure during cleanup is aerosolisation. When dried rodent urine, droppings, or saliva are disturbed by sweeping, vacuuming, or stirring up dust, microscopic virus-laden particles become airborne. These particles can hang in the air for many minutes and are easily inhaled deep into the lung. From there it only takes a small inoculum to seed an infection. The CDC has documented hantavirus pulmonary syndrome cases following exposures as brief as a few minutes in heavily contaminated spaces.'],
      ['h3', 'Why a Dust Mask Does Not Work'],
      ['p', 'A loose-fitting single-strap nuisance dust mask is designed to keep coarse particles — sawdust, drywall dust, lint — out of your nose. It does this with a relatively open filter media and, crucially, without forming a seal against the face. Air takes the path of least resistance, which means most of the air you inhale through a dust mask passes around the edges rather than through the filter. Even when the filter media itself is good, the seal failure makes it inadequate for biological aerosols. Surgical masks, while better than dust masks for some droplet-borne hazards, are also not designed for airborne aerosol filtration and similarly lack a seal.'],
      ['h3', 'What an N95 Actually Does'],
      ['p', 'An N95 respirator is engineered around two requirements: a filter media that captures at least 95% of 0.3-micron particles, and a fit that forms a seal against the face. Both matter. Dual head straps, an adjustable nose bridge, and a contoured cup design exist so that the air you breathe is forced through the filter, not around it. The CDC and OSHA recommend N95 or higher (P100, half-face elastomeric, or PAPR) for any hantavirus cleanup activity in a confirmed or suspected rodent-infested space.'],
      ['h3', 'Fit Testing and the User Seal Check'],
      ['p', 'A respirator is only as good as its fit. Before each use the CDC recommends a quick user seal check: inhale sharply with both hands cupped over the mask. The mask should pull in slightly against your face and you should feel no leak around the edges. Exhale gently with hands cupped over the mask — there should be no air whistling out around the nose bridge. Facial hair under the seal will break the fit; men cleaning rodent-affected spaces should shave the seal area or use a powered air-purifying respirator instead.'],
      ['h3', 'Pairing the Respirator With the Rest of the Protocol'],
      ['p', 'Even a perfectly fitted N95 is only one part of the CDC hantavirus cleanup protocol. The protocol begins with ventilation — opening doors and windows for at least 30 minutes before entry, ideally with the cleaner outside the space. Then wet-disinfection: spraying suspected contaminated areas with a 1:10 bleach solution or EPA-registered disinfectant and letting it sit for five minutes before any wiping or disposal. Only then is it safe to begin cleanup, with the cleaner wearing N95, nitrile gloves, eye protection, and ideally disposable coveralls. Waste goes into a double bag — kitchen bag inside contractor bag — and the outside of the inner bag is wiped down with disinfectant before being sealed inside the outer bag.'],
      ['h3', 'A Note on KN95s and Counterfeits'],
      ['p', 'The KN95 — the Chinese GB2626 standard — has a similar filtration performance to N95 but is not enforced by NIOSH and the marketplace is notoriously crowded with counterfeits. For hantavirus cleanup, the safer choice is a NIOSH-approved N95 from a reputable supplier, with the NIOSH approval label visible inside the mask. If you only have KN95s on hand, verify the manufacturer is on the CDC’s appendix list of acceptable international respirators, and treat any unverifiable batch as suspect.'],
      ['em', 'Last updated · May 12, 2026 · Sources: CDC Hantavirus Cleanup and Disinfection Guidance, NIOSH respirator user guide, OSHA respiratory protection standard 29 CFR 1910.134, WHO Hantavirus factsheet.'],
    ],
  },
