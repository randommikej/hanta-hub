  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 17, 2026', readTime: '6 min read',
    title: 'Ebola PPE: What WHO and MSF Actually Use Inside an Ebola Treatment Centre',
    excerpt: 'Ebola personal protective equipment is one of the most heavily-engineered PPE regimens in modern medicine. Here is a plain-language walk-through of the WHO/MSF Ebola treatment centre standard PPE, what each layer is for, and why donning and doffing protocols are more dangerous than the wards themselves.',
    icon: '🥽',
    body: [
      ['p', 'Ebola treatment centre PPE is unlike almost any other clinical PPE regimen in modern medicine. It is built around the assumption that the patient is shedding a high-titre, lethal, contact-transmissible virus in every body fluid; that the wards are hot, with limited air conditioning; and that the most dangerous moment for the wearer is not in the ward itself but at the doffing station at the exit, when a single contaminated glove tip touched to a face can cause infection. This piece is a plain-language walk-through of the standard WHO/Médecins Sans Frontières (MSF) Ebola treatment centre PPE set, layer by layer.'],
      ['h3', 'The Standard PPE Layers'],
      ['p', 'A standard WHO-recommended Ebola treatment centre PPE set comprises, from inside out: a disposable cotton scrub set (worn next to the skin); a Tyvek or equivalent fluid-resistant coverall with an integrated hood; a fluid-resistant disposable surgical or medical gown over the coverall; an FFP2 or N95 respirator with a face shield, or alternatively a full-face PAPR (powered air-purifying respirator); goggles worn under the face shield where a non-PAPR setup is used; two pairs of nitrile gloves with the outer pair taped to the gown cuffs; a fluid-resistant apron over the gown for splash protection; and knee-high rubber boots over the coverall trouser legs.'],

      ['h3', 'Donning: The Buddy System'],
      ['p', 'Donning PPE — putting it on before entering the high-risk zone — is done by every healthcare worker in front of a trained buddy who works through a written checklist. The order is fixed: hand hygiene, scrubs, boots, coverall, hood, mask, goggles, face shield, inner gloves, gown, outer gloves taped to gown, apron. Each step is verified by the buddy before the next is started. A typical donning sequence takes 10 to 15 minutes.'],

  { cat: 'Tips', catClass: 'cat-tips', date: 'May 17, 2026', readTime: '5 min read',
    title: 'How to Read an Ebola Outbreak Dashboard Without Panicking',
    excerpt: 'Ebola outbreak dashboards combine confirmed cases, suspected cases, probable cases, deaths, and incomplete real-time reporting in a way that is easy to misread. Here is a plain-language guide to what each number means, why they update at different speeds, and what to look for to assess whether an outbreak is being controlled.',
    icon: '📊',
    body: [
      ['p', 'In the first 72 hours after a WHO PHEIC declaration, the single most common source of public anxiety is the outbreak dashboard. Numbers move quickly, definitions shift, and the gap between "suspected" and "confirmed" cases can be enormous. This is a plain-language guide to reading an Ebola outbreak dashboard without misreading it.'],
      ['h3', 'Confirmed vs Suspected vs Probable'],
      ['p', 'WHO and Africa CDC report Ebola cases in three categories. A confirmed case is one with a positive PCR result for the specific Ebola species in a recognised reference laboratory. A probable case is one with a clinical picture and exposure history consistent with Ebola, including a death or severe illness, but no laboratory confirmation — typically because the patient died before a sample could be taken or because the sample was lost or inadequate. A suspected case is a person meeting a working case definition (typically: fever plus a defined symptom set plus an epidemiological link) but with no laboratory result yet. Suspected cases are the most volatile number on the dashboard; they include real Ebola, real non-Ebola febrile illnesses (malaria, typhoid, viral hemorrhagic fevers from other species), and incomplete information.'],
      ['h3', 'Why the Confirmation Rate Matters'],
      ['p', 'The ratio of confirmed to suspected cases is the single most informative summary statistic in the first ten days of an outbreak. Early on, the confirmation rate is low because laboratory throughput cannot keep up with the suspected-case pipeline, and because field staff err on the side of casting a wide net to find every possible case. As laboratory capacity scales up, the confirmation rate usually moves toward a stable value — perhaps 20% to 40% of suspected cases — that reflects the true positive predictive value of the case definition.'],
      ['h3', 'Why Deaths Update Faster Than Cases'],
      ['p', 'In many remote African outbreaks the death count moves ahead of the confirmed case count. The reasons are operational: clinical deaths can be recorded by community health workers in the field without a laboratory test, while case confirmations require sample collection, transport to a reference laboratory, and a successful PCR run. As laboratory capacity scales up, the case count usually catches up to and overtakes the death count. A widening gap between deaths and confirmed cases is usually a sign of laboratory bottlenecks, not of unusually high lethality.'],
      ['h3', 'Doubling Time and Reproductive Number'],
      ['p', 'Two quantitative measures of outbreak control are doubling time (the number of days for the cumulative case count to double) and the effective reproductive number Re (the average number of new infections per existing infection). The Ebola pre-intervention basic reproductive number R0 is generally in the range 1.5 to 2.5, with Re falling below 1 when an outbreak is being controlled. Africa CDC and WHO publish Re estimates for major outbreaks; a sustained Re below 1 is the most reliable signal that the case curve will turn over.'],
      ['h3', 'Geographic and Demographic Distribution'],
      ['p', 'A good Ebola dashboard breaks down cases by health zone, by epidemiological link to known clusters, and by demographic category — particularly healthcare worker, household contact, funeral attendee. The geographic shape of the outbreak is more informative than the headline case count: an outbreak that is staying inside the initial cluster of health zones is qualitatively different from one that is jumping to new health zones. The 2026 DRC cluster\'s jump to Uganda is meaningful for that reason; the jump from Ituri to Kinshasa is meaningful for the same reason.'],
      ['h3', 'What to Ignore'],
      ['p', 'A good rule of thumb is to ignore daily fluctuations smaller than 10% and to weight weekly trends instead. A single day of high case counts is almost never an inflection point; a sustained week-over-week reduction in suspected cases and confirmed cases together is. Headlines that highlight a single confirmed case in a new country (a single imported case) without a chain of secondary cases should be read for what they are — a successful surveillance system, not a failure of control.'],

function CaseCurve() {

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    const ctx = canvasRef.current.getContext('2d');
    const chart = new window.Chart(ctx, {
      type: 'line',
      data: {
        labels: CASE_CURVE_DATA.map(d => d.date),
        datasets: [
          { label: 'Suspected', data: CASE_CURVE_DATA.map(d => d.suspected), borderColor: '#ea580c', backgroundColor: 'rgba(234,88,12,0.08)', tension: 0.25, fill: true, borderWidth: 2.5, pointRadius: 3 },
          { label: 'Confirmed (PCR)', data: CASE_CURVE_DATA.map(d => d.confirmed), borderColor: '#b91c1c', backgroundColor: 'rgba(185,28,28,0.08)', tension: 0.25, fill: false, borderWidth: 2.5, pointRadius: 3 },

        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { family: 'DM Sans', size: 12 } } } },
        scales: {
          y: { beginAtZero: true, grid: { color: '#e2e8f0' }, ticks: { font: { family: 'DM Sans' } } },
          x: { grid: { display: false }, ticks: { font: { family: 'DM Sans' } } },
        },
      },

  );

function FAQSection() {
  return (
    <section id="faq">
      <h2>Frequently Asked Questions</h2>
      <p className="section-sub">Plain-language answers to the most common questions about the 2026 DRC Ebola outbreak. Updated regularly.</p>
      <div className="faq">
        <details>
          <summary>What is the Bundibugyo strain?</summary>
          <p>Bundibugyo virus (BDBV) is one of six species in the genus Ebolavirus. It has caused only two prior recognised outbreaks — Uganda 2007 (~25% CFR) and DRC 2012 (~36% CFR). The 2026 DRC cluster is the third. The licensed Ebola vaccines (Merck Ervebo, J&J two-dose regimen) and licensed monoclonal antibody therapies (Inmazeb, Ebanga) are Zaire-ebolavirus specific and do not have demonstrated clinical efficacy against Bundibugyo virus.</p>
        </details>
        <details>
          <summary>Is there a vaccine or treatment for Bundibugyo?</summary>
          <p>No licensed vaccine and no licensed specific antiviral exists for the Bundibugyo strain. Treatment is supportive: fluid resuscitation, electrolyte management, vasopressors, oxygen, and renal replacement therapy where needed. Candidate cross-protective countermeasures (rVSV-ZEBOV off-label, MBP-134, VesiculoVax) are under discussion for compassionate-use or accelerated field evaluation.</p>
        </details>
        <details>
          <summary>How is Ebola transmitted?</summary>
          <p>Direct contact with the body fluids (blood, vomit, diarrhea, saliva, semen, breast milk, urine) of an infected person, or with surfaces or objects contaminated by those fluids. Ebola is not airborne. The highest-risk settings are healthcare facilities without infection-prevention infrastructure, household care for the seriously ill, and traditional funerals involving touching the deceased. Sexual transmission via persistence of viral RNA in semen has been documented for Zaire ebolavirus over many months and is less well-characterised for Bundibugyo.</p>
        </details>
        <details>
          <summary>What does a WHO PHEIC mean?</summary>
          <p>A Public Health Emergency of International Concern is the WHO\'s highest-level alert mechanism under the International Health Regulations (2005). It triggers obligations on member states to coordinate, share data and provide support, and it justifies an enhanced WHO response posture. A PHEIC does not, in itself, restrict travel — the May 17 declaration did not impose flight bans or border closures.</p>
        </details>
        <details>
          <summary>Should I cancel travel to East Africa?</summary>
          <p>WHO has not recommended travel restrictions. For the overwhelming majority of leisure and business travellers to East Africa, the practical Ebola risk in 2026 is functionally zero. Travellers should avoid hospitals and clinics in affected regions unless they require care; avoid traditional funerals involving touching the deceased; monitor temperature daily for 21 days after return; and contact local public-health authorities (not a clinic directly) if they develop fever or compatible symptoms within that window.</p>
        </details>
        <details>
          <summary>What is the case fatality rate of Bundibugyo?</summary>
          <p>Historical case fatality rate for Bundibugyo virus disease is roughly 25–40%, based on the 2007 Uganda and 2012 DRC outbreaks. This is meaningfully lower than the typical 40–90% CFR of Zaire ebolavirus but still very high in absolute terms. The 2026 DRC outbreak CFR will not be reliably estimable until the suspected-to-confirmed conversion is complete.</p>
        </details>
        <details>
          <summary>What is the difference between Ebola and hantavirus?</summary>
          <p>Both are viral hemorrhagic diseases with high case fatality, but they are biologically and epidemiologically distinct. Ebola (filoviridae) spreads via direct contact with body fluids and has a 2–21 day incubation. Hantaviruses (bunyavirales) primarily spread from rodents to humans via aerosolised excreta, with a 1–8 week incubation; only Andes virus (one specific New World hantavirus) has documented limited human-to-human transmission. See our <a href="/">hantavirus tracker</a> for the parallel 2026 MV Hondius cluster.</p>
        </details>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
