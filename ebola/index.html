  { cat: 'Science', catClass: 'cat-science', date: 'May 26, 2026', readTime: '7 min read',
    title: 'Bundibugyo Virus Genomic Sequencing at INRB Kinshasa: What the Published Genome Will Tell Us About the Mongbwalu Origin Hypothesis, Outbreak Doubling Time, and the Comparison With 2007 Uganda and 2012 DRC',
    excerpt: 'Genomic sequencing at INRB Kinshasa is the operational tool that will resolve the most consequential open questions about the 2026 DRC Bundibugyo outbreak. This piece walks through what the published sequence will tell us about the Mongbwalu high-traffic gold-mining region origin hypothesis, the outbreak doubling time, and how the 2026 DRC strain compares with the 2007 Uganda outbreak (the original Bundibugyo identification) and the 2012 DRC outbreak.',
    icon: '🧬',
    body: [
      ['p', 'The single most important scientific instrument in the 2026 DRC Bundibugyo outbreak response is not a vaccine candidate, an antibody, or an antiviral. It is the Illumina sequencer at the Institut National de Recherche Biomédicale (INRB) in Kinshasa, where every PCR-positive sample is being sequenced as throughput allows. The genomic data is what will resolve the most consequential open questions about the outbreak: where it came from, how fast it is growing, and how it compares with the two previous Bundibugyo outbreaks.'],
      ['h3', 'The Mongbwalu Origin Hypothesis'],
      ['p', 'The provisional working hypothesis from the DRC Ministry of Public Health, Hygiene and Social Welfare, the WHO and Africa CDC is that the index case acquired Bundibugyo virus through environmental or animal exposure in or near Mongbwalu, a high-traffic gold-mining region of Ituri Province. The Mongbwalu hypothesis is supported by the early case geography (the first cluster of health-worker deaths was in Mongbwalu) and the human ecology of the area (intensive forest-edge activity, bushmeat consumption, dense miner-to-village contact). Genomic sequencing is the operational tool that will test the hypothesis by comparing the published Bundibugyo sequence against any environmental or bat-host reservoir sequences from Ituri that come out of the response.'],
      ['h3', 'Doubling Time and Re Estimates'],
      ['p', 'The second open question that the genomic data — combined with the daily case-count reporting — will help resolve is the outbreak doubling time and the effective reproduction number Re. Initial Imperial College London estimates put the doubling time in the 5-to-9-day range for the first three weeks of identified spread, with Re estimates in the 1.4-to-1.8 range. Both estimates carry wide confidence intervals because suspected-case ascertainment is uneven across health zones. Sequence-based reconstruction of transmission chains is the gold standard for refining those estimates, and the first formal phylogenetic analysis from INRB is expected within the next ten days.'],
      ['h3', 'Comparison With 2007 Uganda and 2012 DRC'],
      ['p', 'Bundibugyo virus has caused two previous confirmed outbreaks: the 2007 outbreak in Bundibugyo District, Uganda (the original identification of the virus species, 56 confirmed cases, 24 deaths, ~25% case fatality rate among confirmed cases) and the 2012 Orientale Province, DRC outbreak (57 cases, 29 deaths, ~36% CFR). The 2026 DRC outbreak is the third documented Bundibugyo outbreak, and at 108 PCR-confirmed across DRC and Uganda combined on Day 9 of the PHEIC, it is already approaching the 2007 outbreak in scale. Whether the case fatality rate among confirmed cases ultimately falls inside the 25-to-36% historical range, above it, or below it will depend on how early in the disease course the confirmed cases get to care.'],
      ['h3', 'The Vaccine Gap'],

    icon: '🌍',
    body: [
      ['p', 'The Africa Centres for Disease Control and Prevention has formally named ten African countries at heightened risk of importation from the 2026 DRC + Uganda Bundibugyo Ebola cluster and called for member-state contingency planning. The named-country list — Angola, Burundi, Central African Republic, Republic of the Congo, Ethiopia, Kenya, Rwanda, South Sudan, Tanzania and Zambia — is the first time Africa CDC has put a concrete regional number on the at-risk neighbour set since the WHO PHEIC declaration on 17 May, and it tightens the operational response geometry for the next 30 days.'],

      ['p', 'Designation on the Africa CDC at-risk list is an operational signal — it triggers a defined set of contingency-planning actions at the member-state level. Those actions typically include: activation or reinforcement of port-of-entry screening protocols on arrivals from DRC and Uganda; reinforcement of regional laboratory partner notification chains; activation of contact-tracing protocols at the country level; pre-positioning of isolation-unit capacity at major referral hospitals; and a tightening of the regional information-sharing tempo between Africa CDC and the national public-health institutions in each named country. The list does not equate to a travel advisory in the consumer-facing sense; Africa CDC has not recommended general travel restrictions to or from any of the named countries.'],
      ['h3', 'What It Means for Travellers'],
      ['p', 'For travellers planning movement into, through, or between the named countries, the practical implications are operational rather than restrictive. Travellers should expect enhanced entry screening on arrivals from DRC and Uganda at major international airports across the named-country set; this is the regional analogue of the CDC + DHS enhanced US entry screening implemented at 5 US international airports on 18 May. Travellers with recent travel history to the affected DRC provinces — Ituri, North Kivu, South Kivu and Kinshasa — should expect more detailed health-history questions on arrival at any named-country airport, and possible referral to a health authority follow-up if any prodromal symptoms are reported within the 21-day Bundibugyo incubation window.'],
      ['h3', 'Why the Next 30 Days Matter'],
      ['p', 'The 30-day window after a PHEIC declaration is operationally the most informative period for assessing regional spread risk. Bundibugyo virus has a published incubation period of 2 to 21 days, which means any imported case from the affected DRC provinces would, in the worst case, present at port of entry within three weeks of crossing the border. The Africa CDC at-risk list now defines the geographic envelope inside which the early surveillance signal is most likely to fire. Day 8 of the PHEIC (today) starts the operational clock for that surveillance envelope; the next month is the first decisive test of whether the regional response geometry holds.'],
      ['h3', 'What to Watch for in the Named Countries'],
      ['p', 'Three things will define how each named country reads on the regional watch list over the next 30 days. First, whether any of the ten countries reports a first imported case from the DRC + Uganda cluster — that single data point would mark the first time the outbreak has crossed beyond DRC and Uganda and would change the regional response geometry materially. Second, whether the named-country airports activate enhanced entry screening visibly enough that travellers can predict the operational tempo before they fly. Third, whether the Africa CDC information-sharing tempo escalates from the current weekly update to a higher frequency, which would itself be an operational signal of how the situation is reading at the regional public-health-institution level.'],
      ['h3', 'The Honest Read'],
      ['p', 'The Africa CDC named-country list is not a panic signal — it is a planning signal. The ten countries on the list are the operational watch envelope inside which the next 30 days will play out. Travellers should expect more screening at port of entry, not less, and should plan for that operational reality without changing their travel plans absent a more specific national or WHO advisory. The single highest-yield action available to a traveller into the named-country set remains the same: know the prodromal Bundibugyo symptoms, present urgently if they appear, name the exposure history at triage, and accept rapid escalation to an isolation unit at the first sign of fever with hemorrhagic features after recent travel into the affected DRC provinces.'],
      ['em', 'Last updated · May 25, 2026 · Sources: Africa CDC press statements (24-25 May 2026), Yahoo News live updates citing Africa CDC, WHO Disease Outbreak News DON603, ECDC outbreak update (21 May 2026), WHO Director-General opening remarks at the media briefing on outbreaks of Ebola and hantavirus (22 May 2026), CDC Ebola situation summary, NPR, CBS News, Al Jazeera.'],
    ],
  },
  { cat: 'Science', catClass: 'cat-science', date: 'May 25, 2026', readTime: '8 min read',
    title: 'Bundibugyo vs Zaire Ebolavirus: Why the 2026 DRC Strain Behaves Differently and What That Means for the Vaccine, Antibody and Antiviral Pipeline',
    excerpt: 'The 2026 DRC Bundibugyo Ebola outbreak is the first sustained-attention Bundibugyo cluster since the 2012 DRC outbreak — and the first ever to reach a PHEIC declaration. Bundibugyo virus is one of four orthoebolavirus species known to cause Ebola disease in humans, and it behaves meaningfully differently from the more familiar Zaire ebolavirus. Here is what the published evidence shows about the case fatality rate, the transmission dynamics, and why the Ervebo vaccine and Inmazeb/Ebanga monoclonal antibodies are not expected to work against the Bundibugyo strain.',
    icon: '🧬',
    body: [
      ['p', 'The 2026 DRC + Uganda Bundibugyo Ebola outbreak — now at Day 8 of the WHO PHEIC, 106 cumulative PCR-confirmed cases and 220 cumulative deaths — has put the Bundibugyo strain of orthoebolavirus into wider public attention than at any point since the 2007 Uganda or 2012 DRC outbreaks. Bundibugyo virus is one of four orthoebolavirus species known to cause Ebola disease in humans, and it behaves meaningfully differently from the more familiar Zaire ebolavirus that drove the 2014-16 West Africa epidemic and the more recent DRC Ebola outbreaks. The biological differences carry direct operational consequences for the response, the vaccine pipeline, and the monoclonal-antibody therapeutic options.'],
      ['h3', 'The Four Orthoebolavirus Species That Cause Disease in Humans'],
      ['p', 'Four orthoebolavirus species are known to cause Ebola disease in humans: Zaire (the most-studied and most-lethal, with case-fatality rates up to ninety percent in untreated outbreaks); Sudan (case-fatality rates 40-65 percent); Bundibugyo (the focus of the 2026 outbreak, with historical case-fatality rates of roughly 25-40 percent); and Tai Forest (a single non-fatal human case to date). A fifth species — Reston — circulates in primates and pigs in Asia but has never caused human disease. The species are distinguished by their genome sequences and by the surface glycoprotein that drives cell entry; the structural differences in that glycoprotein are the reason vaccines and monoclonal antibodies developed against one species are not necessarily protective against another.'],
      ['h3', 'Why Bundibugyo Has a Lower CFR Than Zaire'],
      ['p', 'The historical case-fatality rate of Bundibugyo virus, at roughly 25-40 percent depending on outbreak setting, is meaningfully lower than the Zaire ebolavirus CFR of up to 90 percent in untreated outbreaks. The published evidence suggests the difference is biological rather than purely a function of care quality. Bundibugyo virus has a slightly less efficient cell-entry glycoprotein, somewhat lower peak viraemia in published primate models, and a slightly slower progression through the prodromal-to-haemorrhagic phase trajectory. The 2026 DRC cluster CFR sitting at roughly 10 percent for PCR-confirmed cases reflects both the biology and the early-phase rapid clinical response — but the suspected-deaths line at 220 cumulative is the more sobering operational number, reflecting deaths in communities where PCR testing has not yet caught up with the outbreak tempo.'],
      ['h3', 'Why Ervebo Is Not Expected to Work Against Bundibugyo'],
      ['p', 'Ervebo (rVSV-ZEBOV-GP) is the only WHO-prequalified licensed Ebola vaccine. It is highly effective against Zaire ebolavirus — that strain provides the glycoprotein component of the vector. Because Bundibugyo virus has a structurally different surface glycoprotein, the antibody and T-cell immunity that Ervebo elicits is not expected to provide meaningful protection against a Bundibugyo infection. The WHO has not recommended Ervebo use against the 2026 DRC + Uganda outbreak. The Sabin Vaccine Institute candidate cAd3-EBOZ and the Janssen two-dose Zabdeno/Mvabea regimen are similarly Zaire-specific. The published cross-protection evidence for any Zaire-derived vaccine against Bundibugyo virus is thin and not sufficient to drive a policy recommendation.'],
      ['h3', 'Why Inmazeb and Ebanga Are Not Expected to Work Either'],
      ['p', 'Inmazeb (atoltivimab/maftivimab/odesivimab) and Ebanga (ansuvimab) are the two FDA-approved monoclonal antibody therapeutics for Ebola virus disease. Both target the Zaire ebolavirus surface glycoprotein and were developed and licensed on the basis of Zaire ebolavirus efficacy data from the PALM trial. The structural difference in the Bundibugyo virus glycoprotein means the binding affinity of both monoclonal-antibody products is reduced against Bundibugyo virus, and the published in-vitro and primate-model neutralisation data do not support a clinical use against the 2026 outbreak. The CDC and WHO clinical guidance for the 2026 cluster does not recommend Inmazeb or Ebanga as routine therapy.'],
      ['h3', 'What the WHO R&D Blueprint Has Prioritised Instead'],
      ['p', 'The WHO Research & Development Blueprint technical advisory group on therapeutics has prioritised two monoclonal antibodies for clinical trial against Bundibugyo virus — the published candidates are early-phase Bundibugyo-specific or pan-orthoebolavirus mAbs from the Mapp Biopharmaceutical and Vanderbilt portfolios — and the antiviral obeldesivir (the oral prodrug of remdesivir) for post-exposure prophylaxis assessment in high-risk contacts. The trial-readiness timeline is the operational pressure point: WHO and Africa CDC are working with the trial sponsors to mobilise field-trial capacity in the Ituri and North Kivu health zones within weeks rather than months, with the explicit goal of accumulating clinical efficacy data while the cluster is still at scale.'],
      ['h3', 'What It Means for the Response Geometry'],
      ['p', 'The vaccine and therapeutic gap for the Bundibugyo strain is the single most consequential operational constraint on the 2026 response. Without a licensed Bundibugyo vaccine, the WHO response cannot deploy the ring-vaccination strategy that anchored the response to several recent Zaire ebolavirus DRC outbreaks. Without licensed Bundibugyo-specific monoclonal-antibody therapy, the receiving-country clinical teams are running supportive care plus experimental access protocols rather than a standardised therapeutic. The response geometry therefore relies more heavily on contact tracing, isolation-unit capacity, infection-prevention training for local healthcare workers, and case-finding speed — all of which MSF, CDC, Africa CDC and WHO are actively scaling in the affected DRC health zones.'],
      ['em', 'Last updated · May 25, 2026 · Sources: WHO Disease Outbreak News DON603, WHO Director-General opening remarks at the media briefing on outbreaks of Ebola and hantavirus (22 May 2026), CDC Ebola situation summary, ECDC outbreak update (21 May 2026), peer-reviewed orthoebolavirus comparative biology literature (Towner JS et al.; Hoenen T et al.), MSF Bundibugyo virus challenge analysis.'],
    ],
  },
  { cat: 'News', catClass: 'cat-news', date: 'May 25, 2026', readTime: '7 min read',
    title: 'Uganda Cluster Grows to 5 Confirmed Cases in Kampala: What the Three Weekend Confirmations Mean for the Cross-Border Response and the Next Two Weeks',
    excerpt: 'Three additional Bundibugyo Ebola cases were PCR-confirmed in Uganda\'s capital of Kampala over the weekend, bringing the Uganda cluster to 5 confirmed PCR cases with 1 death. All five are travel-associated to the affected DRC provinces of Ituri and North Kivu. No community-acquired secondary cases have been identified yet. Here is what the weekend confirmations actually mean for the cross-border response geometry, the contact-tracing operation, and the next two weeks of the outbreak.',
    icon: '🇺🇬',
    body: [
      ['p', 'Three additional PCR-confirmed Bundibugyo Ebola cases in Uganda\'s capital city of Kampala were reported by the Uganda Ministry of Health and confirmed by the WHO over the weekend, bringing the Uganda cluster to 5 confirmed PCR cases with 1 confirmed death. All five cases are travel-associated to the affected Democratic Republic of the Congo provinces of Ituri and North Kivu. No community-acquired secondary cases have been identified yet in Uganda. The weekend confirmations are the first material movement in the Uganda cluster line since the original 16 May PHEIC declaration and they materially tighten the cross-border response geometry for the next two weeks.'],
      ['h3', 'What We Know About the Three New Cases'],
      ['p', 'The three new Kampala cases all crossed the DRC-Uganda border within the past three weeks, putting their exposure window inside the published Bundibugyo virus incubation period of 2 to 21 days. Two of the three were direct close contacts of the original two Kampala index cases reported on 16 May, and the third was identified through the Uganda Ministry of Health\'s door-to-door contact-tracing operation in the central Kampala neighbourhoods where the original two cases were located. All three are now isolated at Mulago National Referral Hospital under the Uganda Emergency Operations Centre clinical protocol; the EOC has been activated since 16 May.'],
      ['h3', 'Why No Community-Acquired Cases Yet Is the Key Number'],
      ['p', 'The single most informative number out of Uganda over the next two weeks is whether the cluster stays travel-associated or expands to community-acquired secondary cases. All five confirmations to date are travel-associated to DRC — which means the Uganda Ministry of Health\'s contact-tracing operation has, so far, identified the chain of transmission for every confirmed case. The published Bundibugyo virus serial interval — the time between symptom onset in a primary case and symptom onset in a secondary case — is roughly 12 to 14 days. The next two weeks therefore cover the operationally decisive window inside which any community-acquired secondary case from the original Kampala cluster would, in the worst case, present at a Ugandan health facility.'],
      ['h3', 'The Cross-Border Surveillance Posture'],
      ['p', 'The Uganda-DRC border is one of the most operationally significant cross-border surveillance zones in the entire 2026 response. Uganda has activated enhanced screening at land-border crossings into Ituri and North Kivu, with PCR sample-collection capacity at the four highest-volume crossings. Uganda Ministry of Health and DRC Ministry of Public Health, Hygiene and Social Welfare are sharing real-time confirmed-case data through a WHO-coordinated regional channel. CDC has 23 epidemiologists supporting the Uganda response with 7 more being deployed; this is in addition to the 20 CDC epidemiologists deployed to DRC. The operational cadence is daily co-ordination calls between the two ministries and the WHO regional office, with structured updates published by the WHO at least twice a week.'],
      ['h3', 'Why Africa CDC Named Uganda Plus 10 At-Risk Countries'],
      ['p', 'The Africa CDC named-country watch list (Angola, Burundi, Central African Republic, Republic of the Congo, Ethiopia, Kenya, Rwanda, South Sudan, Tanzania and Zambia) reflects in part the operational lesson the Uganda confirmations carry: a travel-associated cross-border importation can become a community-acquired cluster within a single Bundibugyo serial interval if the contact-tracing operation does not move fast enough. The named-country list now defines the operational watch envelope inside which the next 30 days will play out for the broader regional response.'],
      ['h3', 'What to Watch in Kampala Through the Next Two Weeks'],
      ['p', 'Three things will define how the Uganda cluster reads over the next two weeks. First, whether any of the contacts now being followed in Kampala returns a community-acquired secondary case — that single data point would mark the operational tipping point for the Uganda response geometry. Second, whether the Mulago National Referral Hospital clinical team is able to keep the case-fatality rate inside the published Bundibugyo virus range of 25 to 40 percent or below it — the Uganda cluster currently sits at 1 death against 5 confirmed cases (a CFR of roughly 20 percent), close to the lower end of the historical range. Third, whether the Uganda EOC is able to surface any new confirmations through contact tracing before the cases present at a health facility — that is the operational signal that the contact-tracing operation is keeping pace with the cluster, rather than chasing it.'],
      ['em', 'Last updated · May 25, 2026 · Sources: WHO Disease Outbreak News DON603, Uganda Ministry of Health press updates (24-25 May 2026), WHO Director-General opening remarks at the media briefing on outbreaks of Ebola and hantavirus (22 May 2026), ECDC outbreak update (21 May 2026), CDC Ebola situation summary, Yahoo News live updates citing Africa CDC, NPR, CBS News.'],
    ],
  },
  { cat: 'Tips', catClass: 'cat-tips', date: 'May 25, 2026', readTime: '7 min read',
    title: 'Ebola Symptoms by Day: The Bundibugyo Prodromal-to-Haemorrhagic Phase Timeline and the One-Sentence Rule That Defines Same-Day Care',
    excerpt: 'After every Ebola cluster in the news cycle, the most common question from travelers, healthcare workers in endemic regions, and the families of contacts is the same: what does Bundibugyo Ebola actually look like day by day, and at what point do you go to a hospital. The published clinical timeline is granular enough to be useful and clear enough to be remembered. Here is the day-by-day prodromal-to-haemorrhagic phase timeline and the single one-sentence rule that defines same-day care.',
    icon: '🩻',
    body: [
      ['p', 'After every Ebola cluster reaches the news cycle, the most common question from travelers, healthcare workers in endemic regions, and the families of identified contacts is the same: what does Bundibugyo Ebola actually look like day by day, and at what point in the illness does it make sense to go to a hospital. The published clinical timeline for Bundibugyo virus is granular enough to be useful and short enough to be remembered. Here is the day-by-day prodromal-to-haemorrhagic phase timeline and the one-sentence rule that defines same-day care.'],
      ['h3', 'Day 0: Exposure'],
      ['p', 'Day 0 is the day of exposure. Bundibugyo virus is transmitted primarily through direct contact with the blood, bodily fluids or tissues of an infected person; through contact with surfaces contaminated by infected bodily fluids; or, less commonly, through direct contact with infected non-human primates or bats. The published incubation period is 2 to 21 days, with most symptomatic cases presenting between Day 8 and Day 11 after exposure.'],
      ['h3', 'Days 1-7: Asymptomatic Incubation'],
      ['p', 'Through the first week after exposure, most people remain asymptomatic. The virus is replicating in lymph nodes, spleen and other lymphoid tissues, but viraemia is still below the threshold for symptomatic disease. Importantly, viraemia is also below the threshold for transmission during this phase — Bundibugyo Ebola virus is not transmitted from asymptomatic individuals. Contacts under monitoring remain on daily symptom checks but do not yet face same-day evaluation criteria.'],
      ['h3', 'Days 8-11: Prodromal Phase Onset'],
      ['p', 'The prodromal phase of Bundibugyo Ebola disease typically begins between Day 8 and Day 11 after exposure with the abrupt onset of fever (often above 38.5°C), severe headache, severe muscle aches (myalgia), severe joint aches (arthralgia), profound fatigue, and a feeling of weakness that is much more pronounced than in a typical viral syndrome. The fever is the most consistent early sign. The presentation is non-specific — it resembles the prodromal phase of severe malaria, typhoid fever, or other viral haemorrhagic fevers in endemic regions, which is why the exposure history at triage is so important.'],
      ['h3', 'Days 12-14: Gastrointestinal Phase'],
      ['p', 'Around Days 12-14 after exposure, the illness typically progresses into a gastrointestinal phase: vomiting, watery diarrhoea, abdominal pain, nausea, anorexia, and a dramatic dehydration trajectory if intravenous fluid replacement is not started early. The GI phase is the operational pivot point of Bundibugyo Ebola care — patients who reach an isolation unit with structured fluid management at this phase have meaningfully better outcomes than patients who deteriorate at home over several more days. The Mulago National Referral Hospital in Uganda and the Ituri-based MSF isolation units that came online in the past week are both built around aggressive fluid replacement during the GI phase as the standard-of-care anchor.'],
      ['h3', 'Days 15-17: Haemorrhagic Phase (Some Patients)'],
      ['p', 'In a minority of Bundibugyo Ebola cases — historical published estimates run between 30 and 50 percent — the illness progresses into a haemorrhagic phase around Days 15-17 after exposure, with unexplained bleeding from the gums, nose, eyes, or GI tract, petechiae, and progressive coagulopathy. The haemorrhagic phase is the most-recognised feature of Ebola disease in the public mind but is not universal: a substantial share of Bundibugyo patients never develop overt haemorrhagic symptoms even with severe systemic illness.'],
      ['h3', 'Days 18-21: Recovery or Death'],
      ['p', 'By Days 18-21 after exposure, the published Bundibugyo virus literature is bimodal. A meaningful share of patients enter a recovery trajectory — fever lapses, GI symptoms recede, viraemia begins to drop, and discharge from the isolation unit becomes possible inside the following two to four weeks. The remaining patients deteriorate through multi-organ dysfunction toward death, with the published Bundibugyo case-fatality rate of roughly 25 to 40 percent overall (the 2026 DRC + Uganda cluster currently sitting at a confirmed CFR of approximately 10 percent across 106 cases). Time-to-care, baseline cardiopulmonary reserve, and the experience of the receiving isolation unit are the dominant predictors of which trajectory a given patient follows.'],
      ['h3', 'The One-Sentence Rule for Same-Day Care'],
      ['p', 'For anyone in or recently returned from an Ebola-affected region — particularly the DRC provinces of Ituri, North Kivu and South Kivu, or Kampala in Uganda — the one-sentence rule for same-day medical evaluation is simple. Any unexplained fever above 38°C in the 21 days after possible exposure is a same-day medical evaluation with explicit declaration of the exposure history at triage, regardless of whether GI or haemorrhagic symptoms have appeared yet. The single highest-yield intervention available to the patient is the earliest possible isolation-unit admission and the earliest possible structured fluid replacement.'],
      ['em', 'Last updated · May 25, 2026 · Sources: CDC Ebola Disease Information for Health Care Professionals, WHO Ebola virus disease fact sheet, peer-reviewed Bundibugyo virus clinical case series (Towner JS et al.; MacNeil A et al.), MSF Bundibugyo virus challenge analysis, WHO Disease Outbreak News DON603.'],
    ],
  },
  { cat: 'Science', catClass: 'cat-science', date: 'May 25, 2026', readTime: '7 min read',
    title: 'WHO IHR Emergency Committee Temporary Recommendations: What the 22 May Document Actually Asks Countries to Do at Each Risk Level',
    excerpt: 'The WHO IHR Emergency Committee, meeting for the first time on 22 May, issued temporary recommendations under the International Health Regulations (2005) covering the DRC + Uganda Bundibugyo Ebola outbreak. The recommendations are graded by country risk level — affected states, neighbouring states, and the wider international community — and they are operationally specific. Here is what the document actually asks countries to do, and why the named-country risk tiers matter for the next 30 days of the regional response.',
    icon: '📑',
    body: [
      ['p', 'The WHO IHR Emergency Committee for the 2026 DRC + Uganda Bundibugyo Ebola outbreak met for the first time on 22 May and issued temporary recommendations under the International Health Regulations (2005). The recommendations sit alongside the 17 May PHEIC declaration as the formal regulatory backbone of the international response. The document is graded by country risk level — affected states (DRC and Uganda), neighbouring and at-risk states (the Africa CDC named-country list of ten), and the wider international community — and the operational asks under each tier are concrete. Here is what the temporary recommendations actually ask each tier to do.'],
      ['h3', 'For Affected States (DRC and Uganda)'],
      ['p', 'The temporary recommendations for DRC and Uganda are the most operationally detailed. They direct the affected states to maintain and expand: case finding and confirmation through PCR at INRB Kinshasa and the Uganda Virus Research Institute; ring-based contact tracing for every confirmed and probable case; standardised isolation-unit case management; infection-prevention training for local healthcare workers and traditional caregivers; safe and dignified burial protocols led by trained Red Cross teams; community engagement and risk communication addressing misinformation; cross-border surveillance coordination; and a single national-level information channel for case reporting. The recommendations specifically reinforce the WHO operational guidance on Bundibugyo-strain ring-based contact tracing.'],
      ['h3', 'For Neighbouring and At-Risk States'],
      ['p', 'For the ten countries named by Africa CDC as at heightened risk — Angola, Burundi, Central African Republic, Republic of the Congo, Ethiopia, Kenya, Rwanda, South Sudan, Tanzania and Zambia — the temporary recommendations direct: activation or reinforcement of port-of-entry screening for arrivals from DRC and Uganda; pre-positioning of isolation-unit capacity at major referral hospitals; activation of national rapid-response teams; reinforcement of laboratory partner notification chains; regular regional coordination through Africa CDC; and structured information-sharing with the WHO Regional Office for Africa on at least a weekly cadence. The recommendations explicitly do not impose international travel or trade restrictions and note that the global public-health risk remains low.'],
      ['h3', 'For the Wider International Community'],
      ['p', 'For the wider international community — countries outside the affected states and the Africa CDC named-country list — the temporary recommendations direct: pre-positioning of clinical-management capacity at designated high-containment-unit-equivalent facilities (the German high-containment unit currently caring for the American physician Dr Peter Stafford is one such); maintenance of clinical guidance for healthcare professionals on case definition, infection prevention, and the absence of a licensed Bundibugyo-strain vaccine; reinforcement of returning-traveller surveillance; and continued financial support to the WHO Contingency Fund for Emergencies (WHO has released US$3.9 million; the UN has allocated US$60 million as of 22 May). The temporary recommendations explicitly endorse the CDC + DHS enhanced US entry screening implemented on 18 May at five international airports (ATL, JFK, EWR, IAD, ORD) as consistent with the IHR framework.'],
      ['h3', 'What the Document Does Not Do'],
      ['p', 'The temporary recommendations explicitly do not impose international travel or trade restrictions on or from DRC and Uganda. They do not recommend a Zaire ebolavirus vaccine (Ervebo, Zabdeno/Mvabea) for use against Bundibugyo virus, in line with the published biological evidence that the strains are structurally different at the surface glycoprotein. They do not endorse Inmazeb or Ebanga monoclonal-antibody therapy for Bundibugyo virus disease for the same reason. They do not recommend population-level prophylactic measures outside affected and at-risk health zones. And they do not amend or override the existing WHO Ebola virus disease standing operational guidance — they layer on top of it with cluster-specific temporary measures.'],
      ['h3', 'Why the Document Matters Now'],
      ['p', 'The temporary recommendations are the first formal multilateral regulatory step beyond the PHEIC declaration itself, and they translate the WHO area-risk-assessment language into specific country-level operational asks. The document also defines the formal information-sharing cadence between affected and neighbouring states, which is the operational backbone of the regional response. Two operational dates flow directly from the document: the next Emergency Committee meeting is currently scheduled within the next 30 days, and the published recommendations are subject to formal review at that meeting. Any escalation — for example, a community-acquired secondary case in any of the Africa CDC named countries — would likely trigger an earlier review.'],
      ['h3', 'How to Read the Document Going Forward'],
      ['p', 'For epidemiologists, public-health-institution staff and informed travellers, the operational way to read the temporary recommendations is as a layered checklist. The affected-state ask list defines the operational ceiling of the response inside DRC and Uganda. The at-risk-state ask list defines the operational watch envelope across the named-country set. The wider-international-community ask list defines the receiving-country clinical and surveillance capacity. The document\'s next meaningful update will come at the next scheduled Emergency Committee meeting or at the first triggering event from the at-risk-state set.'],
      ['em', 'Last updated · May 25, 2026 · Sources: WHO IHR Emergency Committee temporary recommendations on the 2026 DRC + Uganda Bundibugyo Ebola outbreak (22 May 2026), WHO Director-General opening remarks at the media briefing on outbreaks of Ebola and hantavirus (22 May 2026), WHO Disease Outbreak News DON603, ECDC outbreak update (21 May 2026), CDC Ebola situation summary, MSF Bundibugyo virus challenge analysis.'],
    ],
  },
  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 24, 2026', readTime: '8 min read',
    title: 'Day 7 of PHEIC: ECDC Confirms 83 DRC + 2 Uganda PCR-Confirmed (12% Confirmed CFR), 836 Suspected, 186 Deaths Cumulative Across 15 Health Zones; MSF Isolation Units Operational in Ituri',
    excerpt: 'Sunday May 24, 2026 is Day 7 after the WHO PHEIC declaration. Cumulative figures from ECDC (as of 21 May) and WHO DON603 (as of 22 May): 83 PCR-confirmed in DRC plus 2 imported cases in Uganda for 85 confirmed cumulative (12% confirmed CFR); 836 suspected cases; 186 deaths cumulative across 15 health zones spanning Ituri Province, North Kivu Province and South Kivu Province plus isolated Kinshasa cases. The Uganda cluster holds at 2 imported cases with no community secondary cases. MSF reports first isolation units operational in Ituri; CDC has 20 epidemiologists in DRC.',
    icon: '🚨',
    body: [
      ['p', 'Sunday May 24, 2026 is Day 7 after the WHO Director-General declared the DRC Bundibugyo Ebola outbreak a Public Health Emergency of International Concern (PHEIC) on 17 May 2026. The cumulative reporting now in the public record is the picture this guide tracks: ECDC and WHO Disease Outbreak News DON603 each confirm the cluster has now climbed to 83 PCR-confirmed cases in DRC plus 2 imported cases in Uganda (cumulative 85 confirmed), 836 suspected cases, and at least 186 deaths cumulative across the affected provinces.'],
      ['h3', 'The Confirmed CFR is Now Reported at 12%'],
      ['p', 'ECDC reports that the confirmed case-fatality rate as of 21 May 2026 is 12 percent — derived from 10 confirmed deaths (one in Uganda) against the 85 confirmed-case denominator. That number is meaningfully lower than the historical 25–40 percent Bundibugyo CFR range and is largely a function of timing: most of the confirmed deaths are the early Mongbwalu and Bunia healthcare-worker cohort, while the more recently PCR-confirmed cases are still inside the acute supportive-care window. The cumulative suspected CFR — the 186 cumulative deaths against the 836 cumulative suspected — is a different and noisier denominator that still includes deaths from before laboratory testing reached scale.'],
      ['h3', '15 Health Zones Across Three Provinces'],
      ['p', 'The geographic footprint is now formally 15 health zones across three DRC provinces: nine to ten health zones in Ituri Province (Bunia, Rwampara, Mongbwalu and additional Ituri health zones), two health zones in North Kivu Province (Butembo and Goma) and one health zone in South Kivu Province (the single import from Tshopo Province reported on 21 May). Isolated cases continue to be reported in Kinshasa with travel link to Ituri. The Uganda cluster holds at two imported PCR-confirmed cases in Kampala, both with travel history from DRC and one death; no community-acquired Ugandan secondary cases have been identified.'],
      ['h3', 'MSF Isolation Units Operational, CDC Field Posture Holds'],
      ['p', 'On the response side, Médecins Sans Frontières / Doctors Without Borders has reported its first isolation units operational in Ituri Province with case-management training continuing for local healthcare workers. WHO continues to support INRB Kinshasa laboratory throughput and has 22 international staff deployed to the field; the agency released US$3.9 million from its Contingency Fund for Emergencies and the UN allocated US$60 million to the response. CDC has 20 epidemiologists in DRC and is training 50 community healthcare workers; 23 CDC epidemiologists support the Uganda response with 7 more being deployed. Africa CDC continues regional coordination including reinforced border surveillance in South Sudan, Rwanda, Burundi, the Central African Republic and Tanzania.'],
      ['h3', 'WHO R&D Blueprint Therapeutics Track'],
      ['p', 'The WHO R&D Blueprint technical advisory group on therapeutics — which met for the second time inside the PHEIC window on 22 May — has prioritised two monoclonal antibody candidates for clinical trial against Bundibugyo virus and recommended that the antiviral obeldesivir be assessed in a clinical trial as post-exposure prophylaxis for high-risk contacts. The licensed Zaire-ebolavirus countermeasures (Ervebo vaccine, Inmazeb and Ebanga monoclonal antibody therapies) are not expected to be efficacious against Bundibugyo virus on the basis of the published cross-reactivity data, and the operational decision to keep the Zaire countermeasures off the front-line list is consistent with WHO\'s technical advice.'],
      ['h3', 'US Posture: Enhanced Screening Holds, No Domestic Cases'],
      ['p', 'Inside the United States, CDC + DHS enhanced entry screening remains in place at five US international airports — Hartsfield-Jackson Atlanta (ATL), John F. Kennedy New York (JFK), Newark Liberty (EWR), Washington Dulles (IAD) and Chicago O\'Hare (ORD). Arrivals from DRC or Uganda on routes terminating at other airports continue to be rerouted through the designated channel. There are no community-acquired Ebola cases inside the United States as of 24 May 2026. CDC continues to assess the US domestic Ebola risk as low. The single PCR-confirmed American case — Dr Peter Stafford, an American physician working at Nyankunde Hospital in Bunia since 2023 — remains in a German high-containment unit and is reported clinically stable.'],
      ['h3', 'Risk Read'],
      ['p', 'WHO upgraded the DRC area risk assessment from "high" to "very high" at the 22 May media briefing; the regional risk remains "high" and the global risk remains "low". The WHO IHR Emergency Committee first meeting on 22 May issued temporary recommendations to countries at different levels of outbreak risk and confirmed the PHEIC posture. The single largest operational unknown over the next two weeks remains the spatial trajectory in North Kivu Province — Goma in particular as a major regional transit hub — and whether the MSF isolation-unit footprint in Ituri can break the residual healthcare-worker transmission chain.'],
      ['h3', 'What to Watch Through Next Week'],
      ['p', 'Three things will define Day 8 through Day 13. First, whether laboratory throughput at INRB Kinshasa keeps the confirmation rate climbing — the gap between the 85 confirmed and the 836 suspected is still wide and will compress in either direction over the next 7 days. Second, whether Uganda registers any community-acquired secondary case, which would be an inflection point for the regional posture. Third, whether the first WHO R&D Blueprint-prioritised monoclonal antibody enters first patients under a clinical-trial protocol in the affected health zones.'],
      ['em', 'Last updated · May 24, 2026 · Sources: WHO Director-General opening remarks at the media briefing on outbreaks of Ebola and hantavirus (22 May 2026), WHO Disease Outbreak News DON603, ECDC outbreak update on Ebola virus disease in DRC and Uganda (19 May 2026), CDC HAN 00530 Ebola Disease Outbreak in DRC and Uganda, Africa CDC regional coordination statement, MSF press updates, Wikipedia "2026 Ituri Province Ebola epidemic".'],

  { cat: 'Science', catClass: 'cat-science', date: 'May 24, 2026', readTime: '7 min read',
    title: 'Why Ervebo, Inmazeb and Ebanga Are Not Expected to Work Against Bundibugyo Virus — and What WHO\'s R&D Blueprint Has Prioritised Instead',
    excerpt: 'The most common patient-facing question after the 2026 DRC Bundibugyo outbreak hit the news has been whether the licensed Zaire-ebolavirus countermeasures — Ervebo vaccine, Inmazeb (atoltivimab/maftivimab/odesivimab) and Ebanga (ansuvimab) — can be used against Bundibugyo virus. The published cross-reactivity evidence is meaningfully thinner than the public assumption and the operational decision by WHO to keep them off the front line is consistent with that evidence. Here is what the literature shows, and what the WHO R&D Blueprint has prioritised instead.',
    icon: '💊',
    body: [
      ['p', 'A frequently-asked question after the WHO PHEIC declaration on 17 May 2026 has been whether the three licensed Zaire-ebolavirus countermeasures — Ervebo (Merck rVSV-ZEBOV vaccine), Inmazeb (Regeneron atoltivimab/maftivimab/odesivimab) and Ebanga (Ridgeback ansuvimab) — can be used against the Bundibugyo strain at the centre of the 2026 DRC outbreak. The short, factual answer is no, and the longer answer is more useful than the headline.'],
      ['h3', 'Why the Zaire Countermeasures Are Strain-Specific'],
      ['p', 'Ervebo is a live recombinant vesicular stomatitis virus (rVSV) vaccine in which the VSV glycoprotein has been replaced with the Zaire ebolavirus glycoprotein. Antibodies raised by the vaccine are directed at the Zaire glycoprotein and have meaningfully limited cross-reactivity with the glycoproteins of other Ebolavirus species. Inmazeb and Ebanga are monoclonal antibody therapies isolated from human Zaire-survivor B cells; the antibody epitopes are on the Zaire glycoprotein. The published cross-reactivity data with Bundibugyo virus is thin and what does exist suggests meaningfully reduced binding and neutralisation. The operational implication is straightforward: deploying the Zaire countermeasures against a Bundibugyo cluster on the assumption of cross-reactivity is a calculated bet against the published evidence, not a default option.'],
      ['h3', 'What the Three Prior Bundibugyo Outbreaks Taught Us'],
      ['p', 'Bundibugyo virus has been recognised in only three outbreaks before 2026: Uganda 2007 (149 cases, 37 deaths — the discovery event), DRC 2012 (small cluster), and now DRC 2026. The Uganda 2007 outbreak was the original source of the case-fatality rate range of approximately 25–40 percent that is still quoted today; it predated the Zaire-strain countermeasure pipeline by almost a decade and was managed exclusively with supportive care. The DRC 2012 outbreak was small enough that it did not generate a published countermeasure trial. The 2026 outbreak is therefore the first occasion on which the question of repurposing the Zaire countermeasures has been posed with real-world urgency.'],
      ['h3', 'What WHO\'s R&D Blueprint Has Prioritised'],
      ['p', 'The WHO R&D Blueprint technical advisory group on therapeutics — convened twice inside the first week of the PHEIC window — has prioritised two monoclonal antibody candidates for clinical trial against Bundibugyo virus, both of which target conserved cross-strain epitopes on the Ebolavirus glycoprotein. The advisory group has also recommended that the antiviral obeldesivir, an oral nucleoside analogue with in-vitro activity against multiple Ebolavirus species, be assessed in a clinical trial as post-exposure prophylaxis for high-risk contacts, particularly healthcare workers and traced household contacts. Phase 1 safety data for the prioritised monoclonal antibodies and obeldesivir already exist; the operational path now is into a clinical-trial protocol in the affected health zones in Ituri and North Kivu.'],
      ['h3', 'What Field Care Actually Looks Like Right Now'],
      ['p', 'Without licensed countermeasures, the operational backbone of Bundibugyo case management in 2026 is the same as it was for Uganda 2007: aggressive supportive care, dedicated isolation units, fluid resuscitation, electrolyte management, treatment of secondary infections, and rigorous infection-prevention-and-control to protect healthcare workers. MSF\'s first isolation units in Ituri are now operational. The single most important determinant of survival in the published Bundibugyo literature is, as for HPS, time-to-care: patients who reach a properly equipped isolation unit early in the illness fare meaningfully better than those who deteriorate at home or in informal-sector facilities.'],
      ['h3', 'The Ervebo Ring-Vaccination Question'],
      ['p', 'A separate question is whether Ervebo could nevertheless be used as a ring-vaccination tool around suspected Bundibugyo clusters on the chance of partial cross-protection. The published cross-reactivity data does not strongly support this, but the consequences of guessing wrong are asymmetric — false-positive protection could enable risk-tolerant behaviour around the ring without actually reducing transmission. WHO has not endorsed ring-vaccination with Ervebo for the 2026 Bundibugyo cluster; the agency\'s technical position is that any cross-strain vaccine use should go through a formal trial protocol rather than an off-label deployment.'],
      ['h3', 'For Travellers and Healthcare Workers'],
      ['p', 'For most travellers to East Africa, the practical Bundibugyo risk in 2026 remains functionally zero. For healthcare workers deploying into the affected health zones, the operational expectation is formal PPE training before deployment, vigilant infection-prevention-and-control during deployment, and post-exposure protocols coordinated with the deploying organisation. Obeldesivir post-exposure prophylaxis under a trial protocol may become available for high-risk contacts inside the affected health zones; the eligibility and protocol will be set by the trial sponsors rather than by ad-hoc clinical decision.'],
      ['h3', 'The Honest Read'],
      ['p', 'The headline-grabbing intuition that the world already has Ebola countermeasures is correct for Zaire ebolavirus but functionally false for the 2026 Bundibugyo cluster. The technical work to fix that — the prioritised monoclonal antibody trials and the obeldesivir post-exposure prophylaxis assessment — is now under way under the WHO R&D Blueprint umbrella. In the meantime, the operational backbone is supportive care, isolation, contact tracing and infection prevention. The single highest-yield action for individuals in the affected region is the same as for every previous Ebola outbreak: early recognition, fast presentation, and protection of healthcare workers.'],
      ['em', 'Last updated · May 24, 2026 · Sources: WHO Director-General opening remarks at the media briefing on outbreaks of Ebola and hantavirus (22 May 2026), WHO R&D Blueprint technical advisory group on therapeutics statements, WHO Disease Outbreak News DON603, CDC Ebola Disease for Health Care Professionals, peer-reviewed cross-reactivity studies on Ervebo / Inmazeb / Ebanga vs. Bundibugyo virus, Uganda 2007 Bundibugyo outbreak retrospective literature, STAT News, Imperial College London Q&A.'],
    ],
  },
  { cat: 'News', catClass: 'cat-news', date: 'May 23, 2026', readTime: '5 min read',
    title: 'Is There Ebola in the United States in 2026? What CDC + DHS Enhanced Airport Screening Actually Does',
    excerpt: 'As of 23 May 2026 there are no community-acquired Ebola cases in the United States. CDC and DHS have implemented enhanced entry screening at 5 international airports — ATL, JFK, EWR, IAD, ORD — for arrivals from DRC and Uganda since 18 May. The American physician Dr Peter Stafford was medically evacuated to a German high-containment unit. Here is what the US Ebola posture actually looks like.',
    icon: '🛂',
    body: [
      ['p', 'A frequently asked question after the WHO PHEIC declaration on 17 May 2026 has been whether there is community-acquired Ebola in the United States. The short, factual answer as of Saturday 23 May 2026 is no. The longer answer — what CDC and DHS are doing, which five US international airports are designated for enhanced screening, where the American physician Dr Peter Stafford was sent, and how the 21-day active monitoring works — is more useful than the headline.'],
      ['h3', 'No community-acquired US Ebola cases as of 23 May 2026'],
      ['p', 'As of the date of this post, there are no community-acquired Ebola cases inside the United States. CDC continues to assess the US domestic Ebola risk as low. The single PCR-confirmed American case — Dr Peter Stafford, an American physician working at Nyankunde Hospital in Bunia, Ituri Province since 2023, who tested positive on 17 May — was medically evacuated to a German high-containment unit and remains clinically stable; his family and a colleague (all asymptomatic) remain under observation but have not been returned to the United States.'],
      ['h3', 'CDC + DHS enhanced entry screening — what it actually is'],
      ['p', 'On 18 May 2026 CDC and DHS jointly implemented enhanced travel screening, entry restrictions and public-health measures on arrivals from DRC and Uganda. Five US international airports are designated for the enhanced screening: Hartsfield-Jackson Atlanta (ATL), John F. Kennedy New York (JFK), Newark Liberty (EWR), Washington Dulles (IAD) and Chicago O\'Hare (ORD). Arrivals from DRC or Uganda on routes terminating at other airports are being rerouted through the designated channel. At the gate, the layered protocol includes self-declared travel history on a CDC traveller-information form, non-contact temperature screening, a structured symptom interview by CDC quarantine-station staff, risk stratification, and instructions for 21-day active self-monitoring keyed to the date of last possible exposure inside DRC or Uganda — not the date of arrival.'],
      ['h3', 'The 21-day active monitoring window'],
      ['p', 'The 21-day active monitoring window is the standard Ebola incubation envelope. All arriving travellers from DRC and Uganda receive a designated state or local health department point of contact and daily temperature-check instructions. Higher-risk travellers — those with known contact with a confirmed case, healthcare workers from affected facilities, or anyone symptomatic at arrival — receive structured follow-up rather than refused entry. Non-disclosure followed by symptom onset post-arrival is the worst possible outcome and the protocol is calibrated to keep travellers honestly engaged with the monitoring system.'],
      ['h3', 'The Congo World Cup angle'],
      ['p', 'Outside the standard screening posture, the United States has separately asked the Democratic Republic of the Congo\'s national football team — which will base in Houston for the 2026 FIFA World Cup — to isolate before arrival for the tournament. The team subsequently cancelled its fan farewell event in Kinshasa over Ebola concerns. This is consistent with the enhanced screening posture rather than a separate emergency authority.'],
      ['h3', 'How long will enhanced screening stay in place?'],
      ['p', 'The CDC + DHS public-health emergency travel measures are typically authorised for 30-day renewable windows tied to the WHO PHEIC status. The first review and renewal of the measures is expected around mid-June 2026. Given the WHO 22 May upgrade of the DRC area risk assessment from "high" to "very high," renewal at the 30-day mark is the operational expectation.'],
      ['em', 'Last updated · May 23, 2026 · Sources: CDC Ebola Disease: Current Situation, CDC Newsroom 18 May 2026, CDC HAN 530, DHS Ebola travel measures notice (18 May), Houston Public Media (21 May 2026 World Cup story), Al Jazeera (22 May 2026).'],
    ],
  },
  { cat: 'News', catClass: 'cat-news', date: 'May 23, 2026', readTime: '5 min read',
    title: 'Ebola Symptoms in 2026: The Bundibugyo Prodromal, GI and Hemorrhagic Phases — and When to Seek Same-Day Care',
    excerpt: 'Bundibugyo virus disease — the Ebola strain in the 2026 DRC outbreak — runs through three overlapping clinical phases. Incubation 2 to 21 days; sudden-onset fever, headache and body pain; GI vomiting and diarrhea by days 4–10; hemorrhagic features in 30–50% of severe cases by days 7–14. The operational rule for anyone with epidemiological exposure: same-day evaluation for any fever lasting more than 24 hours.',
    icon: '🌡️',
    body: [
      ['p', 'Bundibugyo virus disease — the strain at the centre of the 2026 DRC outbreak — is a viral hemorrhagic fever in the Orthoebolavirus genus. Its clinical course tracks the classic Ebola pattern with three overlapping phases. The incubation period is 2 to 21 days post-exposure, with a median around 8 days, which is the basis for the 21-day active monitoring window used for contacts and for the CDC + DHS enhanced US entry screening at five international airports.'],
      ['h3', 'Phase 1 — Prodromal symptoms (days 1–4)'],
      ['p', 'Sudden-onset high fever (often ≥ 38.6 °C / 101.5 °F), severe headache, generalised body pain, profound weakness and fatigue, sore throat, loss of appetite and red eyes. The prodromal phase looks like severe flu and overlaps with malaria, typhoid and other endemic febrile illnesses in the DRC and Uganda. Any patient presenting with fever and a documented epidemiological link to the affected health zones is being evaluated as a suspected Ebola case until ruled out.'],
      ['h3', 'Phase 2 — Gastrointestinal symptoms (days 4–10)'],
      ['p', 'Persistent vomiting, watery diarrhea (sometimes profuse and rapidly dehydrating), abdominal pain, a measles-like maculopapular rash by days 5–7, hiccoughs, difficulty swallowing, and reduced urine output reflecting renal dysfunction. The GI phase is the operational tipping point at which clinical suspicion of Ebola disease tends to overtake the differential of competing tropical febrile illnesses. Aggressive supportive care during this phase — IV fluid resuscitation, electrolyte correction, oxygen support — is the single highest-yield intervention.'],
      ['h3', 'Phase 3 — Hemorrhagic features (subset of cases, days 7–14)'],
      ['p', 'Roughly 30 to 50 percent of severe Bundibugyo cases develop frank hemorrhagic features. Bleeding from the gums, nose, or eyes; bloody vomit or bloody diarrhea; petechiae and ecchymoses on the skin; bleeding from injection sites; and internal bleeding presenting as hypovolaemic shock. The 2026 DRC index case — a nurse who presented in Bunia with fever, vomiting and hemorrhaging on 24 April — illustrates the rapid trajectory possible in severe Bundibugyo disease.'],
      ['h3', 'The operational rule'],
      ['p', 'For anyone in or near the affected health zones in Ituri, North Kivu, Kampala or the South Kivu Tshopo-import ring, same-day medical evaluation is the rule for any fever ≥ 38.0 °C lasting more than 24 hours, particularly with vomiting, diarrhea, severe headache or fatigue, and with a possible epidemiological link. For travellers returning to other countries, the same rule applies for any febrile illness developing within 21 days of departure from DRC or Uganda. Do not wait for hemorrhagic symptoms — they appear late and are not reliable diagnostic triggers.'],
      ['em', 'Last updated · May 23, 2026 · Sources: WHO Disease Outbreak News DON602 / DON603, CDC Ebola Disease: Current Situation, peer-reviewed Bundibugyo clinical literature (Uganda 2007, DRC 2012), WHO Ebola treatment centre standard-of-care guidance.'],
    ],
  },
  { cat: 'News', catClass: 'cat-news', date: 'May 23, 2026', readTime: '5 min read',
    title: 'Is There an Ebola Vaccine in 2026? Why Ervebo Is Zaire-Specific and What the WHO Bundibugyo Pipeline Actually Looks Like',
    excerpt: 'The Merck Ervebo vaccine is licensed for Zaire ebolavirus, not the Bundibugyo strain at the centre of the 2026 DRC outbreak. The Inmazeb and Ebanga monoclonal antibodies are similarly Zaire-specific. On 22 May 2026 the WHO R&D Blueprint formally prioritised two Bundibugyo-targeted monoclonal antibody candidates for clinical trial and the antiviral obeldesivir for post-exposure prophylaxis evaluation. Here is what the pipeline actually looks like.',
    icon: '💉',
    body: [
      ['p', 'One of the most-searched Ebola questions in 2026 is whether a vaccine exists for the Bundibugyo strain at the centre of the DRC outbreak. The short answer is no. The longer answer — what is licensed for Zaire ebolavirus, what is in the Bundibugyo R&D pipeline announced by the WHO at the 22 May media briefing, and what supportive care actually does — is the operationally useful one.'],
      ['h3', 'Licensed Ebola countermeasures (Zaire ebolavirus only)'],
      ['p', 'Three Ebola countermeasures are licensed by the US FDA, and all three are Zaire-specific. Ervebo (rVSV-ZEBOV) is the Merck recombinant vesicular stomatitis virus vaccine licensed in 2019 for Zaire ebolavirus, used to historic effect in ring-vaccination trials during the 2018–20 DRC Kivu outbreak. Inmazeb (REGN-EB3) is a three-monoclonal-antibody cocktail licensed by the FDA in 2020 for Zaire ebolavirus. Ebanga (ansuvimab-zykl, mAb114) is a single-mAb therapy licensed by the FDA in 2020 for Zaire ebolavirus. None of the three is licensed for Bundibugyo virus, and the published clinical-trial evidence on which their licensure rests is Zaire-cohort evidence.'],
      ['h3', 'The WHO R&D Blueprint Bundibugyo pipeline (announced 22 May 2026)'],
      ['p', 'At the WHO joint media briefing on outbreaks of Ebola and hantavirus on 22 May 2026, the WHO Research & Development Blueprint technical advisory group on therapeutics formalised two Bundibugyo priorities. First, two monoclonal antibody candidates have been prioritised for clinical trial against Bundibugyo virus, drawing on roughly 18 years of pan-orthoebolavirus mAb pre-clinical work since the 2007 Uganda Bundibugyo outbreak. The published pre-clinical Bundibugyo mAb literature converges on a small number of high-avidity broadly neutralising scaffolds shown to provide cross-protection in primate Bundibugyo challenge studies. Second, obeldesivir — a remdesivir-class oral nucleoside-analog antiviral — has been recommended for evaluation in a clinical trial as post-exposure prophylaxis (PEP) for high-risk contacts of Ebola patients including household members, healthcare workers and identifiable close contacts.'],
      ['h3', 'Why supportive care still carries the response'],
      ['p', 'Any vaccine roll-out for Bundibugyo would take at least six to nine months per the WHO Director-General. The 2026 outbreak response is therefore being carried on the supportive-care backbone — aggressive IV fluid resuscitation, electrolyte correction, oxygen support, antimalarials and antibiotics where co-infection is suspected, and structured nutrition support — with the WHO Blueprint mAb and obeldesivir trials as bridging interventions if they can be activated quickly enough. The published EVD literature consistently shows that patients reaching a treatment centre during the prodromal or early GI phase, and receiving structured supportive care, have meaningfully better outcomes than community-managed cases.'],
      ['h3', 'What the next 90 days need to show'],
      ['p', 'Three operational milestones will define the pipeline through August. First, whether the trial protocols can be filed, IRB-reviewed at sites in DRC and Uganda, and operationally activated inside the 6-to-8-week window in which case incidence is most likely to remain at trial-feasible levels. Second, whether enough confirmed cases or high-risk contacts can be enrolled in that window to power either trial to a defensible primary endpoint. Third, whether the field-level operational tempo of contact tracing inside Goma, Butembo and the Ituri health zones can support the close protocol monitoring an outbreak-response trial requires.'],
      ['em', 'Last updated · May 23, 2026 · Sources: WHO DG opening remarks at the 22 May joint media briefing on outbreaks of Ebola and hantavirus, WHO R&D Blueprint Bundibugyo therapeutics meeting outputs, CIDRAP, FDA labels for Ervebo, Inmazeb and Ebanga, peer-reviewed pan-orthoebolavirus mAb literature.'],
    ],
  },
  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 23, 2026', readTime: '9 min read',
    title: 'Day 6 of PHEIC: WHO Upgrades DRC Area Risk to Very High, IHR Emergency Committee Issues Temporary Recommendations, Confirmed Cases Climb to 85 (~750 Suspected, 177 Deaths Cumulative)',
    excerpt: 'Saturday May 23, 2026 is Day 6 after the WHO PHEIC declaration on the DRC Bundibugyo Ebola outbreak. At the 22 May joint Ebola + hantavirus media briefing the WHO upgraded the DRC area risk from high to very high (global remains low) and the WHO IHR Emergency Committee, meeting for the first time the same day, issued temporary recommendations. DRC confirmed cases now stand at 85, suspected at approximately 750, with 177 deaths cumulative. WHO R&D Blueprint prioritised two monoclonal antibodies for trial and obeldesivir for post-exposure prophylaxis evaluation. WHO released US$3.9M; UN allocated US$60M.',
    icon: '🚨',
    body: [
      ['p', 'Saturday May 23, 2026 is Day 6 after the WHO Director-General declared the DRC Bundibugyo Ebola outbreak a Public Health Emergency of International Concern on 17 May. Three threads define the day, and they each register a meaningful step forward in both the response posture and the operational picture.'],
      ['h3', 'WHO 22 May Briefing: DRC Area Risk Upgraded to Very High'],
      ['p', 'At the joint WHO media briefing on outbreaks of Ebola and hantavirus delivered by Director-General Tedros Adhanom Ghebreyesus on 22 May, the WHO upgraded the DRC area risk assessment from "high" to "very high" while keeping the global risk at "low." The DRC cumulative confirmed case count has risen to 85 PCR-confirmed cases across Ituri Province (Bunia, Rwampara, Mongbwalu and additional Ituri health zones), North Kivu Province (Butembo and Goma) and isolated cases in Kinshasa. Cumulative suspected cases stand at approximately 750 and the cumulative death toll has climbed to 177, with 10 deaths now confirmed (one in Uganda). Tedros warned that the outbreak is likely materially larger than the reported numbers, and that DRC authorities have acknowledged the outbreak likely began weeks to months before it was first investigated.'],
      ['h3', 'IHR Emergency Committee First Meeting: Temporary Recommendations Issued'],
      ['p', 'On the same day the WHO IHR Emergency Committee met for the first time on the 2026 Bundibugyo epidemic and issued temporary recommendations to countries at different levels of risk. The temporary recommendations are the formal IHR mechanism for translating PHEIC status into operationally specific guidance — surveillance posture, entry screening, contact tracing thresholds, and laboratory diagnostic priorities calibrated to whether a country is on the affected side of the cluster, on a high-risk border, or operating in the elevated-vigilance posture outside the affected region. The Emergency Committee will meet again on its scheduled review cycle and will revise the temporary recommendations as the picture develops.'],
      ['h3', 'R&D Pipeline: Two Monoclonal Antibodies Prioritised, Obeldesivir Under PEP Evaluation'],
      ['p', 'The WHO Research & Development Blueprint technical advisory group on therapeutics met during the week and recommended two operational priorities. The first is that two monoclonal antibody candidates be prioritised for clinical trial against Bundibugyo virus, drawing on the institutional memory of the Inmazeb and Ebanga programmes for Zaire ebolavirus and the cross-strain neutralisation work that has accumulated since the 2007 Uganda Bundibugyo outbreak. The second is that the antiviral obeldesivir — a remdesivir-class agent — be assessed in a clinical trial as post-exposure prophylaxis for high-risk contacts of Ebola patients, coordinated with the Africa CDC and the Collaborative Open Research Consortium on Filoviruses. Any vaccine roll-out would take at least six to nine months, and the PEP posture is meant to bridge the early acute-response period.'],
      ['h3', 'Financing and Field Deployment'],
      ['p', 'The WHO released US$3.9 million from its Contingency Fund for Emergencies, and the United Nations allocated US$60 million to the response. 22 WHO international staff have been deployed to the field. The US CDC has dispatched 20 epidemiologists to the DRC and is training 50 community healthcare workers; 23 epidemiologists support the Uganda response, with 7 more subject-matter experts being deployed for both countries. The MSF large-scale response in Ituri continues to scale, with isolation-unit construction, contact-tracing support, infection-prevention training for local healthcare workers, and field laboratory capacity now in various stages of deployment.'],
      ['h3', 'Misinformation and the Field-Level Trust Deficit'],
      ['p', 'Several factors complicate the response. The DRC\'s Ituri and North Kivu provinces have been compromised by international aid cuts and armed conflict that has led to significant population displacement. Another challenge is distrust of outside authorities and the spread of misinformation. On 21 May youths torched a hospital in Ituri after authorities refused to release the body of a local football player who died of suspected Ebola — the kind of incident that captures the operational difficulty of running a response in a region with a fragile trust baseline. To combat misinformation, IFRC volunteers are going door-to-door in Mongbwalu advising people on how to protect themselves and when to seek care.'],
      ['h3', 'Uganda and the United States'],
      ['p', 'The Uganda cluster continues to hold at two imported PCR-confirmed travel-associated cases (one death) in Kampala, both with recent travel history from DRC; no community-acquired secondary cases have yet been identified. The Uganda WHO risk assessment is "high" (versus "very high" inside DRC). In the United States, the American physician Dr Peter Stafford remains clinically stable in the German high-containment unit, his family and a colleague (all asymptomatic) remain under observation, and CDC + DHS enhanced US entry screening remains in place at five US international airports.'],
      ['h3', 'The Risk Read'],
      ['p', 'For the general public outside the affected health zones, the contact rings of the two Uganda cases, and the closed South Kivu Tshopo import ring, the practical Bundibugyo risk in 2026 remains low. The WHO and Africa CDC have not recommended travel or trade restrictions; individual countries are free to impose stricter measures (as the US has done with enhanced entry screening). The honest assessment is that the outbreak is now operating at a scale that WHO itself describes as likely materially larger than what is being detected and reported, and the next 14 days of confirmation-rate data, the next 14 days of contact-tracing closures inside Butembo and Goma, and the early progress of the WHO R&D Blueprint mAb and obeldesivir trials will, together, do the actual work of telling us whether the cluster is bending toward containment.'],
      ['em', 'Last updated · May 23, 2026 · Sources: WHO Director-General opening remarks at media briefing on outbreaks of Ebola and hantavirus (22 May 2026), WHO IHR Emergency Committee first meeting temporary recommendations (22 May 2026), WHO Disease Outbreak News DON602 / DON603, Africa CDC regional coordination updates, CDC Ebola Disease: Current Situation, CIDRAP, ECDC outbreak update 19 May 2026, Reuters, MSF preparedness statement.'],
    ],
  },
  { cat: 'Science', catClass: 'cat-science', date: 'May 23, 2026', readTime: '7 min read',
    title: 'Obeldesivir and Two Monoclonal Antibodies: What the WHO R&D Blueprint Pipeline Actually Looks Like for Bundibugyo',
    excerpt: 'At the 22 May media briefing, the WHO Director-General confirmed two operational R&D priorities for the DRC Bundibugyo cluster: two monoclonal antibody candidates prioritised for clinical trial, and the antiviral obeldesivir under evaluation in a clinical trial as post-exposure prophylaxis for high-risk contacts. Here is what each of those pipelines actually looks like, where the published Bundibugyo evidence sits, and what the next 90 days would need to show.',
    icon: '💉',
    body: [
      ['p', 'For Bundibugyo virus — the Ebola strain at the centre of the 2026 DRC outbreak — there is no licensed vaccine and no licensed specific antiviral, and the institutional pipeline that exists for Zaire ebolavirus does not transfer cleanly across to the Bundibugyo strain. At the 22 May joint Ebola + hantavirus WHO media briefing, the Director-General confirmed two operational R&D priorities the WHO has now formally adopted on the recommendation of its Research & Development Blueprint technical advisory group on therapeutics. The first is that two monoclonal antibody candidates be prioritised for clinical trial. The second is that the antiviral obeldesivir be assessed in a clinical trial as post-exposure prophylaxis for high-risk contacts. Each of those decisions sits inside a longer history that is worth surfacing.'],
      ['h3', 'Why Bundibugyo Sits Outside the Existing Licensed Toolkit'],
      ['p', 'Bundibugyo virus (BDBV) is a separate species inside the Orthoebolavirus genus from Zaire ebolavirus (EBOV). The two cocktail monoclonal antibody therapies licensed in the United States for Ebola — Inmazeb and Ebanga — are specifically indicated for Zaire ebolavirus disease, and the published clinical-trial evidence on which their licensure rests is Zaire-cohort evidence. The Merck Ervebo vaccine is similarly Zaire-targeted. Bundibugyo virus shares enough antigenic structure with EBOV that some cross-neutralisation has been documented in the laboratory, but the published evidence does not support deploying Inmazeb, Ebanga or Ervebo off-label as licensed countermeasures for Bundibugyo without trial validation.'],
      ['h3', 'The Two Monoclonal Antibody Candidates'],
      ['p', 'The two mAb candidates the WHO R&D Blueprint has now formally prioritised for Bundibugyo trial sit on top of roughly 18 years of pan-orthoebolavirus mAb work that has accumulated since the 2007 Uganda Bundibugyo outbreak. The detailed candidate identity is being held inside the WHO R&D Blueprint working group until the clinical-trial protocols are filed, but the published pre-clinical Bundibugyo mAb literature converges on a small number of high-avidity broadly neutralising antibody scaffolds that have shown cross-protection in primate Bundibugyo challenge studies. The operational question for the clinical trial is whether such candidates can produce a measurable mortality benefit on top of the WHO-standardised supportive-care backbone (fluid resuscitation, electrolyte correction, oxygenation support) inside a 28-day endpoint window.'],
      ['h3', 'Obeldesivir Under Post-Exposure Prophylaxis Evaluation'],
      ['p', 'Obeldesivir is a remdesivir-class oral nucleoside-analog antiviral. The WHO R&D Blueprint working group has recommended that obeldesivir be assessed in a clinical trial as post-exposure prophylaxis (PEP) for high-risk contacts of Ebola patients — that is, household members, healthcare workers and other identifiable close contacts of confirmed cases. PEP rather than acute therapeutic use is the right early-trial framing for a clinical-trial-naive agent at this stage of the outbreak, because the contact rings provide a defined, time-bounded population for a randomised trial, and because the operational benefit of preventing onward transmission inside the contact rings would compound across the next 30 to 60 days of the outbreak.'],
      ['h3', 'What the Next 90 Days Need to Show'],
      ['p', 'Three operational milestones will define the R&D pipeline through August. First, whether the trial protocols for the mAb candidates and the obeldesivir PEP arm can be filed, IRB-reviewed at the participating sites in DRC and Uganda, and operationally activated inside the 6-to-8-week window in which Bundibugyo case incidence is most likely to remain at trial-feasible levels. Second, whether enough confirmed cases or high-risk contacts can be enrolled inside that window to power either trial to a defensible primary endpoint; the historical Ebola outbreak trials in DRC have shown that enrollment feasibility is itself the binding constraint on outbreak-response trial science. Third, whether the field-level operational tempo of contact tracing inside Goma, Butembo and the Ituri health zones can support the close protocol monitoring an outbreak-response trial requires.'],
      ['h3', 'The Honest Read'],
      ['p', 'The WHO R&D Blueprint prioritisation announced on 22 May is the right shape of the right decision at the right time. It is also the easy part. The hard part is what happens in the next 90 days inside the field — whether the trials can be launched and enrolled at the pace the outbreak requires, whether the supportive-care backbone the trials sit on is operationally available at scale across Ituri and North Kivu, and whether the trust deficit that the hospital-arson incident in Ituri exemplifies can be closed enough to make trial enrollment a real option. The pipeline is now formally on the table; the operational question is whether the field can keep up.'],
      ['em', 'Last updated · May 23, 2026 · Sources: WHO DG opening remarks at the 22 May media briefing on outbreaks of Ebola and hantavirus, WHO R&D Blueprint Bundibugyo therapeutics meeting outputs, CIDRAP, published peer-reviewed pan-orthoebolavirus mAb literature, US NIAID obeldesivir filovirus pre-clinical literature, WHO Disease Outbreak News DON602 / DON603.'],
