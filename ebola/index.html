  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 22, 2026', readTime: '9 min read',
    title: 'Day 5 of PHEIC: DRC Bundibugyo Cluster Reaches 51 PCR-Confirmed Across 11 Health Zones, Spread Into North Kivu (Butembo, Goma) and South Kivu Import',
    excerpt: 'Friday May 22, 2026 is the fifth day after the WHO PHEIC declaration on the DRC Bundibugyo Ebola outbreak. The cluster total stands at 51 PCR-confirmed cases in DRC plus 2 imported cases in Kampala (one death), approximately 600 suspected cases and 139 deaths reported cumulatively across 11 health zones in Ituri Province and North Kivu Province plus the single South Kivu import from Tshopo Province reported on May 21. MSF has announced a large-scale field response.',
    icon: '🦠',
    body: [
      ['p', 'Friday May 22, 2026 is the fifth day after the WHO Director-General declared the DRC Bundibugyo Ebola outbreak a Public Health Emergency of International Concern. Three operational threads define the day. First, the cluster total now stands at 51 PCR-confirmed cases in DRC plus 2 imported cases in Kampala (one death) — a cumulative confirmation count materially higher than the 30 reported on May 19, reflecting expanded laboratory throughput at the Institut National de Recherche Biomédicale (INRB) in Kinshasa rather than a sudden acceleration in onward transmission. Second, the geographic footprint has expanded again: the outbreak is now reported across 11 health zones split between Ituri Province (Bunia, Rwampara, Mongbwalu, and six additional Ituri health zones) and North Kivu Province (Butembo and Goma), plus the single South Kivu import from Tshopo Province reported on May 21. Third, Médecins Sans Frontières / Doctors Without Borders has announced it is preparing a large-scale response in Ituri with isolation units, contact-tracing support, infection-prevention training, and field laboratory capacity.'],
      ['h3', 'The Headline Numbers and What They Mean'],
      ['p', 'The most-quoted change on the dashboard between May 19 and May 22 is the jump in PCR-confirmed cases from 30 to 51 in DRC. The right reading of that change is not a sudden surge in transmission. It is the continued scaling-up of INRB Kinshasa laboratory throughput, which is now clearing the sample backlog that had built up in the field during the early weeks of the cluster. The cumulative suspected-case count has moved from 513 to approximately 600, and the cumulative death toll has moved from 131 to 139. The confirmation rate among tested suspects — the share of tested suspected cases that come back PCR-positive for Bundibugyo virus, the single most informative early-outbreak statistic — is climbing as the laboratory pipeline matures, and is the number that will need 7 to 10 more days to stabilise before it becomes a defensible read on the true scale of the outbreak.'],
      ['h3', 'North Kivu: Spread Into Butembo and Goma'],
      ['p', 'The most consequential geographic development since the May 19 update is the documented spread into two North Kivu health zones: Butembo and Goma. Goma in particular is a major regional transit hub on the border with Rwanda; documented Bundibugyo transmission inside Goma would meaningfully elevate the cross-border risk profile, although none of the surveillance signals to date suggest that a sustained Goma transmission chain has been established. The North Kivu cases are counted inside the cumulative 51-confirmed DRC count rather than as a separate cluster, and ring-based contact tracing is now under way in both Butembo and Goma alongside the existing tracing rings in Ituri.'],
      ['h3', 'South Kivu: A Single Tshopo Import'],
      ['p', 'South Kivu Province reported a single confirmed Bundibugyo case on May 21, imported from Tshopo Province. The Tshopo import is the first confirmed case outside the Ituri-plus-North-Kivu-plus-Uganda-plus-Kinshasa pipeline that has defined the cluster so far, and the contact-tracing ring around that single import is being closed promptly. The operational read is that the surveillance system is detecting spillover events early, which is the right signal to see in the first 5 days after a PHEIC declaration. The wrong signal would be a delay in detection of geographically distant cases; the prompt South Kivu report does not fit that pattern.'],
      ['h3', 'Uganda and the United States'],
      ['p', 'The Uganda cluster continues to hold at two PCR-confirmed travel-associated cases (with one death) in Kampala, both with recent travel history from DRC. No community-acquired secondary cases have yet been identified. The Uganda Ministry of Health emergency operations centre is in active mode, and contact tracing is running for the full ring around both imports. In the United States, the American physician Dr Peter Stafford, who tested positive for Bundibugyo virus on May 17 at Nyankunde Hospital in Bunia, has been medically evacuated to a German high-containment unit and is reported as clinically stable; his family and a colleague (all asymptomatic) remain under observation. CDC and DHS enhanced US entry screening at five US international airports for arrivals from DRC and Uganda remains in place. CDC continues to assess the US domestic Ebola risk as low.'],
      ['h3', 'MSF Mobilises a Large-Scale Field Response'],
      ['p', 'Médecins Sans Frontières / Doctors Without Borders announced on May 21 that it is preparing a large-scale response in Ituri Province with multiple operational threads. The first is isolation-unit construction in the most-affected Ituri health zones, drawing on the organisation\'s deep institutional memory of Ebola response in DRC since the 2018-20 Equateur Province outbreak. The second is direct contact-tracing support working alongside DRC Ministry of Public Health field teams. The third is infection-prevention training for local healthcare workers, which is operationally urgent given that health workers were among the earliest deaths in Mongbwalu. The fourth is field laboratory capacity that will reduce the bottleneck currently routing all samples through INRB Kinshasa.'],
      ['h3', 'The Public-Health Read'],
      ['p', 'For the general public outside the affected Ituri and North Kivu health zones, the contact rings of the two Uganda cases, and the closed South Kivu Tshopo import ring, the practical Bundibugyo risk in 2026 remains low. WHO and Africa CDC continue to recommend no travel or trade restrictions; individual countries are free to impose stricter measures (as the US has done with enhanced entry screening). The honest assessment is that the outbreak is operating at a scale that WHO and Africa CDC describe as potentially larger than what is currently being detected and reported, and the next 14 days of confirmation-rate data will determine whether the case curve is bending.'],
      ['h3', 'What to Watch Through Next Week'],
      ['p', 'Three things will define the next week. First, whether the confirmation rate stabilises inside the 20%–40% range that historical Ebola outbreaks have run in once laboratory pipelines mature — a sustained higher rate would suggest substantial under-detection in the field. Second, whether North Kivu produces any documented community-acquired secondary cases inside Butembo or Goma. Third, whether the WHO Emergency Committee issues revised temporary recommendations at its next scheduled review.'],
      ['em', 'Last updated · May 22, 2026 · Sources: WHO Disease Outbreak News DON602, WHO PHEIC declaration (17 May 2026), WHO DG opening remarks at media briefing (20 May 2026), Africa CDC regional coordination updates, CDC Ebola Disease: Current Situation, CDC + DHS enhanced US entry screening notice (18 May), Wikipedia "2026 Ituri Province Ebola epidemic", ECDC outbreak update 19 May 2026, MSF "DRC: MSF preparing large-scale response to Ebola outbreak in Ituri province".'],

  { cat: 'Science', catClass: 'cat-science', date: 'May 22, 2026', readTime: '7 min read',
    title: 'Bundibugyo Virus in Goma: Why a Single Confirmed Case in a Regional Transit Hub Matters More Than the Count Suggests',
    excerpt: 'The DRC cumulative confirmed-case count climbed from 30 to 51 between May 19 and May 22, with documented spread into two North Kivu Province health zones: Butembo and Goma. Goma is a major regional transit hub on the border with Rwanda, and even a single sustained transmission chain there would materially elevate the cross-border risk profile. Here is why Goma matters more than the absolute case count would suggest, and what the next two weeks of surveillance will need to show.',
    icon: '🛂',
    body: [
      ['p', 'The most-quoted change in the DRC Bundibugyo cluster between May 19 and May 22 is the jump in PCR-confirmed cases from 30 to 51. The most operationally consequential change is geographic: the outbreak has now been documented in the North Kivu Province city of Goma, the regional transit hub on the border with Rwanda. Even a small number of confirmed cases inside Goma carries an out-of-proportion impact on the cross-border risk profile of the cluster, because of what Goma is and how it functions inside the eastern Congo regional economy.'],
      ['h3', 'What Goma Is'],
      ['p', 'Goma is the provincial capital of North Kivu Province in the eastern Democratic Republic of the Congo. It sits on the northern shore of Lake Kivu, directly on the border with the Rwandan city of Gisenyi. The Grande Barrière border crossing between Goma and Gisenyi is one of the busiest land crossings in Central Africa, processing tens of thousands of people each day in normal commerce. Goma is also home to a UN base, an international airport with regular service to Kinshasa and Nairobi, and a port on Lake Kivu that handles passenger ferry traffic to Bukavu in South Kivu Province. The functional consequence of all of those features is that Goma sits at the intersection of multiple regional movement networks: cross-border commercial traffic, internal DRC air and water transit, and humanitarian and peacekeeping movement.'],
      ['h3', 'Why a Single Goma Case Matters'],
      ['p', 'A single PCR-confirmed Bundibugyo case inside Goma is operationally different from a single confirmed case in a rural Ituri health zone. The reason is the size of the natural contact ring around any infected individual in a high-throughput urban transit setting. In rural Mongbwalu or Rwampara, a single index case typically generates a contact ring of dozens of people who can be identified and traced relatively completely within a few days. In Goma, a single index case who used public transit, attended a religious service, or visited a market in the days before symptom onset can generate a contact ring of hundreds of people, with materially more uncertainty about who was in the ring. That difference in ring size is the dominant variable in whether contact tracing can stay ahead of onward transmission inside a city.'],
      ['h3', 'What Cross-Border Transmission Would Look Like'],
      ['p', 'A documented Bundibugyo case inside Rwanda — either acquired from an exposure in Goma and detected after crossing the border, or acquired inside Rwanda from a Goma-based index case who crossed first — would meaningfully change the regional risk profile. The Rwandan Ministry of Health has a strong public-health surveillance system and a well-rehearsed Ebola response, including border-screening protocols that have been activated repeatedly during prior DRC Ebola outbreaks. The first signal of cross-border transmission would almost certainly come from the Rwandan side, not from a missed Goma case.'],
      ['h3', 'What the Next 14 Days Need to Show'],
      ['p', 'Three operational signals will define the next two weeks for the Goma situation. First, whether the contact-tracing ring around the index Goma case is being closed inside a defensible perimeter — a stable ring with no escapees would be a strong positive signal. Second, whether any documented community-acquired secondary cases appear inside Goma. The first community-acquired Goma case would be a meaningfully worse signal than the first imported case. Third, whether the Rwandan side of the border reports any suspected or confirmed cases. Sustained zero on the Rwandan side over the next two weeks would support a contained read.'],
      ['h3', 'What the Public Should Take From This'],
      ['p', 'For travellers and residents outside the affected health zones, the practical risk read remains low. WHO and Africa CDC have not recommended travel or trade restrictions. The Goma situation is operationally consequential because of what it could become if contact tracing falls behind, not because of what it currently is. The pace of the response — including the MSF large-scale mobilisation announced on May 21 — is calibrated to that calculation.'],
      ['h3', 'The Honest Read'],
      ['p', 'Even one PCR-confirmed Bundibugyo case in Goma justifies the heightened operational tempo. It is not, by itself, a reason for the global community to escalate above the PHEIC posture already declared on May 17. The next 14 days of confirmation-rate data and the next 14 days of Goma-side ring-tracing data will, together, do the actual work of telling us whether the cluster is bending toward containment or whether the WHO Emergency Committee needs to revisit the temporary recommendations.'],
      ['em', 'Last updated · May 22, 2026 · Sources: WHO Disease Outbreak News DON602, WHO DG media briefing (20 May 2026), Africa CDC regional coordination call notes, MSF preparedness statement (21 May 2026), ECDC outbreak update 19 May 2026, Wikipedia "2026 Ituri Province Ebola epidemic", peer-reviewed literature on Bundibugyo virus outbreaks (Uganda 2007, DRC 2012), regional cross-border transit data from UN OCHA Goma situational reports.'],
    ],
  },
  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 19, 2026', readTime: '9 min read',
    title: 'Day 2 of PHEIC: DRC Confirmed Cases Triple to 30, Suspected Cases Pass 500, Death Toll Climbs to 131 Across 9 Ituri Health Zones',
    excerpt: 'Tuesday May 19, 2026 is the second day after the WHO PHEIC declaration on the DRC Bundibugyo Ebola outbreak. Updated reporting from WHO, Africa CDC, and the DRC Ministry of Public Health places the cluster at 30 PCR-confirmed cases, 513 suspected, and 131 deaths across 9 Ituri health zones — up from 3. The Uganda cluster holds at 2 imported cases. CDC and DHS have implemented enhanced US entry screening from DRC and Uganda.',
    icon: '🚨',
    body: [
      ['p', 'Tuesday May 19, 2026 is the second day after the WHO Director-General declared the DRC Bundibugyo Ebola outbreak a Public Health Emergency of International Concern. The two days since that declaration have produced three operational shifts. First, the laboratory throughput at the Institut National de Recherche Biomédicale (INRB) in Kinshasa has scaled up materially, and the PCR-confirmed case count has tripled from 12 to 30 as a result. Second, the geographic footprint has expanded: the outbreak is now reported across 9 health zones in Ituri Province, up from the original three. Third, the suspected case count has crossed five hundred, and the death toll has climbed to 131 — the great majority still classified as suspected rather than confirmed.'],
      ['h3', 'What the Tripling of Confirmed Cases Actually Means'],
      ['p', 'The jump from 12 to 30 PCR-confirmed cases in 48 hours is the single largest change on the dashboard, and it is also the easiest to misread. It does not reflect a sudden acceleration in onward transmission. It reflects the scaling-up of laboratory throughput at INRB Kinshasa: samples that had accumulated in the field but had not yet been run, and a revised assay panel that now includes Bundibugyo virus alongside Zaire ebolavirus, are catching up to the case-count pipeline. The right reading of the next 7 to 14 days is the confirmation rate (PCR-positive among tested suspects) and the geographic spread, not the absolute confirmed-case number.'],
      ['h3', 'Geographic Footprint: From 3 to 9 Health Zones'],
      ['p', 'The DRC Ministry of Public Health, Hygiene and Social Welfare confirmed on Monday May 18 that the outbreak now spans 9 health zones in Ituri Province. The original three — Bunia (provincial capital), Rwampara, and Mongbwalu (the gold-mining region suspected as the origin) — have been joined by six additional health zones across northeastern Ituri. The expansion is the kind of geographic spread that the WHO Emergency Committee specifically flagged as a PHEIC trigger; the next operational question is whether the case ring is staying inside Ituri or whether the spillover into other DRC provinces is being meaningfully contained.'],
      ['h3', 'Uganda: Two Imports, No Community Spread Yet'],
      ['p', 'The Uganda cluster continues to hold at two PCR-confirmed travel-associated cases (with one death) in Kampala, both with recent travel history from DRC. No community-acquired secondary cases have yet been identified. The Uganda Ministry of Health emergency operations centre is in active mode, and contact tracing is running for the full ring around both imports. The Uganda count is the single most operationally consequential number outside DRC: any growth there will translate directly into elevated regional risk, while a sustained zero for community-acquired cases will support a contained read.'],
      ['h3', 'United States: Enhanced Entry Screening, American Physician Evacuated'],
      ['p', 'On Monday May 18 the United States Centers for Disease Control and Prevention and the Department of Homeland Security jointly implemented enhanced travel screening, entry restrictions, and public health measures on arrivals from DRC and Uganda. Five US international airports are designated for entry screening. The American physician Dr Peter Stafford, who tested positive for Bundibugyo virus on May 17 at Nyankunde Hospital in Bunia, has now been medically evacuated to a German high-containment unit, with his family and a colleague (all asymptomatic) under observation. CDC continues to assess the US domestic Ebola risk as low.'],
      ['h3', 'The Public-Health Read'],
      ['p', 'For the general public outside the affected Ituri health zones and the contact rings of the two Uganda cases, the practical Bundibugyo risk in 2026 remains low. WHO and Africa CDC continue to recommend no travel or trade restrictions, although individual countries are free to impose stricter measures. The honest read is that the outbreak is now operating at a scale that WHO and Africa CDC describe as "potentially much larger than what is currently being detected and reported", and the next 14 days will determine whether the case curve is bending. The Emergency Committee remains in continuous session and will issue updated temporary recommendations as the situation evolves.'],
      ['h3', 'What to Watch Over the Next 7 Days'],
      ['p', 'Three things will define the next week. First, whether the confirmation rate (PCR-positives among tested suspects) stabilises at a defensible value — a value in the 20%–40% range would be consistent with a true outbreak partially obscured by diagnostic noise, while a substantially higher rate would suggest a much larger underlying outbreak. Second, whether the case ring in Uganda produces any community-acquired secondary cases. Third, whether the Mongbwalu mining-region origin hypothesis is supported by genomic sequencing now running at INRB Kinshasa.'],
      ['em', 'Last updated · May 19, 2026 · Sources: WHO Disease Outbreak News DON602, WHO PHEIC announcement (17 May 2026), Africa CDC regional coordination call, CDC Newsroom (CDC mobilises international response · 17 May), CDC + DHS enhanced US entry screening notice (18 May), Wikipedia "2026 Ituri Province Ebola epidemic", CIDRAP, NBC News, NPR, Al Jazeera, CNN.'],
    ],

  { cat: 'Science', catClass: 'cat-science', date: 'May 19, 2026', readTime: '7 min read',
    title: 'Why the Bundibugyo Confirmation Rate Matters More Than the Headline Case Count',
    excerpt: 'The DRC Bundibugyo confirmed case count tripled from 12 to 30 in 48 hours after the WHO PHEIC declaration. That number is easy to misread. The single most informative summary statistic in the first two weeks of any Ebola outbreak is the confirmation rate — the share of suspected cases that test PCR-positive in the reference laboratory. Here is why, and what to look for as the 2026 cluster evolves.',
    icon: '🧪',
    body: [
      ['p', 'The most common public reading of an Ebola dashboard in the first 48 hours after a WHO PHEIC declaration is to track the confirmed-case count. That is, in fact, the wrong number to anchor on. In the early days of any Ebola outbreak, the confirmed-case count moves at the speed of laboratory throughput, not at the speed of viral transmission. The single most informative summary statistic in the first two weeks is the confirmation rate — the share of suspected cases that test PCR-positive in the reference laboratory. The 2026 DRC Bundibugyo cluster offers a textbook example of why.'],
      ['h3', 'How Suspected Cases Are Defined'],
      ['p', 'A suspected Ebola case is a person meeting the operating case definition for the outbreak — typically fever above 38 degrees Celsius plus a defined symptom subset (severe headache, severe muscle pain, vomiting, diarrhea, unexplained bleeding) plus an epidemiological link (residence in or recent travel from an affected health zone, or contact with a known or suspected case). The definition is deliberately broad in the early phase of an outbreak: missing a case is much more costly than over-counting one, and the cost of investigating a non-Ebola fever is far smaller than the cost of missing an Ebola fever.'],
      ['h3', 'How Confirmed Cases Are Defined'],
      ['p', 'A confirmed Ebola case is one with a positive PCR result for the specific Ebola species in a recognised reference laboratory. For the 2026 cluster the recognised reference laboratory is INRB Kinshasa, with confirmatory support from a small network of WHO-Collaborating Centres. The 2026 outbreak has had a specific diagnostic complication: initial PCR panels targeted Zaire ebolavirus and returned negative, briefly delaying recognition that an Ebola outbreak was underway. The revised assay panel now includes Bundibugyo virus, and INRB throughput has materially expanded since the May 17 PHEIC declaration.'],
      ['h3', 'Why the Ratio Matters'],
      ['p', 'The confirmation rate — the share of tested suspected cases that come back PCR-positive for Bundibugyo virus — tells you what fraction of the suspected pipeline is real Ebola. In the early days of an outbreak the confirmation rate is highly variable, because laboratory throughput cannot keep up with the suspected-case pipeline and because the case definition is intentionally broad. As laboratory capacity scales up, the confirmation rate typically moves toward a stable value that reflects the true positive predictive value of the case definition. For comparable Ebola outbreaks, that stable value typically sits in the 20% to 40% range.'],
      ['h3', 'What Each Range Means'],
      ['p', 'A sustained confirmation rate well below 20% would imply a much smaller true outbreak than the suspected-case count suggests, with substantial diagnostic noise from non-Ebola febrile illnesses (malaria, typhoid, viral hemorrhagic fevers from non-Ebola species). A sustained confirmation rate well above 40% would imply a much larger true outbreak than the confirmed count suggests, with substantial under-detection in the field. A sustained rate inside the 20%–40% band would be consistent with a real outbreak being adequately characterised by the surveillance system.'],
      ['h3', 'Where the 2026 Cluster Sits'],
      ['p', 'As of May 19, 2026 the DRC Bundibugyo cluster is at 30 PCR-confirmed cases out of 513 suspected — a headline ratio of roughly 6%. That headline ratio is meaningfully below the 20% lower bound but is almost certainly an artefact of the confirmation pipeline still being in scale-up mode. The right way to read it is as a number that should be re-evaluated in 7 to 10 days, when the laboratory throughput has had time to clear the backlog and the confirmation rate has had time to stabilise.'],
      ['h3', 'Why Deaths Lead the Case Count'],
      ['p', 'In many remote African outbreaks the death count moves ahead of the confirmed case count. The reasons are operational: clinical deaths can be recorded by community health workers in the field without a laboratory test, while case confirmations require sample collection, transport to a reference laboratory, and a successful PCR run. The 2026 cluster has 131 deaths against 30 PCR-confirmed cases — a gap that should narrow over the next two weeks as laboratory throughput catches up.'],
      ['h3', 'The Read for the Next 14 Days'],
      ['p', 'For readers outside the public-health field, the most useful dashboard discipline is to ignore day-over-day fluctuations smaller than 10% and to anchor on three things: the trajectory of the confirmation rate over 7 to 10 days; the geographic spread (new health zones added or no new health zones added); and the secondary-case count in Uganda. A combination of a stabilising confirmation rate inside the 20%–40% band, a flat geographic footprint, and zero community-acquired Uganda cases would be the most reassuring signal possible — the case curve would still be growing, but the operational state of the response would be on top of it.'],
      ['em', 'Last updated · May 19, 2026 · Sources: WHO Ebola surveillance case definitions (2014, updated 2018), Africa CDC outbreak reporting guidance, INRB Kinshasa laboratory updates, Imperial College London expert Q&A on outbreak data interpretation, peer-reviewed epidemiology (Ferguson NM et al., MacNeil A et al. on the 2007 Uganda Bundibugyo outbreak).'],
    ],
  },
  { cat: 'Breaking News', catClass: 'cat-news', date: 'May 17, 2026', readTime: '8 min read',
    title: 'WHO Declares DRC Bundibugyo Ebola Outbreak a PHEIC; First American Tests Positive',
    excerpt: 'Sunday May 17 is the day the 2026 DRC Ebola outbreak became a global story. The WHO Director-General formally declared the Bundibugyo cluster in DRC and Uganda a Public Health Emergency of International Concern, and the same day an American physician in Bunia tested positive and entered medical evacuation to Germany.',
    icon: '🚨',
    body: [
      ['p', 'Sunday May 17, 2026 is the day the 2026 Democratic Republic of the Congo Ebola outbreak became a global story. In the morning the WHO Director-General formally declared the Bundibugyo virus cluster in DRC and Uganda a Public Health Emergency of International Concern (PHEIC) — the WHO\'s highest-level alert mechanism under the International Health Regulations. By the afternoon the United States had a directly affected citizen: Dr Peter Stafford, an American physician who has been working at Nyankunde Hospital in Bunia since 2023, tested positive for Bundibugyo virus and was being prepared for medical evacuation to Germany via the US State Department.'],
      ['h3', 'The Numbers'],
      ['p', 'As of the WHO PHEIC declaration, the cluster total stood at 12 PCR-confirmed cases, 336 suspected cases, and 89 deaths. Most of the deaths are still classified as suspected rather than confirmed because confirmatory PCR has lagged behind the case count in remote Ituri Province health zones with limited laboratory capacity. The outbreak is centred in three health zones in Ituri — Bunia, Rwampara, and Mongbwalu — with two confirmed imported cases (one death) in Kampala, Uganda, and isolated confirmed cases reported in DRC\'s capital Kinshasa with travel links back to Ituri.'],
      ['h3', 'Why Bundibugyo Virus Matters'],
      ['p', 'The clinical and public-health stakes are heightened by the specific Ebola virus species responsible. Bundibugyo virus (BDBV) is one of six known Ebola virus species and has historically caused far fewer human cases than the dominant Zaire ebolavirus. Crucially, the most widely deployed Ebola countermeasures — Merck\'s rVSV-ZEBOV vaccine (Ervebo) and the licensed monoclonal antibody therapies Inmazeb and Ebanga — are specific to Zaire ebolavirus and do not have demonstrated efficacy against Bundibugyo in humans. Animal-model data and a small number of in-vitro studies suggest possible cross-protection from some candidate countermeasures (Mapp Biopharmaceutical\'s MBP-134 cocktail, Auro Vaccines\' VesiculoVax, and a limited Ervebo-Bundibugyo cross-reactivity hypothesis), but none of these is licensed for Bundibugyo use today.'],
      ['h3', 'How the Outbreak Was Recognised'],
      ['p', 'The currently known index case is a nurse in Bunia who reported symptom onset on April 24, 2026 — fever, severe malaise, vomiting and hemorrhaging — and died at a Bunia medical centre. On May 5 the WHO received an alert about an unknown illness with high mortality in Mongbwalu Health Zone, including four health workers dead within four days. Initial diagnostic assays at INRB Kinshasa targeted Zaire ebolavirus and returned negative, briefly delaying recognition. A revised assay panel including Bundibugyo virus confirmed the strain on May 14, and the DRC Ministry of Public Health, Hygiene and Social Welfare officially declared the 17th national Ebola outbreak on May 15.'],
      ['h3', 'The American Case'],
      ['p', 'Dr Peter Stafford is the first US citizen known to be infected in the 2026 outbreak. He has been working at Nyankunde Hospital — a charity-run referral hospital in Ituri Province — since 2023. He developed symptoms over the weekend of May 16–17, tested positive late on Sunday, and is now being moved to a German high-containment unit. Germany has previous Ebola experience from the 2014–16 West African outbreak. His family, including four children, and a fellow physician at Nyankunde — all asymptomatic — are being transferred with him for observation. CDC has said it will continue to assess the US domestic risk as low; the US has no community-transmitted cases and does not have direct flights from Bunia.'],
      ['h3', 'What a PHEIC Actually Does'],
      ['p', 'A WHO PHEIC declaration is an extraordinary alert mechanism: it triggers obligations on member states to coordinate, share data and provide support, and it justifies an enhanced WHO response posture including emergency funding, temporary recommendations on travel and trade, and an Emergency Committee that meets at regular intervals. A PHEIC does not, in itself, restrict travel — the May 17 declaration did not impose flight bans or border closures, although individual countries are free to issue advisories. Africa CDC has called for urgent regional coordination, including border screening in adjacent countries.'],
      ['h3', 'What to Watch Over the Next 14 Days'],
      ['p', 'Three things will define the next two weeks. First, the share of suspected cases that ultimately confirm by PCR — a low confirmation rate would imply a smaller true outbreak with diagnostic noise, a high rate would imply a much larger one. Second, whether secondary cases emerge among the contacts of the two Kampala imports — that is the test of whether cross-border spread is being contained. Third, whether any further international evacuations follow, and whether any of the candidate countermeasures (Ervebo off-label, MBP-134 compassionate use, or VesiculoVax) get a real-world trial.'],
      ['em', 'Last updated · May 17, 2026 · Sources: WHO Disease Outbreak News DON602, WHO PHEIC announcement (17 May 2026), Africa CDC regional coordination call, NPR, CNN, Al Jazeera, NBC News, STAT News, Imperial College London expert Q&A, Wikipedia "2026 Ituri Province Ebola epidemic".'],
    ],
  },
  { cat: 'Science', catClass: 'cat-science', date: 'May 17, 2026', readTime: '7 min read',
    title: 'Bundibugyo Virus: The Rare Ebola Strain Behind the 2026 DRC Outbreak',
    excerpt: 'Bundibugyo virus (BDBV) is one of six known species in the genus Ebolavirus. It has produced just two prior recognised outbreaks in human history — Uganda 2007 and DRC 2012 — and the 2026 DRC cluster is the third. The Merck Ervebo vaccine and licensed monoclonal antibody therapies do not have demonstrated efficacy against it. Here is what the published virology actually says.',
    icon: '🧬',
    body: [
      ['p', 'The single most important biological fact about the 2026 DRC Ebola outbreak is the strain. Bundibugyo virus (BDBV) — named for the Bundibugyo District in western Uganda where it was first identified in 2007 — is one of six known species in the genus Ebolavirus: Zaire ebolavirus (EBOV), Sudan ebolavirus (SUDV), Bundibugyo ebolavirus (BDBV), Taï Forest ebolavirus (TAFV), Reston ebolavirus (RESTV), and the newly recognised Bombali ebolavirus. EBOV is the species most people mean when they say "Ebola"; it caused the 2014–16 West African epidemic, the 2018–20 DRC epidemic, and the great majority of historical outbreaks. BDBV has been the cause of only two prior recognised outbreaks before 2026: Uganda 2007 (149 cases, 37 deaths, ~25% CFR) and the DRC Province Orientale 2012 (52 cases, ~36% CFR). The 2026 DRC cluster is the third.'],
      ['h3', 'How Bundibugyo Compares Clinically'],
      ['p', 'The clinical syndrome caused by Bundibugyo virus disease (BVD) is broadly indistinguishable from Zaire Ebola at the bedside in the early phase: an incubation period of 2–21 days; an abrupt prodromal phase of fever, headache, severe muscle pain, and gastrointestinal upset; and a progression in roughly half of cases to a severe phase of multi-organ failure with internal and external hemorrhage. The most important clinical difference is the case fatality rate. In the 2007 Uganda outbreak the CFR was approximately 25%, and in the 2012 DRC outbreak approximately 36% — meaningfully lower than the typical 40–90% CFR of Zaire ebolavirus. That difference is real but should not be overread: Bundibugyo is still an extraordinarily lethal virus, and the lower CFR reflects in part the small number of cases studied.'],
      ['h3', 'Where the Vaccines and Antivirals Stand'],
      ['p', 'The Ebola countermeasures stockpile has been built around Zaire ebolavirus. The licensed vaccines (Merck\'s rVSV-ZEBOV / Ervebo, and the Johnson & Johnson two-dose Zabdeno + Mvabea regimen) and the licensed monoclonal antibody therapies (Regeneron\'s Inmazeb, Ridgeback Biotherapeutics\' Ebanga) are EBOV-specific and have not demonstrated clinical efficacy against BDBV in humans. There is a longstanding theoretical question about partial cross-protection: rVSV-ZEBOV has demonstrated some protection against Bundibugyo in non-human primate challenge studies, and Mapp Biopharmaceutical\'s MBP-134 monoclonal cocktail was designed for pan-Ebola activity and has shown protection against BDBV in non-human primates. None of these is licensed against Bundibugyo today, and the WHO Emergency Committee that recommended the PHEIC declaration on May 17 also recommended an accelerated cross-protection evaluation in the field.'],
      ['h3', 'How Bundibugyo Is Spread'],
      ['p', 'Bundibugyo virus spreads by the same routes as other Ebola species: direct contact with the body fluids (blood, vomit, diarrhea, saliva, semen, breast milk, urine) of an infected person or with surfaces or objects contaminated by those fluids. Healthcare workers are particularly at risk in the prodromal and acute phases, which is the reason the 2026 outbreak\'s earliest recognised cluster of deaths is among the four health workers in Mongbwalu Health Zone in early May. Burial practices that involve washing or touching the deceased are the other major historical amplification route, and contact tracing in the 2026 cluster has flagged at least one funeral as a possible super-spreader event. Sexual transmission via persistence of viral RNA in semen for many months has been documented for Zaire ebolavirus but is less well-characterised for Bundibugyo.'],
      ['h3', 'Diagnostic Caveats'],
      ['p', 'One important operational lesson from the 2026 outbreak is the diagnostic gap. The initial PCR panels run at field laboratories targeted Zaire ebolavirus and produced negative results, briefly delaying recognition that an Ebola outbreak was under way. Multiplex Ebola PCRs that include all four human-pathogenic species (Zaire, Sudan, Bundibugyo, Taï Forest) exist but are not universally deployed in front-line African laboratories. A practical post-2026 priority will be ensuring that any Ebola-suspect cluster is tested against all four species from the first run.'],
      ['h3', 'Why the Mongbwalu Mining Region Matters'],
      ['p', 'The suspected geographic origin of the 2026 cluster is the Mongbwalu Health Zone, a high-traffic artisanal gold mining region in Ituri. Mining areas have historically been associated with the spillover of Ebola from forest fruit bats — the suspected reservoir species — into human populations, because of the combination of dense bat populations in mine shafts, high human turnover, weak healthcare infrastructure, and rapid onward dispersal of symptomatic miners returning to their home communities. Genomic sequencing now under way at INRB Kinshasa will, over the coming weeks, establish whether the 2026 BDBV strain shares a common ancestor with the 2007 Uganda or 2012 DRC Bundibugyo strains, and whether the spillover event was recent.'],
      ['h3', 'The Public-Health Read'],
      ['p', 'For everyone outside Ituri and the Kampala contact ring, the practical assessment from WHO, Africa CDC, and CDC is that the international community-spread risk is low. Bundibugyo, like other Ebola species, is not airborne and is not transmissible during the asymptomatic incubation phase. The risk is concentrated where the case ring is concentrated — among healthcare workers, household members, funeral attendees, and a small number of identified travel contacts.'],
      ['em', 'Last updated · May 17, 2026 · Sources: WHO Disease Outbreak News DON602, US News explainer on Bundibugyo, Imperial College London expert Q&A, STAT News on candidate countermeasures, CDC Ebola situation summary, peer-reviewed virology (MacNeil A et al. on the 2007 Uganda BDBV outbreak; Albariño CG et al. on the 2012 DRC BDBV outbreak).'],
    ],

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 17, 2026', readTime: '6 min read',
    title: 'Should Travellers to East Africa Be Worried? A Practical Risk Read',
    excerpt: 'WHO has declared a Public Health Emergency of International Concern but has not recommended travel restrictions to DRC, Uganda or neighbouring countries. Here is a practical, evidence-based traveller risk read — what is actually high risk, what is essentially zero risk, and what changes if you are a healthcare worker.',
    icon: '🛂',
    body: [
      ['p', 'The most common single question after a WHO PHEIC declaration is: "Is it safe to travel?" The May 17, 2026 declaration for Bundibugyo Ebola in DRC and Uganda is no exception. The short answer is that for the overwhelming majority of leisure and business travellers to East Africa, the practical Ebola risk in 2026 is functionally zero. But "functionally zero" hides some meaningful nuance about what changes risk and what does not.'],
      ['h3', 'What WHO Has Actually Recommended'],
      ['p', 'The WHO PHEIC declaration on May 17 was not accompanied by any recommendation to restrict international travel or trade. The WHO Emergency Committee specifically declined to advocate flight bans, border closures, or pre-departure screening requirements at international airports beyond what is already standard at affected-country exit points. Individual countries are free to impose more restrictive measures, and the United States announced enhanced exit screening at Goma and Entebbe airports as well as enhanced entry screening on arrivals from DRC and Uganda at five US international airports. The European Union and the United Kingdom have indicated they will not impose entry screening at this time.'],
      ['h3', 'Where Risk Is Actually Concentrated'],
      ['p', 'In every Ebola outbreak of the modern era, including the 2014–16 West African epidemic, the people at meaningfully elevated risk are a small and specific population. They are: (1) healthcare workers in affected facilities, including community health workers and ambulance staff; (2) household members of cases; (3) attendees of traditional funeral rituals involving touching the deceased; and (4) direct contact-tracing field teams. Travellers to capital cities, tourists on safari circuits in eastern and southern Africa, and even most business travellers to Kinshasa or Kampala fall well outside these high-risk categories.'],
      ['h3', 'The Practical Traveller Checklist'],
      ['p', 'For an East Africa traveller in the next four to six weeks, the practical risk-management list is short. Avoid hospitals and clinics in affected regions unless you require care. Avoid traditional funerals involving touching the deceased. Wash hands frequently and avoid contact with bushmeat or wild primates. Monitor your temperature daily for 21 days after return from any affected region — that is the outer bound of the Ebola incubation period. If you develop a fever, severe headache, severe muscle pain, vomiting or diarrhea within 21 days of return, contact your local health authority before going to a healthcare facility so that triage staff can apply infection-prevention measures appropriately.'],
      ['h3', 'If You Are a Healthcare Worker Travelling'],
      ['p', 'The risk equation changes meaningfully for healthcare workers travelling to DRC or Uganda for clinical work, volunteer assignments, or NGO deployment. Pre-deployment risk assessment, formal personal protective equipment training to WHO/Médecins Sans Frontières standards, and a clear post-deployment monitoring plan are essential. Healthcare workers should also receive guidance on the absence of a Bundibugyo-specific vaccine; the Ervebo vaccine has been offered off-label to some high-risk personnel in past outbreaks, but the cross-protection question for Bundibugyo is not settled.'],
      ['h3', 'Pregnancy, Immunocompromise, and Older Age'],
      ['p', 'Pregnant travellers, immunocompromised travellers and older travellers face the same risk as the general population if they are not in the high-risk categories above. Severe Ebola disease in pregnancy carries a very high risk of maternal and fetal loss, and severe disease in immunocompromised hosts is also high-risk, but these are downstream consequences of infection — they do not increase the probability of infection itself.'],
      ['h3', 'The Honest Read'],
      ['p', 'WHO has declared a PHEIC because the cross-border spread to Uganda meets the regulatory threshold and because the limited Bundibugyo-specific countermeasures stockpile justifies the highest level of international coordination. The declaration is not, in itself, a signal that the average traveller should change plans. It is a signal that international funders, vaccine developers and front-line responders should reprioritise. The best public-health stance for travellers is to follow CDC and WHO travel guidance, monitor temperature post-return, and otherwise carry on.'],
      ['em', 'Last updated · May 17, 2026 · Sources: WHO PHEIC announcement (17 May 2026), Africa CDC regional coordination call, CDC Ebola travel guidance, WHO Q&A on Ebola vaccines, STAT News on Ervebo cross-protection question.'],
    ],
  },
  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 17, 2026', readTime: '6 min read',
    title: 'Ebola PPE: What WHO and MSF Actually Use Inside an Ebola Treatment Centre',
    excerpt: 'Ebola personal protective equipment is one of the most heavily-engineered PPE regimens in modern medicine. Here is a plain-language walk-through of the WHO/MSF Ebola treatment centre standard PPE, what each layer is for, and why donning and doffing protocols are more dangerous than the wards themselves.',
    icon: '🥽',
    body: [
      ['p', 'Ebola treatment centre PPE is unlike almost any other clinical PPE regimen in modern medicine. It is built around the assumption that the patient is shedding a high-titre, lethal, contact-transmissible virus in every body fluid; that the wards are hot, with limited air conditioning; and that the most dangerous moment for the wearer is not in the ward itself but at the doffing station at the exit, when a single contaminated glove tip touched to a face can cause infection. This piece is a plain-language walk-through of the standard WHO/Médecins Sans Frontières (MSF) Ebola treatment centre PPE set, layer by layer.'],
      ['h3', 'The Standard PPE Layers'],
      ['p', 'A standard WHO-recommended Ebola treatment centre PPE set comprises, from inside out: a disposable cotton scrub set (worn next to the skin); a Tyvek or equivalent fluid-resistant coverall with an integrated hood; a fluid-resistant disposable surgical or medical gown over the coverall; an FFP2 or N95 respirator with a face shield, or alternatively a full-face PAPR (powered air-purifying respirator); goggles worn under the face shield where a non-PAPR setup is used; two pairs of nitrile gloves with the outer pair taped to the gown cuffs; a fluid-resistant apron over the gown for splash protection; and knee-high rubber boots over the coverall trouser legs.'],
      ['h3', 'Why So Many Layers'],
      ['p', 'Each layer has a specific function. The inner scrubs are sacrificial and laundered or incinerated. The coverall provides full-body fluid-resistant barrier. The surgical gown provides a sacrificial outer layer that absorbs splash and is shed first during doffing. The respirator provides infectious-aerosol protection during high-risk procedures (suction, intubation, manual resuscitation). The face shield protects the respirator from splash and creates a "clean" surface for safe wipe-down. The double-gloving protects against single-glove tears and gives a "clean" inner glove to use during doffing once the outer is removed. The apron and boots address splash and the unavoidable presence of contaminated fluids on the ward floor.'],
      ['h3', 'Donning: The Buddy System'],
      ['p', 'Donning PPE — putting it on before entering the high-risk zone — is done by every healthcare worker in front of a trained buddy who works through a written checklist. The order is fixed: hand hygiene, scrubs, boots, coverall, hood, mask, goggles, face shield, inner gloves, gown, outer gloves taped to gown, apron. Each step is verified by the buddy before the next is started. A typical donning sequence takes 10 to 15 minutes.'],
      ['h3', 'Doffing: Where the Risk Actually Is'],
      ['p', 'Doffing — removing PPE after exit from the high-risk zone — is the single most dangerous moment in Ebola care. The doffing station is a dedicated room with a trained "doffer" or buddy who narrates the doffing protocol step by step. The order is essentially the reverse of donning, but every step is interspersed with a 0.5% chlorine spray decontamination of the outer surface of the PPE. The outer gloves come off first, then the apron, then the gown, then the face shield, then the goggles, then the respirator, then the coverall (rolled down from inside out), then the boots, then the inner gloves last. The doffer never touches the worker. Hand hygiene with 0.5% chlorine and then water-and-soap follows every step.'],
      ['h3', 'Heat as the Hidden Constraint'],
      ['p', 'The constraint that drives most operational decisions in an Ebola treatment centre is not the virus but the heat. A full PPE set in an unventilated 32°C / 90°F African ward can produce an internal temperature of 40°C / 104°F within forty-five minutes, with dehydration of two to three litres per shift not uncommon. WHO and MSF protocols cap individual shifts at 45–60 minutes inside the high-risk zone for this reason. The heat stress also explains why PAPRs — which produce a cooled airflow over the face — have become more common in 2026 outbreaks than they were in 2014, despite their higher cost and logistical footprint.'],
      ['h3', 'What This Means Outside an Ebola Treatment Centre'],
      ['p', 'For readers who are not working inside an Ebola treatment centre, none of the above applies as a self-protection list. The risk of community Ebola transmission in countries without active cases is functionally zero, and the routine precautions of hand hygiene, avoidance of bushmeat, and avoidance of traditional funerals involving touching the deceased are sufficient. The full PPE regimen described here is the standard for the small population of healthcare workers, lab staff, burial teams and field epidemiologists who knowingly enter a high-risk zone.'],
      ['em', 'Last updated · May 17, 2026 · Sources: WHO Personal Protective Equipment for Ebola Treatment Centres (technical guidance), MSF Ebola PPE Protocol (publicly available), CDC PPE for Ebola guidance, peer-reviewed literature on Ebola PPE donning/doffing safety (Casanova LM et al., Beam EL et al.).'],
    ],
  },
  { cat: 'Tips', catClass: 'cat-tips', date: 'May 17, 2026', readTime: '5 min read',
    title: 'How to Read an Ebola Outbreak Dashboard Without Panicking',
    excerpt: 'Ebola outbreak dashboards combine confirmed cases, suspected cases, probable cases, deaths, and incomplete real-time reporting in a way that is easy to misread. Here is a plain-language guide to what each number means, why they update at different speeds, and what to look for to assess whether an outbreak is being controlled.',
    icon: '📊',
    body: [
      ['p', 'In the first 72 hours after a WHO PHEIC declaration, the single most common source of public anxiety is the outbreak dashboard. Numbers move quickly, definitions shift, and the gap between "suspected" and "confirmed" cases can be enormous. This is a plain-language guide to reading an Ebola outbreak dashboard without misreading it.'],
      ['h3', 'Confirmed vs Suspected vs Probable'],
      ['p', 'WHO and Africa CDC report Ebola cases in three categories. A confirmed case is one with a positive PCR result for the specific Ebola species in a recognised reference laboratory. A probable case is one with a clinical picture and exposure history consistent with Ebola, including a death or severe illness, but no laboratory confirmation — typically because the patient died before a sample could be taken or because the sample was lost or inadequate. A suspected case is a person meeting a working case definition (typically: fever plus a defined symptom set plus an epidemiological link) but with no laboratory result yet. Suspected cases are the most volatile number on the dashboard; they include real Ebola, real non-Ebola febrile illnesses (malaria, typhoid, viral hemorrhagic fevers from other species), and incomplete information.'],
      ['h3', 'Why the Confirmation Rate Matters'],
      ['p', 'The ratio of confirmed to suspected cases is the single most informative summary statistic in the first ten days of an outbreak. Early on, the confirmation rate is low because laboratory throughput cannot keep up with the suspected-case pipeline, and because field staff err on the side of casting a wide net to find every possible case. As laboratory capacity scales up, the confirmation rate usually moves toward a stable value — perhaps 20% to 40% of suspected cases — that reflects the true positive predictive value of the case definition.'],
      ['h3', 'Why Deaths Update Faster Than Cases'],
      ['p', 'In many remote African outbreaks the death count moves ahead of the confirmed case count. The reasons are operational: clinical deaths can be recorded by community health workers in the field without a laboratory test, while case confirmations require sample collection, transport to a reference laboratory, and a successful PCR run. As laboratory capacity scales up, the case count usually catches up to and overtakes the death count. A widening gap between deaths and confirmed cases is usually a sign of laboratory bottlenecks, not of unusually high lethality.'],
      ['h3', 'Doubling Time and Reproductive Number'],
      ['p', 'Two quantitative measures of outbreak control are doubling time (the number of days for the cumulative case count to double) and the effective reproductive number Re (the average number of new infections per existing infection). The Ebola pre-intervention basic reproductive number R0 is generally in the range 1.5 to 2.5, with Re falling below 1 when an outbreak is being controlled. Africa CDC and WHO publish Re estimates for major outbreaks; a sustained Re below 1 is the most reliable signal that the case curve will turn over.'],
      ['h3', 'Geographic and Demographic Distribution'],
      ['p', 'A good Ebola dashboard breaks down cases by health zone, by epidemiological link to known clusters, and by demographic category — particularly healthcare worker, household contact, funeral attendee. The geographic shape of the outbreak is more informative than the headline case count: an outbreak that is staying inside the initial cluster of health zones is qualitatively different from one that is jumping to new health zones. The 2026 DRC cluster\'s jump to Uganda is meaningful for that reason; the jump from Ituri to Kinshasa is meaningful for the same reason.'],
      ['h3', 'What to Ignore'],
      ['p', 'A good rule of thumb is to ignore daily fluctuations smaller than 10% and to weight weekly trends instead. A single day of high case counts is almost never an inflection point; a sustained week-over-week reduction in suspected cases and confirmed cases together is. Headlines that highlight a single confirmed case in a new country (a single imported case) without a chain of secondary cases should be read for what they are — a successful surveillance system, not a failure of control.'],
      ['em', 'Last updated · May 17, 2026 · Sources: WHO Ebola surveillance case definitions (2014, updated 2018), Africa CDC outbreak reporting guidance, Imperial College London expert Q&A on outbreak data interpretation (Ferguson NM et al.).'],
    ],
  },
];

function CaseCurve() {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    const ctx = canvasRef.current.getContext('2d');
    const chart = new window.Chart(ctx, {
      type: 'line',
      data: {
        labels: CASE_CURVE_DATA.map(d => d.date),
        datasets: [
          { label: 'Suspected', data: CASE_CURVE_DATA.map(d => d.suspected), borderColor: '#ea580c', backgroundColor: 'rgba(234,88,12,0.08)', tension: 0.25, fill: true, borderWidth: 2.5, pointRadius: 3 },
          { label: 'Confirmed (PCR)', data: CASE_CURVE_DATA.map(d => d.confirmed), borderColor: '#b91c1c', backgroundColor: 'rgba(185,28,28,0.08)', tension: 0.25, fill: false, borderWidth: 2.5, pointRadius: 3 },
          { label: 'Deaths', data: CASE_CURVE_DATA.map(d => d.deaths), borderColor: '#7f1d1d', backgroundColor: 'rgba(127,29,29,0.08)', tension: 0.25, fill: false, borderWidth: 2.5, pointRadius: 3, borderDash: [4,3] },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { family: 'DM Sans', size: 12 } } } },
        scales: {
          y: { beginAtZero: true, grid: { color: '#e2e8f0' }, ticks: { font: { family: 'DM Sans' } } },
          x: { grid: { display: false }, ticks: { font: { family: 'DM Sans' } } },
        },
      },
    });
    return () => chart.destroy();
  }, []);
  return (
    <div className="curve-wrap">
      <h3>Cumulative Cases & Deaths — DRC Ituri 2026 Outbreak</h3>
      <p className="sub">Suspected cases (orange) include unconfirmed clinical cases under investigation. PCR-confirmed cases (red) require a positive Bundibugyo virus PCR at INRB Kinshasa or partner reference lab. Deaths (dashed) include both confirmed and probable.</p>
      <div className="curve-canvas"><canvas ref={canvasRef}></canvas></div>
      <p style={{ marginTop: 12, fontSize: '.78rem', color: 'var(--gray-600)' }}>Source: WHO Disease Outbreak News DON602, Africa CDC daily situation reports, DRC Ministry of Public Health. Data points are cumulative as of the date shown.</p>
    </div>
  );
}

function FAQSection() {
  return (
    <section id="faq">
      <h2>Frequently Asked Questions</h2>
      <p className="section-sub">Plain-language answers to the most common questions about the 2026 DRC Ebola outbreak. Updated regularly.</p>
      <div className="faq">
        <details>
          <summary>What is the Bundibugyo strain?</summary>
          <p>Bundibugyo virus (BDBV) is one of six species in the genus Ebolavirus. It has caused only two prior recognised outbreaks — Uganda 2007 (~25% CFR) and DRC 2012 (~36% CFR). The 2026 DRC cluster is the third. The licensed Ebola vaccines (Merck Ervebo, J&J two-dose regimen) and licensed monoclonal antibody therapies (Inmazeb, Ebanga) are Zaire-ebolavirus specific and do not have demonstrated clinical efficacy against Bundibugyo virus.</p>
        </details>
        <details>
          <summary>Is there a vaccine or treatment for Bundibugyo?</summary>
          <p>No licensed vaccine and no licensed specific antiviral exists for the Bundibugyo strain. Treatment is supportive: fluid resuscitation, electrolyte management, vasopressors, oxygen, and renal replacement therapy where needed. Candidate cross-protective countermeasures (rVSV-ZEBOV off-label, MBP-134, VesiculoVax) are under discussion for compassionate-use or accelerated field evaluation.</p>
        </details>
        <details>
          <summary>How is Ebola transmitted?</summary>
          <p>Direct contact with the body fluids (blood, vomit, diarrhea, saliva, semen, breast milk, urine) of an infected person, or with surfaces or objects contaminated by those fluids. Ebola is not airborne. The highest-risk settings are healthcare facilities without infection-prevention infrastructure, household care for the seriously ill, and traditional funerals involving touching the deceased. Sexual transmission via persistence of viral RNA in semen has been documented for Zaire ebolavirus over many months and is less well-characterised for Bundibugyo.</p>
        </details>
        <details>
          <summary>What does a WHO PHEIC mean?</summary>
          <p>A Public Health Emergency of International Concern is the WHO\'s highest-level alert mechanism under the International Health Regulations (2005). It triggers obligations on member states to coordinate, share data and provide support, and it justifies an enhanced WHO response posture. A PHEIC does not, in itself, restrict travel — the May 17 declaration did not impose flight bans or border closures.</p>
        </details>
        <details>
          <summary>Should I cancel travel to East Africa?</summary>
          <p>WHO has not recommended travel restrictions. For the overwhelming majority of leisure and business travellers to East Africa, the practical Ebola risk in 2026 is functionally zero. Travellers should avoid hospitals and clinics in affected regions unless they require care; avoid traditional funerals involving touching the deceased; monitor temperature daily for 21 days after return; and contact local public-health authorities (not a clinic directly) if they develop fever or compatible symptoms within that window.</p>
        </details>
        <details>
          <summary>What is the case fatality rate of Bundibugyo?</summary>
          <p>Historical case fatality rate for Bundibugyo virus disease is roughly 25–40%, based on the 2007 Uganda and 2012 DRC outbreaks. This is meaningfully lower than the typical 40–90% CFR of Zaire ebolavirus but still very high in absolute terms. The 2026 DRC outbreak CFR will not be reliably estimable until the suspected-to-confirmed conversion is complete.</p>
        </details>
        <details>
          <summary>What is the difference between Ebola and hantavirus?</summary>
          <p>Both are viral hemorrhagic diseases with high case fatality, but they are biologically and epidemiologically distinct. Ebola (filoviridae) spreads via direct contact with body fluids and has a 2–21 day incubation. Hantaviruses (bunyavirales) primarily spread from rodents to humans via aerosolised excreta, with a 1–8 week incubation; only Andes virus (one specific New World hantavirus) has documented limited human-to-human transmission. See our <a href="/">hantavirus tracker</a> for the parallel 2026 MV Hondius cluster.</p>
        </details>
      </div>
    </section>
  );
}

        <p>© 2026 Hanta Hub — Updated continuously during the 2026 outbreak response.</p>
      </footer>
      {openPostIndex !== null && (
        <ArticleModal
          post={POSTS[openPostIndex]}
          onClose={() => setOpenPostIndex(null)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
