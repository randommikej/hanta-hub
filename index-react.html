<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanta Hub — Global Outbreak Monitor</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">%F0%9F%98%B7</text></svg>'>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --blue: #1a4480;
    --blue-mid: #2563a8;
    --blue-light: #3b82c4;
    --sky: #dbeafe;
    --sky-light: #eff6ff;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --red: #dc2626;
    --amber: #d97706;
    --green: #059669;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--white);
    color: var(--gray-800);
    line-height: 1.6;
  }

  /* ─── NAV ─── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.4rem; color: var(--navy);
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo .pulse-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
    50% { opacity: .9; transform: scale(1.1); box-shadow: 0 0 0 6px rgba(220,38,38,0); }
  }
  .nav-links { display: flex; gap: 6px; }
  .nav-links button {
    background: none; border: none; cursor: pointer;
    font-family: var(--font-body); font-size: .875rem; font-weight: 500;
    color: var(--gray-600); padding: 8px 16px; border-radius: 8px;
    transition: all .2s;
  }
  .nav-links button:hover, .nav-links button.active {
    background: var(--sky); color: var(--blue);
  }
  .nav-status {
    display: flex; align-items: center; gap: 8px;
    font-size: .75rem; font-weight: 500; color: var(--green);
    background: #d1fae5; padding: 4px 12px; border-radius: 20px;
  }
  .nav-status span { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  /* ─── HERO BANNER ─── */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 60%, var(--blue-light) 100%);
    padding: 64px 40px 48px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3Ccircle cx='30' cy='30' r='10'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    color: #93c5fd; font-size: .75rem; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 20px;
  }
  .hero-badge .blink { animation: blink 1.2s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .hero h1 { font-family: var(--font-display); font-size: 3rem; color: var(--white); line-height: 1.15; margin-bottom: 14px; }
  .hero h1 em { font-style: italic; color: #93c5fd; }
  .hero p { color: rgba(255,255,255,0.75); font-size: 1rem; max-width: 560px; margin-bottom: 32px; }
  .hero-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .hstat {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 18px 24px; min-width: 140px;
  }
  .hstat-val { font-family: var(--font-display); font-size: 2rem; color: var(--white); }
  .hstat-label { font-size: .75rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
  .hstat-sub { font-size: .7rem; color: rgba(255,255,255,0.45); margin-top: 4px; }

  /* ─── TRACKER SECTION ─── */
  .tracker-body { max-width: 1100px; margin: 0 auto; padding: 48px 40px; }
  .section-title { font-family: var(--font-display); font-size: 1.75rem; color: var(--navy); margin-bottom: 6px; }
  .section-sub { color: var(--gray-600); font-size: .9rem; margin-bottom: 32px; }

  /* Risk Banner */
  .risk-banner {
    display: flex; align-items: center; gap: 16px;
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px;
    padding: 16px 20px; margin-bottom: 32px;
  }
  .risk-icon { font-size: 1.5rem; }
  .risk-text strong { color: #92400e; font-size: .9rem; }
  .risk-text p { color: #78350f; font-size: .8rem; margin-top: 2px; }
  .risk-tag {
    margin-left: auto; background: #fef3c7; color: #92400e;
    border: 1px solid #fde68a; padding: 4px 12px; border-radius: 20px;
    font-size: .75rem; font-weight: 600;
  }

  /* Stats Grid */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
  .stat-card {
    background: var(--gray-50); border: 1px solid var(--gray-200);
    border-radius: 12px; padding: 20px;
    transition: transform .2s, box-shadow .2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.07); }
  .stat-card.alert { border-color: #fca5a5; background: #fff5f5; }
  .stat-card.watch { border-color: #fde68a; background: #fffdf0; }
  .stat-val { font-family: var(--font-display); font-size: 2.2rem; color: var(--navy); }
  .stat-card.alert .stat-val { color: var(--red); }
  .stat-card.watch .stat-val { color: var(--amber); }
  .stat-label { font-size: .8rem; font-weight: 500; color: var(--gray-600); text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }
  .stat-note { font-size: .72rem; color: var(--gray-400); margin-top: 6px; }

  /* Timeline */
  .timeline-section { margin-bottom: 36px; }
  .timeline-section h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--navy); margin-bottom: 20px; }
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 6px; bottom: 6px; width: 2px; background: var(--gray-200); }
  .tl-item { position: relative; margin-bottom: 24px; }
  .tl-dot {
    position: absolute; left: -24px; top: 4px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--blue-light); border: 2px solid var(--white);
    box-shadow: 0 0 0 2px var(--blue-light);
  }
  .tl-dot.death { background: var(--red); box-shadow: 0 0 0 2px var(--red); }
  .tl-dot.active { background: var(--amber); box-shadow: 0 0 0 2px var(--amber); animation: pulse 1.8s infinite; }
  .tl-date { font-size: .72rem; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: .06em; }
  .tl-title { font-size: .9rem; font-weight: 600; color: var(--gray-800); margin-top: 2px; }
  .tl-desc { font-size: .82rem; color: var(--gray-600); margin-top: 3px; }
  .tl-badge {
    display: inline-block; font-size: .65rem; font-weight: 700; text-transform: uppercase;
    padding: 2px 8px; border-radius: 10px; margin-top: 5px; letter-spacing: .04em;
  }
  .badge-death { background: #fee2e2; color: var(--red); }
  .badge-confirmed { background: #dbeafe; color: var(--blue); }
  .badge-now { background: #d1fae5; color: var(--green); }

  /* Regions Table */
  .regions-section h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--navy); margin-bottom: 16px; }
  .regions-table { width: 100%; border-collapse: collapse; }
  .regions-table th {
    text-align: left; font-size: .72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: var(--gray-400); padding: 10px 14px;
    border-bottom: 2px solid var(--gray-200);
  }
  .regions-table td { padding: 14px; border-bottom: 1px solid var(--gray-100); font-size: .88rem; }
  .regions-table tr:hover td { background: var(--sky-light); }
  .status-pill {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  }
  .status-active { background: #fee2e2; color: var(--red); }
  .status-watch { background: #fef3c7; color: var(--amber); }
  .status-endemic { background: #dbeafe; color: var(--blue); }

  /* US Info Panel */
  .us-panel {
    background: var(--sky-light); border: 1px solid var(--sky);
    border-radius: 12px; padding: 24px; margin-top: 32px;
  }
  .us-panel h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--navy); margin-bottom: 12px; }
  .us-panel p { font-size: .88rem; color: var(--gray-600); margin-bottom: 12px; }
  .us-states { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .us-state-tag {
    background: var(--white); border: 1px solid var(--sky);
    padding: 4px 12px; border-radius: 20px; font-size: .78rem; color: var(--blue);
    font-weight: 500;
  }

  /* ─── HUB SECTION ─── */
  .hub-body { max-width: 1100px; margin: 0 auto; padding: 48px 40px; }
  .hub-intro {
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    border: 1px solid #bfdbfe; border-radius: 16px;
    padding: 32px; margin-bottom: 40px;
    display: flex; align-items: center; gap: 24px;
  }
  .hub-intro-icon { font-size: 3rem; }
  .hub-intro h2 { font-family: var(--font-display); font-size: 1.5rem; color: var(--navy); }
  .hub-intro p { color: var(--gray-600); font-size: .9rem; margin-top: 6px; }
  .hub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .product-card {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: 16px; overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.1); }
  .product-img {
    height: 160px; display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
  }
  .p-img-blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
  .p-img-teal { background: linear-gradient(135deg, #ccfbf1, #a7f3d0); }
  .p-img-sky { background: linear-gradient(135deg, #e0f2fe, #bae6fd); }
  .p-img-indigo { background: linear-gradient(135deg, #e0e7ff, #c7d2fe); }
  .p-img-rose { background: linear-gradient(135deg, #ffe4e6, #fecdd3); }
  .p-img-purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); }
  .product-info { padding: 20px; }
  .product-badge {
    font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    padding: 3px 10px; border-radius: 10px; display: inline-block; margin-bottom: 10px;
  }
  .badge-essential { background: #dbeafe; color: var(--blue); }
  .badge-recommended { background: #d1fae5; color: var(--green); }
  .badge-critical { background: #fee2e2; color: var(--red); }
  .product-name { font-weight: 600; color: var(--gray-800); font-size: .95rem; margin-bottom: 6px; }
  .product-desc { font-size: .8rem; color: var(--gray-600); line-height: 1.5; margin-bottom: 14px; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; }
  .product-price { font-family: var(--font-display); font-size: 1.2rem; color: var(--navy); }
  .product-price small { font-family: var(--font-body); font-size: .7rem; color: var(--gray-400); font-weight: 400; }

  .hub-disclaimer {
    margin-top: 32px; padding: 16px 20px;
    background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 10px;
    font-size: .78rem; color: var(--gray-400); text-align: center;
  }

  /* ─── BLOG SECTION ─── */
  .blog-body { max-width: 1100px; margin: 0 auto; padding: 48px 40px; }
  .blog-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
  .blog-main { display: flex; flex-direction: column; gap: 32px; }
  .blog-featured {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    border-radius: 16px; padding: 36px; color: var(--white); position: relative; overflow: hidden;
  }
  .blog-featured::after {
    content: '🦠'; font-size: 8rem; position: absolute; right: 20px; bottom: -10px; opacity: .15;
  }
  .blog-cat {
    font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    padding: 3px 12px; border-radius: 10px; display: inline-block; margin-bottom: 14px;
  }
  .cat-news { background: rgba(239,68,68,.25); color: #fca5a5; }
  .cat-prevention { background: rgba(16,185,129,.25); color: #6ee7b7; }
  .cat-science { background: rgba(99,102,241,.25); color: #a5b4fc; }
  .cat-tips { background: rgba(245,158,11,.25); color: #fcd34d; }
  .blog-featured h2 { font-family: var(--font-display); font-size: 1.6rem; line-height: 1.3; margin-bottom: 12px; }
  .blog-featured p { font-size: .88rem; opacity: .8; line-height: 1.6; margin-bottom: 20px; }
  .blog-meta-light { font-size: .75rem; opacity: .55; }
  .read-more {
    display: inline-block; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
    color: var(--white); padding: 8px 20px; border-radius: 8px; font-size: .82rem; font-weight: 500;
    cursor: pointer; text-decoration: none; transition: background .2s;
  }
  .read-more:hover { background: rgba(255,255,255,.25); }
  .blog-post-card {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: 12px; padding: 24px; display: flex; gap: 20px;
    transition: box-shadow .2s, transform .2s;
  }
  .blog-post-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.07); transform: translateY(-1px); }
  .post-icon { font-size: 2.5rem; flex-shrink: 0; }
  .post-content { flex: 1; }
  .post-cat-date { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .post-date { font-size: .72rem; color: var(--gray-400); }
  .post-title { font-weight: 600; color: var(--gray-800); font-size: .95rem; margin-bottom: 6px; line-height: 1.4; }
  .post-excerpt { font-size: .82rem; color: var(--gray-600); line-height: 1.5; }

  /* Sidebar */
  .blog-sidebar { display: flex; flex-direction: column; gap: 24px; }
  .sidebar-card {
    background: var(--gray-50); border: 1px solid var(--gray-200);
    border-radius: 12px; padding: 20px;
  }
  .sidebar-card h4 { font-weight: 600; color: var(--navy); font-size: .9rem; margin-bottom: 14px; }
  .sidebar-link {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--gray-200);
    cursor: pointer; transition: color .15s;
  }
  .sidebar-link:last-child { border-bottom: none; padding-bottom: 0; }
  .sidebar-link:hover .sl-title { color: var(--blue); }
  .sl-num { font-family: var(--font-display); font-size: 1.2rem; color: var(--gray-200); flex-shrink: 0; }
  .sl-title { font-size: .82rem; font-weight: 500; color: var(--gray-700); line-height: 1.4; }
  .sl-date { font-size: .7rem; color: var(--gray-400); margin-top: 2px; }

  .symptom-list { list-style: none; }
  .symptom-list li {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--gray-200);
    font-size: .82rem; color: var(--gray-700);
  }
  .symptom-list li:last-child { border-bottom: none; }
  .sym-icon { width: 24px; height: 24px; border-radius: 6px; background: var(--sky); display: flex; align-items: center; justify-content: center; font-size: .8rem; }

  .newsletter-card {
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    border: 1px solid #bfdbfe; border-radius: 12px; padding: 20px; text-align: center;
  }
  .newsletter-card h4 { font-weight: 600; color: var(--navy); margin-bottom: 8px; }
  .newsletter-card p { font-size: .8rem; color: var(--gray-600); margin-bottom: 14px; }
  .newsletter-input {
    width: 100%; padding: 9px 14px; border: 1px solid var(--gray-200);
    border-radius: 8px; font-family: var(--font-body); font-size: .82rem;
    margin-bottom: 10px; outline: none;
  }
  .newsletter-input:focus { border-color: var(--blue-light); box-shadow: 0 0 0 3px rgba(59,130,196,.1); }
  .btn-sub {
    width: 100%; background: var(--blue); color: var(--white);
    border: none; cursor: pointer; font-family: var(--font-body);
    font-size: .85rem; font-weight: 600; padding: 10px; border-radius: 8px;
    transition: background .2s;
  }
  .btn-sub:hover { background: var(--navy); }

  /* Footer */
  footer {
    background: var(--navy); color: rgba(255,255,255,0.5);
    text-align: center; padding: 24px 40px;
    font-size: .78rem;
  }
  footer a { color: rgba(255,255,255,0.4); text-decoration: none; }
  footer a:hover { color: rgba(255,255,255,0.7); }

  /* Animations */
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .btn-affiliate {
    display: inline-block;
    background: var(--blue); color: var(--white); border: none; cursor: pointer;
    font-family: var(--font-body); font-size: .8rem; font-weight: 600;
    padding: 8px 18px; border-radius: 8px; transition: background .2s;
    text-decoration: none;
  }
  .btn-affiliate:hover { background: var(--navy); }

  .affiliate-notice {
    margin-top: 32px; padding: 16px 20px;
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
    font-size: .78rem; color: #78350f;
  }

  /* ─── MAP ─── */
  .map-section { margin-bottom: 40px; }
  .map-section h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--navy); margin-bottom: 8px; }
  .map-section p { font-size: .82rem; color: var(--gray-600); margin-bottom: 16px; }
  .map-wrapper {
    background: #f0f7ff;
    border: 1px solid var(--gray-200);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }
  .map-wrapper svg { display: block; width: 100%; height: auto; }
  .map-legend {
    display: flex; gap: 20px; flex-wrap: wrap;
    padding: 12px 20px; background: var(--white);
    border-top: 1px solid var(--gray-200);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: .75rem; color: var(--gray-600); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .l-active { background: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,.25); }
  .l-watch { background: #d97706; }
  .l-endemic { background: #3b82c4; }
  .l-low { background: #d1d5db; }

  /* Tooltip */
  .map-tooltip {
    position: absolute; background: var(--navy); color: var(--white);
    padding: 8px 14px; border-radius: 8px; font-size: .78rem; pointer-events: none;
    opacity: 0; transition: opacity .15s; white-space: nowrap; z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  .map-tooltip strong { display: block; font-size: .85rem; margin-bottom: 2px; }

  .map-region { cursor: pointer; }

  /* Modal */
  .article-modal-overlay {
    display: block; position: fixed; inset: 0; z-index: 999;
    background: rgba(10,22,40,0.7); backdrop-filter: blur(4px);
    overflow-y: auto;
  }
  .article-modal-card {
    max-width: 780px; margin: 40px auto; background: white;
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,.3);
  }
  .article-modal-header {
    background: linear-gradient(135deg, #0a1628, #1a4480);
    padding: 40px 40px 32px; position: relative;
  }
  .article-modal-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
    color: white; width: 36px; height: 36px; border-radius: 50%;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .article-modal-title {
    font-family: 'DM Serif Display', serif; font-size: 1.7rem; color: white;
    line-height: 1.3; margin-bottom: 12px;
  }
  .article-modal-meta { font-size: .8rem; color: rgba(255,255,255,.55); }
  .article-modal-body {

  { cat: 'Prevention', catClass: 'cat-prevention', date: 'May 5, 2026', readTime: '6 min read',

      ['p', 'Every year, people unknowingly expose themselves to hantavirus while doing something as ordinary as cleaning out a garage, cabin, or storage shed. The mistake is almost always the same: they sweep, vacuum, or disturb dust without taking precautions first. This guide walks through the CDC-recommended protocol that could save your life.'],
      ['h3', 'Rule #1: Never Dry Sweep or Vacuum'],

  { cat: 'Science', catClass: 'cat-science', date: 'May 3, 2026', readTime: '7 min read',
    title: 'Andes Virus vs. Sin Nombre: Why Some Hantaviruses Are More Dangerous',
    excerpt: 'Most hantaviruses cannot spread person-to-person. Andes virus is the exception. The science behind this rare transmission route explained.',
    icon: '🔬',
    body: [
      ['p', 'Not all hantaviruses are created equal. Of the 40+ known strains circulating in rodent populations around the world, they vary dramatically in their transmission routes, geographic range, and fatality rates. Understanding these differences is essential to understanding why the 2026 MV Hondius outbreak has alarmed scientists worldwide.'],
      ['h3', 'The Sin Nombre Virus (North America)'],
      ['p', 'Sin Nombre virus, first identified during the 1993 Four Corners outbreak in the American Southwest, is the most studied hantavirus in the western world. It is carried exclusively by the deer mouse (Peromyscus maniculatus), which is found across nearly all of North America. Transmission to humans occurs when people inhale aerosolized particles from infected mouse urine, droppings, or saliva — typically during cleaning or outdoor activities in endemic areas.'],
      ['p', 'Critically, Sin Nombre virus does not spread from person to person. Every documented US case has been traced to direct rodent environmental exposure. This property has kept the US case count below 1,000 since surveillance began in 1993, despite the deer mouse being one of the most abundant mammals in North America.'],

      ['p', 'The mechanism of person-to-person transmission is not fully understood, but is believed to involve respiratory secretions during the prodromal or early cardiopulmonary phase. The risk appears limited to very close, prolonged contact — casual contact in public settings has not been associated with transmission.'],
      ['h3', 'Fatality Rates and Clinical Differences'],
      ['p', 'Both strains cause Hantavirus Pulmonary Syndrome (HPS), with similar clinical progression: a flu-like prodrome followed by rapid cardiopulmonary deterioration. Fatality rates for Sin Nombre HPS are approximately 36% in the US. Andes virus HPS has a similar fatality rate, though some outbreaks have reported mortality approaching 50%.'],
      ['p', 'No licensed vaccine or antiviral treatment exists for either strain in Western countries. Treatment is entirely supportive — oxygen, fluid management, and mechanical ventilation in severe cases.'],

      ['p', 'In Europe, Puumala virus (carried by the bank vole) causes a milder disease called Nephropathia Epidemica, a kidney-affecting illness with a fatality rate under 1%. In Asia, Hantaan virus causes Hemorrhagic Fever with Renal Syndrome (HFRS), affecting tens of thousands annually in China and Korea. China has a licensed vaccine against Hantaan/Seoul viruses, though it is not available in Western countries.'],

  { cat: 'Health Tips', catClass: 'cat-tips', date: 'Apr 25, 2026', readTime: '5 min read',
    title: 'Know the Symptoms: When Flu-Like Illness Could Be Something More Serious',
    excerpt: 'Fever, fatigue, muscle aches — early hantavirus mimics the flu. The red-flag signs that should prompt immediate medical attention after potential exposure.',
    icon: '💊',
    body: [
      ['p', 'Hantavirus Pulmonary Syndrome is notoriously difficult to diagnose in its early stages because it looks exactly like the flu. By the time patients develop the hallmark respiratory symptoms, the disease is already in its most dangerous phase. Knowing when to escalate — and escalate fast — can be the difference between survival and death.'],
      ['h3', 'Phase 1: The Prodrome (Days 1–5)'],
      ['p', 'Initial symptoms appear 1 to 8 weeks after exposure and are indistinguishable from influenza: fever (38–40°C / 100–104°F), severe fatigue, deep muscle aches particularly in the thighs and hips, headache, and chills. About half of patients also experience nausea, vomiting, diarrhea, and abdominal pain. There is no cough, runny nose, or sore throat in this phase — the absence of upper respiratory symptoms in an otherwise flu-like illness is actually a subtle warning sign.'],
      ['h3', 'Phase 2: Cardiopulmonary Deterioration (Days 5–10)'],
      ['p', 'The transition from prodrome to cardiopulmonary phase can happen suddenly, often within hours. Shortness of breath develops as the lungs begin filling with fluid (pulmonary edema). Heart rate accelerates and blood pressure drops. This phase requires immediate ICU admission and mechanical ventilation. Patients who reach this stage without medical support face mortality rates approaching 50%.'],
      ['h3', 'When to Seek Emergency Care Immediately'],
      ['p', 'Go to an emergency room immediately — do not wait — if you have flu-like symptoms AND any of the following: recent rodent exposure (cleaning, outdoor work in endemic areas), recent travel to endemic regions (SW United States, Patagonia, rural Europe), any difficulty breathing or chest tightness, or a sudden worsening of symptoms after seeming to improve. Tell medical staff about your potential hantavirus exposure explicitly. In many cases, physicians will not consider HPS unless it is raised directly.'],
      ['h3', 'Diagnosis and Treatment'],
      ['p', 'Diagnosis is confirmed by a blood test detecting hantavirus-specific antibodies (IgM/IgG) or by PCR. There is no approved antiviral treatment — all care is supportive. Early hospitalization, careful fluid management, and extracorporeal membrane oxygenation (ECMO) in severe cases have improved survival rates at specialized centers. Early recognition remains the most powerful tool available.'],
    ],
  },
  { cat: 'Prevention', catClass: 'cat-prevention', date: 'Apr 20, 2026', readTime: '6 min read',
    title: 'The Deer Mouse Problem: How Hantavirus Gets Into Your Home',
    excerpt: 'The North American deer mouse is the primary carrier of Sin Nombre virus. Learn how rodents enter homes undetected and how to seal entry points for good.',
    icon: '🐀',
    body: [
      ['p', 'The deer mouse (Peromyscus maniculatus) is one of the most common mammals in North America, found in virtually every habitat from forest to desert. It is also the primary reservoir for Sin Nombre hantavirus — and it is remarkably good at getting inside human structures without being noticed.'],
      ['h3', 'How Small Is Too Small?'],
      ['p', 'A deer mouse can compress its body to fit through a hole approximately 6mm in diameter — about the size of a pencil eraser or a dime. Standard construction gaps around pipes, utility lines, vents, and foundation cracks are typically much larger than this. Most homes have dozens of potential entry points that the average homeowner has never considered.'],
      ['h3', 'Where They Enter Most Often'],
      ['p', 'The most common entry points are: gaps where pipes and utility lines enter the building (electrical, plumbing, HVAC), foundation cracks and gaps where the sill plate meets the foundation, gaps beneath doors without door sweeps, damaged roof vents or soffit vents, and gaps around window air conditioning units. Attached garages are particularly common entry points because the gap at the bottom of garage doors is rarely sealed effectively.'],
      ['h3', 'How to Seal Your Home'],
      ['p', 'Walk the entire exterior perimeter of your home and probe every gap, crack, and penetration. For gaps smaller than ¼ inch, caulk is sufficient. For larger gaps, use steel wool packed tightly into the opening and then sealed with caulk over the top — rodents can chew through foam, wood, and plastic, but not steel wool. Hardware cloth (¼ inch mesh) is appropriate for larger openings like vents and crawl space access points.'],
      ['h3', 'Inside the Home'],
      ['p', 'Store food — including pet food — in sealed hard-sided containers, not bags or cardboard boxes. Keep firewood at least 20 feet from the house. Remove clutter that provides nesting habitat (piles of paper, fabric, insulation). Check regularly for signs of rodent activity: droppings, gnaw marks, greasy smear marks along walls, and unexplained holes in food packaging.'],
      ['h3', 'If You Find Evidence of Rodents'],
      ['p', 'Do not sweep or vacuum immediately. Follow the CDC wet disinfection protocol before disturbing any droppings or nesting material. Set snap traps rather than glue traps, which can cause the mouse to urinate when struggling, increasing virus exposure risk. If infestation is significant, consider a professional pest control service and inform them that hantavirus is a concern in your area.'],
    ],

  { cat: 'Health Tips', catClass: 'cat-tips', date: 'Apr 15, 2026', readTime: '7 min read',
    title: 'Camping & Hiking in Hantavirus Country: A Practical Safety Guide',
    excerpt: 'The Southwest US, Patagonia, and rural Europe are all endemic zones. A practical checklist for outdoor adventurers who don’t want to bring anything home but memories.',
    icon: '🏕️',
    body: [
      ['p', 'The American Southwest, Patagonia, and parts of rural Europe are among the most spectacular landscapes on earth — and among the most active hantavirus zones. This guide is for outdoor adventurers who want to explore them with eyes open and risk minimized.'],
      ['h3', 'Know Your Zones'],
      ['p', 'In the US, the highest-risk states for Sin Nombre hantavirus exposure are New Mexico, Colorado, Arizona, Utah, California, Washington, Montana, and Texas. Risk is highest in rural and wilderness settings — particularly areas with abundant deer mouse habitat like pinyon-juniper woodland, shrubsteppe, and riparian zones. In South America, risk is concentrated in Chilean and Argentine Patagonia, particularly in agricultural and forested areas. In Europe, bank vole habitat in Scandinavia, Germany, Belgium, and the Balkans carries Puumala virus risk.'],
      ['h3', 'Campsite Selection'],

  { cat: 'Science', catClass: 'cat-science', date: 'Apr 10, 2026', readTime: '8 min read',
    title: 'Inside HPS: How Hantavirus Destroys the Lungs in 72 Hours',
    excerpt: 'Hantavirus Pulmonary Syndrome is one of the fastest-moving respiratory diseases known. A step-by-step look at how the virus overwhelms the immune system and floods the lungs with fluid.',
    icon: '🧬',
    body: [
      ['p', 'Hantavirus Pulmonary Syndrome is one of medicine’s most dramatic disease progressions. A person can go from feeling mildly unwell to requiring mechanical ventilation in less than 48 hours. Understanding the mechanism of this devastation helps explain why early recognition is so critical — and why there is currently no effective antiviral to interrupt it.'],
      ['h3', 'Entry and Initial Infection'],
      ['p', 'Hantavirus enters the body almost exclusively through inhalation of aerosolized virus particles in infected rodent excretions. The virus particles are incredibly small — approximately 80–120 nanometers — and can remain viable in dried material for several days under cool, shaded conditions. Once inhaled, the virus infects cells lining the respiratory tract and rapidly targets a specific surface molecule called integrin β3, which is found in high concentrations in the lungs, kidneys, and blood vessels.'],
      ['h3', 'The Immune System Paradox'],
      ['p', 'Here is where HPS becomes counterintuitive: the virus itself does not directly destroy tissue. The destruction is caused by your own immune system. Hantavirus triggers a massive, dysregulated immune response. CD8+ T-cells flood the lungs in enormous numbers, releasing inflammatory cytokines — particularly TNF-α and IFN-γ — that cause the tiny blood vessels in the lungs (capillaries) to become abnormally permeable. Fluid from the bloodstream leaks into the air sacs of the lungs (alveoli).'],
      ['h3', 'Pulmonary Edema and ARDS'],

        </div>

        <div className="affiliate-notice">
          🔗 <strong>Affiliate Disclosure:</strong> Hanta Hub participates in affiliate programs. When you click "Shop on Amazon" and make a purchase, we may earn a small commission at no extra cost to you. This helps fund our free outbreak monitoring service.
        </div>
      </div>
    </section>
  );
}

function BlogSection({ onOpenPost }) {
  const featured = POSTS[0];
  const rest = POSTS.slice(1);

  return (
    <section>
      <div className="hero" style={{ padding: '48px 40px 40px' }}>
        <div className="hero-inner">
          <div className="hero-badge">📰 Health Intelligence</div>
          <h1>Hanta Hub <em>Blog</em></h1>
          <p>Prevention guides, outbreak news, and scientific research — all in one place.</p>
        </div>
      </div>

      <div className="blog-body fade-in">
        <div className="blog-grid">
          <div className="blog-main">

            <div className="blog-featured" onClick={() => onOpenPost(0)} style={{ cursor: 'pointer' }}>
              <span className="blog-cat cat-news">🔴 Breaking News</span>
              <h2>{featured.title}</h2>
              <p>{featured.excerpt}</p>
              <div className="blog-meta-light">By Hanta Hub Editorial · {featured.date} · {featured.readTime}</div>
              <br /><br />
              <span className="read-more">Read Full Article →</span>
            </div>

            {rest.map((post, i) => (
              <div
                className="blog-post-card"
                key={i + 1}
                onClick={() => onOpenPost(i + 1)}
                style={{ cursor: 'pointer' }}
              >
                <div className="post-icon">{post.icon}</div>
                <div className="post-content">
                  <div className="post-cat-date">
                    <span className={'blog-cat ' + post.catClass} style={{ fontSize: '.65rem', padding: '2px 10px', borderRadius: '10px' }}>{post.cat}</span>
                    <span className="post-date">{post.date}</span>
                  </div>
                  <div className="post-title">{post.title}</div>
                  <div className="post-excerpt">{post.excerpt}</div>
                </div>
              </div>
            ))}
          </div>

          <div className="blog-sidebar">
            <div className="sidebar-card">
              <h4>📌 Most Read</h4>
              {SIDEBAR_LINKS.map((link, i) => (
                <div className="sidebar-link" key={i} onClick={() => onOpenPost(link.postIndex)} style={{ cursor: 'pointer' }}>
                  <div className="sl-num">{link.num}</div>
                  <div>
                    <div className="sl-title">{link.title}</div>
                    <div className="sl-date">{link.date}</div>
                  </div>
                </div>
              ))}
            </div>

            <div className="sidebar-card">
              <h4>⚠️ Key Symptoms to Watch</h4>
              <ul className="symptom-list">
                {SYMPTOMS.map((s, i) => (
                  <li key={i}><div className="sym-icon">{s.icon}</div> {s.text}</li>
                ))}
              </ul>
            </div>

            <div className="newsletter-card">
              <h4>📬 Outbreak Alerts</h4>
              <p>Get notified when WHO issues new guidance or case counts change.</p>
              <input className="newsletter-input" type="email" placeholder="your@email.com" />
              <button className="btn-sub">Subscribe to Alerts</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function ArticleModal({ post, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  if (!post) return null;

  return (
    <div className="article-modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="article-modal-card">
        <div className="article-modal-header">
          <button className="article-modal-close" onClick={onClose}>✕</button>
          <span className={'blog-cat ' + post.catClass} style={{ fontSize: '.7rem', padding: '3px 12px', borderRadius: '10px', marginBottom: '14px', display: 'inline-block' }}>{post.cat}</span>
          <h2 className="article-modal-title">{post.title}</h2>
          <p className="article-modal-meta">By Hanta Hub Editorial · {post.date} · {post.readTime}</p>
        </div>
        <div className="article-modal-body">
          {post.body.map((node, i) => {
            const [tag, text] = node;
            if (tag === 'h3') return <h3 key={i}>{text}</h3>;
            if (tag === 'em') return <p key={i}><em>{text}</em></p>;
            return <p key={i}>{text}</p>;
          })}
          <div className="article-medical-disclaimer">
            ⚕️ <strong>Medical Disclaimer:</strong> This article is for informational purposes only and does not constitute medical advice. Always consult a qualified healthcare professional for personal medical guidance.
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [activeSection, setActiveSection] = useState('tracker');
  const [openPostIndex, setOpenPostIndex] = useState(null);

  return (
    <>
      <Nav active={activeSection} onChange={setActiveSection} />
      {activeSection === 'tracker' && <TrackerSection />}
      {activeSection === 'hub' && <HubSection />}
      {activeSection === 'blog' && <BlogSection onOpenPost={setOpenPostIndex} />}

      <footer>
        <p>© 2026 Hanta Hub — For informational purposes only. Not medical advice. Data sourced from <a href="https://www.who.int" target="_blank" rel="noopener">WHO</a> · <a href="https://www.cdc.gov" target="_blank" rel="noopener">CDC</a> · <a href="https://africacdc.org" target="_blank" rel="noopener">Africa CDC</a> · <a href="https://hantavirustracker.live" target="_blank" rel="noopener">HantaVirusTracker.live</a></p>
      </footer>

      {openPostIndex !== null && (
        <ArticleModal
          post={POSTS[openPostIndex]}
          onClose={() => setOpenPostIndex(null)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
