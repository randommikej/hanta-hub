<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Hanta Hub Embed Counter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',sans-serif}
body{background:transparent;padding:0;color:#0a1628}
.w{background:linear-gradient(135deg,#0a1628,#1a4480);color:#fff;border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:18px;text-decoration:none;font-family:'DM Sans',sans-serif;box-shadow:0 8px 24px rgba(10,22,40,.15);max-width:520px}
.dot{width:14px;height:14px;background:#dc2626;border-radius:50%;animation:p 1.8s ease-in-out infinite;flex-shrink:0}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.t{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#dbeafe;font-weight:600}
.h{font-family:'DM Serif Display',serif;font-size:1.2rem;line-height:1.1;margin-top:2px}
.s{display:flex;gap:18px;margin-top:8px}
.s .n{font-family:'DM Serif Display',serif;font-size:1.6rem;line-height:1}
.s .l{font-size:.68rem;color:#94a3b8;margin-top:1px}
.go{margin-left:auto;background:#fff;color:#1a4480;padding:8px 14px;border-radius:999px;font-size:.78rem;font-weight:600;text-decoration:none;white-space:nowrap}
</style></head>
<body>
<a class="w" href="https://hantavirussupplies.com/" target="_blank" rel="noopener">
<div class="dot"></div>
<div>
<div class="t">MV Hondius · Live tracker</div>
<div class="h">2026 hantavirus outbreak</div>
<div class="s"><div><div class="n">10</div><div class="l">Cases</div></div><div><div class="n">3</div><div class="l">Deaths</div></div><div><div class="n">42d</div><div class="l">WHO quarantine</div></div></div>
</div>
<span class="go">Open tracker →</span>
</a>
</body></html>
