<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hanta Hub · Case curve · MV Hondius hantavirus tracker</title>
<meta name="robots" content="noindex,follow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:transparent;color:#0a1628;-webkit-font-smoothing:antialiased}
.w{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:18px 20px;box-shadow:0 4px 16px rgba(10,22,40,.06);max-width:720px;margin:8px auto}
.head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.left{display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;background:#ef4444;border-radius:50%;animation:p 1.8s ease-in-out infinite;flex-shrink:0}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.15)}}
.tag{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#475569;font-weight:600}
.title{font-family:'DM Serif Display',serif;font-size:1.15rem;line-height:1.15;color:#0a1628;margin-top:1px}
.go{font-size:.78rem;font-weight:600;color:#1a4480;background:#dbeafe;padding:6px 12px;border-radius:999px;text-decoration:none}
.go:hover{background:#bfdbfe}
.canvas-wrap{height:280px;position:relative}
.foot{margin-top:8px;font-size:.7rem;color:#94a3b8;text-align:center}
.foot a{color:#1a4480;text-decoration:none;font-weight:600}
.foot a:hover{text-decoration:underline}
</style></head>
<body>
<div class="w">
  <div class="head">
    <div class="left">
      <span class="dot"></span>
      <div>
        <div class="tag">Live tracker · MV Hondius</div>
        <div class="title">Hantavirus case curve</div>
      </div>
    </div>
    <a class="go" href="https://hantavirussupplies.com/?ref=embed-chart" target="_blank" rel="noopener">Open tracker →</a>
  </div>
  <div class="canvas-wrap"><canvas id="c"></canvas></div>
  <div class="foot">Cumulative cases by category, deaths on right axis · Source: WHO Disease Outbreak News, ECDC · <a href="https://hantavirussupplies.com/data/cases.json" target="_blank" rel="noopener">JSON</a> · <a href="https://hantavirussupplies.com/?ref=embed-chart" target="_blank" rel="noopener">hantavirussupplies.com</a></div>
</div>
<script>
const D = [
  { date: 'Apr 11', confirmed: 0, probable: 1, inconclusive: 0, deaths: 1 },
  { date: 'Apr 26', confirmed: 0, probable: 2, inconclusive: 0, deaths: 2 },
  { date: 'May 2',  confirmed: 1, probable: 2, inconclusive: 0, deaths: 2 },
  { date: 'May 3',  confirmed: 1, probable: 3, inconclusive: 0, deaths: 3 },
  { date: 'May 4',  confirmed: 2, probable: 3, inconclusive: 0, deaths: 3 },
  { date: 'May 6',  confirmed: 5, probable: 2, inconclusive: 0, deaths: 3 },
  { date: 'May 7',  confirmed: 6, probable: 2, inconclusive: 0, deaths: 3 },
  { date: 'May 8',  confirmed: 6, probable: 2, inconclusive: 0, deaths: 3 },
  { date: 'May 9',  confirmed: 6, probable: 2, inconclusive: 0, deaths: 3 },
  { date: 'May 10', confirmed: 6, probable: 2, inconclusive: 0, deaths: 3 },
  { date: 'May 11', confirmed: 8, probable: 2, inconclusive: 0, deaths: 3 },
  { date: 'May 12', confirmed: 9, probable: 2, inconclusive: 0, deaths: 3 },
  { date: 'May 13', confirmed: 8, probable: 2, inconclusive: 1, deaths: 3 },
  { date: 'May 14', confirmed: 8, probable: 2, inconclusive: 1, deaths: 3 },
  { date: 'May 15', confirmed: 8, probable: 2, inconclusive: 1, deaths: 3 },
];
const labels = D.map(d => d.date);
const conf = D.map(d => d.confirmed);
const prob = D.map((d,i) => d.probable + d.confirmed);
const inco = D.map((d,i) => d.inconclusive + d.probable + d.confirmed);
const deaths = D.map(d => d.deaths);
new Chart(document.getElementById('c'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      { type:'line', label:'PCR-confirmed', data:conf, backgroundColor:'rgba(37,99,168,.55)', borderColor:'#1a4480', fill:'origin', tension:.25, pointRadius:2 },
      { type:'line', label:'Probable',     data:prob, backgroundColor:'rgba(59,130,196,.35)', borderColor:'rgba(59,130,196,.85)', fill:'-1', tension:.25, pointRadius:2 },
      { type:'line', label:'Inconclusive', data:inco, backgroundColor:'rgba(148,163,184,.35)', borderColor:'rgba(148,163,184,.85)', fill:'-1', tension:.25, pointRadius:2 },
      { type:'bar',  label:'Deaths',       data:deaths, backgroundColor:'rgba(220,38,38,.85)', borderColor:'#dc2626', yAxisID:'y1', barThickness:7 }
    ]
  },
  options: {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'bottom',labels:{font:{family:"'DM Sans',sans-serif",size:11},boxWidth:12,padding:10}},tooltip:{mode:'index',intersect:false}},
    scales:{x:{grid:{display:false},ticks:{font:{family:"'DM Sans',sans-serif",size:10}}},y:{beginAtZero:true,ticks:{stepSize:2,font:{size:10}}},y1:{beginAtZero:true,position:'right',max:10,grid:{drawOnChartArea:false},ticks:{font:{size:10}}}}
  }
});
</script>
</body></html>
